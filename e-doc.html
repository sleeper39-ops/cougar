<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Document Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; }
        .card-doc { transition: all 0.2s ease-in-out; border: 1px solid #e2e8f0; }
        .card-doc:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body class="text-slate-700">

<nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fas fa-file-invoice text-xl"></i>
            </div>
            <span class="text-xl font-bold text-slate-800 tracking-tight">E-DOCUMENT <span class="text-blue-600 text-sm font-medium ml-1">v2.0</span></span>
        </div>
        <button onclick="adminLogin()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
            <i class="fas fa-lock text-xs"></i> สำหรับเจ้าหน้าที่
        </button>
    </div>
</nav>

<header class="bg-white border-b border-slate-100 py-10 mb-8">
    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="flex items-center gap-5 p-6 rounded-2xl bg-blue-50 border border-blue-100">
            <div class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-lg shadow-blue-200">
                <i class="fas fa-copy"></i>
            </div>
            <div>
                <p class="text-blue-600 text-sm font-bold uppercase tracking-wider">เอกสารทั้งหมด</p>
                <h3 id="totalDocs" class="text-3xl font-black text-slate-800">0</h3>
            </div>
        </div>
        <div class="flex items-center gap-5 p-6 rounded-2xl bg-emerald-50 border border-emerald-100">
            <div class="bg-emerald-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-lg shadow-emerald-200">
                <i class="fas fa-folder-tree"></i>
            </div>
            <div>
                <p class="text-emerald-600 text-sm font-bold uppercase tracking-wider">หมวดหมู่</p>
                <h3 id="totalCats" class="text-3xl font-black text-slate-800">0</h3>
            </div>
        </div>
        <div class="flex items-center gap-5 p-6 rounded-2xl bg-amber-50 border border-amber-100">
            <div class="bg-amber-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-lg shadow-amber-200">
                <i class="fas fa-clock-rotate-left"></i>
            </div>
            <div>
                <p class="text-amber-600 text-sm font-bold uppercase tracking-wider">อัปโหลดล่าสุด</p>
                <h3 id="lastDate" class="text-xl font-black text-slate-800">--/--/--</h3>
            </div>
        </div>
    </div>
</header>

<section class="max-w-7xl mx-auto px-6 mb-8">
    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
        <div class="relative flex-1">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อเอกสาร หรือรหัสเอกสาร..." 
                class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition">
        </div>
        <select id="filterCategory" class="border border-slate-200 rounded-lg px-4 py-3 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 min-w-[200px] cursor-pointer">
            <option value="">ทุกหมวดหมู่</option>
        </select>
    </div>
</section>

<section id="docGrid" class="max-w-7xl mx-auto px-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 mb-12">
    </section>

<div id="emptyState" class="hidden text-center py-20">
    <i class="fas fa-file-circle-xmark text-6xl text-slate-300 mb-4"></i>
    <p class="text-slate-500 text-lg">ไม่พบเอกสารที่ค้นหา</p>
</div>

<div id="pagination" class="max-w-7xl mx-auto px-6 pb-20 flex justify-center gap-2"></div>

<footer class="bg-white border-t border-slate-200 py-8 text-center">
    <p class="text-slate-400 text-sm">© 2026 ระบบจัดการเอกสารอิเล็กทรอนิกส์ | All Rights Reserved</p>
</footer>

<script>
/* ======================
    DATA & CONFIG
====================== */
const documents = [
    { id: "ED-001", name: "รายงานการประชุมคณะกรรมการชุดที่ 1", category: "เอกสารราชการ", date: "2026-03-01", status: "อนุมัติแล้ว" },
    { id: "ED-002", name: "ใบเสนอราคาระบบคลาวด์เซิร์ฟเวอร์", category: "การเงิน", date: "2026-02-28", status: "รอตรวจสอบ" },
    { id: "ED-003", name: "คู่มือการปฏิบัติงานพนักงานใหม่", category: "ทั่วไป", date: "2026-02-25", status: "ร่าง" },
    { id: "ED-004", name: "บันทึกข้อความภายใน เรื่อง การลาหยุด", category: "เอกสารราชการ", date: "2026-02-20", status: "อนุมัติแล้ว" },
    { id: "ED-005", name: "สรุปงบประมาณไตรมาส 1/2569", category: "การเงิน", date: "2026-02-15", status: "อนุมัติแล้ว" },
    { id: "ED-006", name: "แผนผังองค์กรประจำปี 2026", category: "ทั่วไป", date: "2026-02-10", status: "อนุมัติแล้ว" },
    { id: "ED-007", name: "นโยบายความปลอดภัยสารสนเทศ", category: "ไอที", date: "2026-02-05", status: "อนุมัติแล้ว" },
];

let currentPage = 1;
const perPage = 6;
let filteredDocs = [...documents];

/* ======================
    CORE FUNCTIONS
====================== */
function init() {
    updateStats();
    
    // Setup Filter
    const cats = [...new Set(documents.map(d => d.category))];
    const select = document.getElementById("filterCategory");
    cats.forEach(c => {
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });

    renderGrid();
}

function updateStats() {
    document.getElementById("totalDocs").innerText = documents.length;
    document.getElementById("totalCats").innerText = new Set(documents.map(d => d.category)).size;
    document.getElementById("lastDate").innerText = documents[0].date;
}

function renderGrid() {
    const container = document.getElementById("docGrid");
    const empty = document.getElementById("emptyState");
    container.innerHTML = "";

    const start = (currentPage - 1) * perPage;
    const subset = filteredDocs.slice(start, start + perPage);

    if (subset.length === 0) {
        empty.classList.remove("hidden");
    } else {
        empty.classList.add("hidden");
        subset.forEach(doc => {
            const statusClass = getStatusStyle(doc.status);
            container.innerHTML += `
                <div class="card-doc bg-white rounded-2xl p-6 flex flex-col shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold text-slate-400 tracking-tighter uppercase">${doc.id}</span>
                        <span class="status-pill ${statusClass}">${doc.status}</span>
                    </div>
                    <h4 class="font-bold text-slate-800 text-lg mb-2 leading-tight h-14 overflow-hidden">${doc.name}</h4>
                    <div class="flex items-center gap-2 text-slate-500 text-xs mb-6 italic">
                        <i class="fas fa-folder text-blue-400"></i> ${doc.category}
                        <span class="text-slate-300">|</span>
                        <i class="fas fa-calendar-alt"></i> ${doc.date}
                    </div>
                    <div class="mt-auto grid grid-cols-2 gap-2">
                        <button onclick="previewDoc('${doc.name}')" class="bg-slate-50 hover:bg-blue-600 hover:text-white text-slate-600 py-2 rounded-lg text-sm font-bold transition">
                             <i class="fas fa-eye mr-1"></i> ดู
                        </button>
                        <button onclick="downloadDoc()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-bold transition">
                             <i class="fas fa-download mr-1"></i> โหลด
                        </button>
                    </div>
                </div>
            `;
        });
    }
    renderPagination();
}

function getStatusStyle(status) {
    if (status === "อนุมัติแล้ว") return "bg-emerald-100 text-emerald-700";
    if (status === "รอตรวจสอบ") return "bg-amber-100 text-amber-700";
    return "bg-slate-100 text-slate-600";
}

/* ======================
    FILTERS & PAGINATION
====================== */
function filterData() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    filteredDocs = documents.filter(d => {
        return (d.name.toLowerCase().includes(search) || d.id.toLowerCase().includes(search)) 
            && (cat === "" || d.category === cat);
    });

    currentPage = 1;
    renderGrid();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredDocs.length / perPage);
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
        container.innerHTML += `
            <button onclick="goPage(${i})" 
                class="w-10 h-10 rounded-lg font-bold transition ${i === currentPage ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}">
                ${i}
            </button>
        `;
    }
}

function goPage(p) {
    currentPage = p;
    renderGrid();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById("searchInput").addEventListener("input", filterData);
document.getElementById("filterCategory").addEventListener("change", filterData);

/* ======================
    UI ACTIONS
====================== */
function previewDoc(name) {
    Swal.fire({
        title: 'กำลังเปิดดูเอกสาร',
        text: name,
        icon: 'info',
        confirmButtonText: 'รับทราบ',
        confirmButtonColor: '#3b82f6'
    });
}

function downloadDoc() {
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 2000,
        timerProgressBar: true
    });
    Toast.fire({
        icon: 'success',
        title: 'เริ่มการดาวน์โหลดไฟล์...'
    });
}

function adminLogin() {
    Swal.fire({
        title: 'เจ้าหน้าที่เข้าสู่ระบบ',
        html: `
            <input type="text" id="swal-user" class="swal2-input" placeholder="ชื่อผู้ใช้งาน">
            <input type="password" id="swal-pass" class="swal2-input" placeholder="รหัสผ่าน">
        `,
        confirmButtonText: 'เข้าสู่ระบบ',
        focusConfirm: false,
        preConfirm: () => {
            const user = Swal.getPopup().querySelector('#swal-user').value;
            const pass = Swal.getPopup().querySelector('#swal-pass').value;
            if (!user || !pass) {
                Swal.showValidationMessage(`กรุณากรอกข้อมูลให้ครบ`);
            }
            return { user: user, pass: pass }
        }
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire('ยินดีต้อนรับ', 'เข้าสู่ระบบหลังบ้านเรียบร้อย', 'success');
        }
    });
}

init();
</script>

</body>
</html>
