<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Document Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; }
        
        /* สไตล์การ์ดแบบในรูปภาพ */
        .doc-card-row {
            transition: all 0.2s ease;
            border-left: 5px solid #3b82f6; /* เพิ่มเส้นสีฟ้าด้านซ้ายให้ดูเด่น */
        }
        .doc-card-row:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .btn-action {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
    </style>
</head>
<body class="text-slate-700">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-file-invoice text-blue-600 text-2xl"></i>
            <span class="text-xl font-bold tracking-tight">E-DOCUMENT</span>
        </div>
        <button onclick="adminLogin()" class="text-slate-400 hover:text-blue-600 transition">
            <i class="fas fa-user-circle text-2xl"></i>
        </button>
    </div>
</nav>

<section class="max-w-6xl mx-auto px-4 mt-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
            <div class="bg-blue-100 text-blue-600 w-12 h-12 rounded-lg flex items-center justify-center text-xl">
                <i class="fas fa-copy"></i>
            </div>
            <div>
                <p class="text-slate-400 text-xs font-bold uppercase">เอกสารทั้งหมด</p>
                <h3 id="totalDocs" class="text-2xl font-black">0</h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
            <div class="bg-indigo-100 text-indigo-600 w-12 h-12 rounded-lg flex items-center justify-center text-xl">
                <i class="fas fa-folder"></i>
            </div>
            <div>
                <p class="text-slate-400 text-xs font-bold uppercase">หมวดหมู่</p>
                <h3 id="totalCats" class="text-2xl font-black">0</h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
            <div class="bg-emerald-100 text-emerald-600 w-12 h-12 rounded-lg flex items-center justify-center text-xl">
                <i class="fas fa-calendar-check"></i>
            </div>
            <div>
                <p class="text-slate-400 text-xs font-bold uppercase">อัปเดตล่าสุด</p>
                <h3 id="lastDate" class="text-lg font-bold">--/--/--</h3>
            </div>
        </div>
    </div>
</section>

<section class="max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col md:flex-row gap-3 border border-slate-100">
        <div class="relative flex-1">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาเอกสาร..." 
                class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-blue-400 transition outline-none">
        </div>
        <select id="filterCategory" class="bg-slate-50 border-none rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-400 outline-none cursor-pointer font-medium text-sm">
            <option value="">ทุกหมวดหมู่</option>
        </select>
    </div>
</section>

<section id="docList" class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-4">
    </section>

<div id="pagination" class="max-w-6xl mx-auto px-4 py-10 flex justify-center gap-2"></div>

<footer class="text-center py-6 text-slate-400 text-xs">
    &copy; 2026 E-Document Service | Powered by ESOS
</footer>

<script>
/* ======================
    DATA
====================== */
const documents = [
    { name: "รายงานประจำปี 2565", category: "เอกสารราชการ", date: "2026-03-01", fileUrl: "#" },
    { name: "ใบเสนอราคาจองสินค้า", category: "การเงิน", date: "2026-02-28", fileUrl: "#" },
    { name: "สรุปงานทีม", category: "ทั่วไป", date: "2026-02-25", fileUrl: "#" },
    { name: "ระเบียบการจัดซื้อจัดจ้าง 2569", category: "พัสดุ", date: "2026-02-15", fileUrl: "#" },
    { name: "แผนการดำเนินงานไตรมาส 1", category: "แผนงาน", date: "2026-02-10", fileUrl: "#" },
    { name: "คู่มือการใช้งานระบบใหม่", category: "ทั่วไป", date: "2026-02-01", fileUrl: "#" },
];

let currentPage = 1;
const perPage = 6;
let filteredDocs = [...documents];

/* ======================
    CORE FUNCTIONS
====================== */
function init() {
    // Stats
    document.getElementById("totalDocs").innerText = documents.length;
    const cats = [...new Set(documents.map(d => d.category))];
    document.getElementById("totalCats").innerText = cats.length;
    document.getElementById("lastDate").innerText = documents[0].date;

    // Filter Dropdown
    const select = document.getElementById("filterCategory");
    cats.forEach(c => {
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });

    renderList();
}

function renderList() {
    const container = document.getElementById("docList");
    container.innerHTML = "";

    const start = (currentPage - 1) * perPage;
    const subset = filteredDocs.slice(start, start + perPage);

    subset.forEach(doc => {
        container.innerHTML += `
            <div class="doc-card-row bg-white p-5 rounded-xl shadow-sm flex flex-col justify-between border border-slate-100">
                <div class="flex flex-col">
                    <h4 class="font-bold text-slate-800 text-lg mb-1">${doc.name}</h4>
                    <p class="text-slate-400 text-sm mb-1">${doc.category}</p>
                    <p class="text-slate-300 text-[11px]">${doc.date}</p>
                </div>
                
                <div class="flex gap-2 mt-4 justify-end">
                    <button onclick="previewDoc('${doc.name}')" class="btn-action bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-100">
                        <i class="fas fa-file-alt"></i> ดูเอกสาร
                    </button>
                    <button onclick="downloadDoc('${doc.name}')" class="btn-action bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200">
                        <i class="fas fa-download"></i> ดาวน์โหลด
                    </button>
                </div>
            </div>
        `;
    });

    renderPagination();
}

/* ======================
    LOGIC
====================== */
function filterData() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    filteredDocs = documents.filter(d => {
        return d.name.toLowerCase().includes(search) && (cat === "" || d.category === cat);
    });

    currentPage = 1;
    renderList();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredDocs.length / perPage);
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
        container.innerHTML += `
            <button onclick="goPage(${i})" 
                class="w-9 h-9 rounded-lg text-sm font-bold transition ${i === currentPage ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border hover:bg-slate-50'}">
                ${i}
            </button>
        `;
    }
}

function goPage(p) {
    currentPage = p;
    renderList();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById("searchInput").addEventListener("input", filterData);
document.getElementById("filterCategory").addEventListener("change", filterData);

/* ======================
    UI ACTIONS
====================== */
function previewDoc(name) {
    Swal.fire({
        title: name,
        html: '<div class="py-10 bg-slate-50 rounded-lg border-2 border-dashed border-slate-200 text-slate-400"><i class="fas fa-file-pdf text-4xl mb-2"></i><br>ระบบจำลองการเปิดไฟล์ PDF</div>',
        confirmButtonText: 'ปิดหน้าต่าง',
        confirmButtonColor: '#3b82f6'
    });
}

function downloadDoc(name) {
    Swal.fire({
        title: 'ดาวน์โหลดสำเร็จ',
        text: 'กำลังเตรียมไฟล์: ' + name,
        icon: 'success',
        timer: 1500,
        showConfirmButton: false
    });
}

function adminLogin() {
    Swal.fire({
        title: 'Admin Login',
        input: 'password',
        inputPlaceholder: 'ใส่รหัสผ่าน...',
        confirmButtonText: 'เข้าสู่ระบบ',
        confirmButtonColor: '#3b82f6'
    });
}

init();
</script>

</body>
</html>
