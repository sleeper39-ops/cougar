<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Document Enterprise</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .doc-card { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .doc-card:hover { border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-slate-800">

<nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="w-full px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white shadow-lg shadow-blue-200">
                <i class="fas fa-file-shield text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 leading-none">E-DOC</h1>
                <p class="text-[10px] text-blue-600 font-bold tracking-[0.2em] uppercase">Enterprise System</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="adminBadge" class="hidden bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold border border-orange-200">
                <i class="fas fa-user-shield mr-1"></i> โหมดแอดมิน
            </div>
            <button onclick="toggleAdmin()" id="adminBtn" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-md">
                <i class="fas fa-cog mr-2"></i>จัดการระบบ
            </button>
        </div>
    </div>
</nav>

<main class="w-full px-6 py-8">
    
    <div class="flex flex-col lg:flex-row gap-4 mb-8 items-end">
        <div class="flex-1 w-full">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">ค้นหาเอกสาร</label>
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="filterData()" placeholder="ชื่อเอกสาร, รหัส หรือคำสำคัญ..." 
                    class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition">
            </div>
        </div>
        <div class="w-full lg:w-64">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">หมวดหมู่</label>
            <select id="filterCategory" onchange="filterData()" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none cursor-pointer">
                <option value="">ทั้งหมด</option>
            </select>
        </div>
        <div id="addBtnArea" class="hidden">
            <button onclick="addDocument()" class="bg-emerald-500 hover:bg-emerald-600 text-white h-[50px] px-6 rounded-2xl font-bold transition flex items-center gap-2">
                <i class="fas fa-plus"></i> เพิ่มเอกสาร
            </button>
        </div>
    </div>

    <div id="docList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5">
        </div>

    <div id="emptyState" class="hidden py-20 text-center">
        <i class="fas fa-folder-open text-slate-200 text-6xl mb-4"></i>
        <p class="text-slate-400 font-medium">ไม่พบข้อมูลเอกสารที่ค้นหา</p>
    </div>

</main>

<script>
/* ======================
    CORE DATA
====================== */
let documents = [
    { id: 1, name: "รายงานการประชุมประจำปี 2568", category: "เอกสารราชการ", date: "02 มี.ค. 2569", type: "pdf" },
    { id: 2, name: "ใบเสนอราคาระบบบริหารจัดการฐานข้อมูล", category: "การเงิน", date: "28 ก.พ. 2569", type: "xlsx" },
    { id: 3, name: "สรุปผลการดำเนินงานไตรมาสที่ 4", category: "ทั่วไป", date: "25 ก.พ. 2569", type: "doc" },
    { id: 4, name: "แผนผังโครงสร้างองค์กร (ฉบับปรับปรุง)", category: "ทรัพยากรบุคคล", date: "20 ก.พ. 2569", type: "pdf" },
    { id: 5, name: "ประกาศมาตรการรักษาความปลอดภัยไอที", category: "ไอที", date: "15 ก.พ. 2569", type: "pdf" },
    { id: 6, name: "บันทึกข้อความขออนุมัติจัดซื้อวัสดุสำนักงาน", category: "พัสดุ", date: "10 ก.พ. 2569", type: "doc" },
];

let isAdmin = false;
const typeStyle = {
    pdf: { icon: 'fa-file-pdf', color: 'text-red-500', bg: 'bg-red-50' },
    xlsx: { icon: 'fa-file-excel', color: 'text-emerald-500', bg: 'bg-emerald-50' },
    doc: { icon: 'fa-file-word', color: 'text-blue-500', bg: 'bg-blue-50' },
    default: { icon: 'fa-file-lines', color: 'text-slate-500', bg: 'bg-slate-50' }
};

/* ======================
    LOGIC
====================== */
function init() {
    updateCategoryDropdown();
    renderList();
}

function renderList() {
    const container = document.getElementById("docList");
    const empty = document.getElementById("emptyState");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    const filtered = documents.filter(d => 
        (d.name.toLowerCase().includes(search)) && 
        (cat === "" || d.category === cat)
    );

    container.innerHTML = "";
    
    if (filtered.length === 0) {
        empty.classList.remove('hidden');
    } else {
        empty.classList.add('hidden');
        filtered.forEach(doc => {
            const style = typeStyle[doc.type] || typeStyle.default;
            container.innerHTML += `
                <div class="doc-card bg-white p-5 rounded-2xl flex flex-col h-full relative overflow-hidden">
                    ${isAdmin ? `<button onclick="deleteDoc(${doc.id})" class="absolute top-2 right-2 w-7 h-7 bg-red-100 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition z-10 text-xs"><i class="fas fa-trash"></i></button>` : ''}
                    
                    <div class="flex items-start gap-4 mb-6">
                        <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-xl ${style.bg} ${style.color} text-xl">
                            <i class="fas ${style.icon}"></i>
                        </div>
                        <div class="min-w-0">
                            <h4 class="font-bold text-slate-800 text-sm leading-snug mb-1 line-clamp-2" title="${doc.name}">${doc.name}</h4>
                            <span class="inline-block text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-wider">${doc.category}</span>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-slate-50 flex items-center justify-between">
                        <div>
                            <p class="text-[9px] uppercase font-bold text-slate-400">วันที่อัปโหลด</p>
                            <p class="text-xs font-semibold text-slate-600">${doc.date}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="previewDoc('${doc.name}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-slate-400 hover:text-blue-600 transition">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                            <button onclick="downloadDoc('${doc.name}')" class="px-3 h-8 flex items-center gap-2 rounded-lg bg-emerald-500 text-white text-[11px] font-bold hover:bg-emerald-600 transition shadow-sm">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }
}

function updateCategoryDropdown() {
    const cats = [...new Set(documents.map(d => d.category))];
    const select = document.getElementById("filterCategory");
    select.innerHTML = '<option value="">ทั้งหมด</option>';
    cats.forEach(c => { select.innerHTML += `<option value="${c}">${c}</option>`; });
}

function filterData() { renderList(); }

/* ======================
    ADMIN FUNCTIONS
====================== */
function toggleAdmin() {
    if (!isAdmin) {
        Swal.fire({
            title: 'เข้าสู่โหมดแอดมิน?',
            text: "คุณจะสามารถเพิ่มและลบข้อมูลเอกสารได้",
            icon: 'shield-alt',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            confirmButtonText: 'ตกลง',
            cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                isAdmin = true;
                applyAdminUI();
            }
        });
    } else {
        isAdmin = false;
        applyAdminUI();
    }
}

function applyAdminUI() {
    const badge = document.getElementById("adminBadge");
    const addBtn = document.getElementById("addBtnArea");
    const mainBtn = document.getElementById("adminBtn");

    if (isAdmin) {
        badge.classList.remove('hidden');
        addBtn.classList.remove('hidden');
        mainBtn.innerHTML = '<i class="fas fa-sign-out-alt mr-2"></i>ออกจากโหมดแอดมิน';
        mainBtn.classList.replace('bg-slate-800', 'bg-orange-500');
    } else {
        badge.classList.add('hidden');
        addBtn.classList.add('hidden');
        mainBtn.innerHTML = '<i class="fas fa-cog mr-2"></i>จัดการระบบ';
        mainBtn.classList.replace('bg-orange-500', 'bg-slate-800');
    }
    renderList();
}

async function addDocument() {
    const { value: formValues } = await Swal.fire({
        title: 'เพิ่มเอกสารใหม่',
        html:
            '<input id="swal-name" class="swal2-input" placeholder="ชื่อเอกสาร">' +
            '<input id="swal-cat" class="swal2-input" placeholder="หมวดหมู่">' +
            '<select id="swal-type" class="swal2-input"><option value="pdf">PDF</option><option value="xlsx">Excel</option><option value="doc">Word</option></select>',
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        preConfirm: () => {
            return {
                name: document.getElementById('swal-name').value,
                cat: document.getElementById('swal-cat').value,
                type: document.getElementById('swal-type').value
            }
        }
    });

    if (formValues && formValues.name) {
        const newDoc = {
            id: Date.now(),
            name: formValues.name,
            category: formValues.cat || "ทั่วไป",
            date: new Date().toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' }),
            type: formValues.type
        };
        documents.unshift(newDoc);
        updateCategoryDropdown();
        renderList();
        Swal.fire('สำเร็จ', 'เพิ่มข้อมูลเรียบร้อยแล้ว', 'success');
    }
}

function deleteDoc(id) {
    Swal.fire({
        title: 'ยืนยันการลบ?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'ลบเลย',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            documents = documents.filter(d => d.id !== id);
            renderList();
            Swal.fire('ลบแล้ว!', 'ข้อมูลถูกนำออกจากระบบ', 'success');
        }
    });
}

function previewDoc(n) { Swal.fire({ title: 'Preview', text: n, icon: 'info' }); }
function downloadDoc(n) { Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ดาวน์โหลด: ' + n, showConfirmButton: false, timer: 1500 }); }

init();
</script>

</body>
</html>
