<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESOS Document Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            background: #F8FAFC;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .doc-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="text-slate-800">

<nav class="glass-nav sticky top-0 z-50 shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fas fa-folder-open text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">ESOS <span class="text-blue-600">E-DOC</span></span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="adminLogin()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg transition font-medium text-sm">
                <i class="fas fa-user-shield"></i>
                <span class="hidden sm:inline">ผู้ดูแลระบบ</span>
            </button>
        </div>
    </div>
</nav>

<section class="max-w-7xl mx-auto px-6 pt-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                <i class="fas fa-file-alt"></i>
            </div>
            <div>
                <p class="text-slate-500 text-xs font-medium uppercase">เอกสารทั้งหมด</p>
                <h3 id="totalDocs" class="text-2xl font-bold">0</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xl">
                <i class="fas fa-layer-group"></i>
            </div>
            <div>
                <p class="text-slate-500 text-xs font-medium uppercase">หมวดหมู่</p>
                <h3 id="totalCats" class="text-2xl font-bold">0</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-green-50 text-green-600 rounded-xl flex items-center justify-center text-xl">
                <i class="fas fa-check-circle"></i>
            </div>
            <div>
                <p class="text-slate-500 text-xs font-medium uppercase">อนุมัติแล้ว</p>
                <h3 class="text-2xl font-bold">128</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center text-xl">
                <i class="fas fa-clock"></i>
            </div>
            <div>
                <p class="text-slate-500 text-xs font-medium uppercase">อัปเดตล่าสุด</p>
                <h3 id="lastDate" class="text-lg font-bold">--/--/--</h3>
            </div>
        </div>
    </div>
</section>

<section class="max-w-7xl mx-auto px-6 py-8">
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
        <div class="relative flex-grow">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อเอกสาร หรือเลขที่อ้างอิง..."
                class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition">
        </div>
        <div class="flex gap-2">
            <select id="filterCategory"
                class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 transition cursor-pointer font-medium text-sm">
                <option value="">ทุกหมวดหมู่</option>
            </select>
            <button onclick="filterData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl transition font-bold shadow-lg shadow-blue-200">
                <i class="fas fa-filter mr-2"></i> กรองข้อมูล
            </button>
        </div>
    </div>
</section>

<section id="docGrid" class="max-w-7xl mx-auto px-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3">
    </section>

<div id="emptyState" class="hidden text-center py-20">
    <i class="fas fa-file-circle-xmark text-6xl text-slate-200 mb-4"></i>
    <p class="text-slate-500 font-medium">ไม่พบเอกสารที่คุณกำลังค้นหา</p>
</div>

<div class="max-w-7xl mx-auto px-6 py-12 flex justify-center">
    <div id="pagination" class="inline-flex items-center bg-white border border-slate-200 rounded-2xl p-1 gap-1 shadow-sm">
        </div>
</div>

<footer class="bg-white border-t border-slate-200 py-8">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <p class="text-slate-500 text-sm">© 2026 <strong>ESOS Enterprise</strong>. All Rights Reserved.</p>
        <div class="flex gap-6 text-slate-400 text-sm">
            <a href="#" class="hover:text-blue-600 transition">คู่มือการใช้งาน</a>
            <a href="#" class="hover:text-blue-600 transition">นโยบายความเป็นส่วนตัว</a>
            <a href="#" class="hover:text-blue-600 transition">ติดต่อสอบถาม</a>
        </div>
    </div>
</footer>

<script>
/* ======================
   DATABASE SAMPLE
====================== */
const documents = [
    { id: "DOC-66001", name: "รายงานการประชุมประจำปี 2568", category: "เอกสารราชการ", date: "2026-03-01", status: "Approved", icon: "fa-file-pdf", color: "text-red-500" },
    { id: "DOC-66002", name: "ใบเสนอราคาโครงการ Smart Office", category: "การเงิน", date: "2026-02-28", status: "Pending", icon: "fa-file-invoice-dollar", color: "text-emerald-500" },
    { id: "DOC-66003", name: "ระเบียบการลาและวันหยุดบริษัท", category: "ทรัพยากรบุคคล", date: "2026-02-25", status: "Approved", icon: "fa-file-lines", color: "text-blue-500" },
    { id: "DOC-66004", name: "คู่มือการติดตั้งระบบเครือข่าย", category: "ไอที", date: "2026-02-20", status: "Draft", icon: "fa-file-code", color: "text-amber-500" },
    { id: "DOC-66005", name: "สัญญาว่าจ้างที่ปรึกษาภายนอก", category: "เอกสารราชการ", date: "2026-02-15", status: "Approved", icon: "fa-file-contract", color: "text-indigo-500" },
    { id: "DOC-66006", name: "สรุปงบประมาณไตรมาสที่ 1", category: "การเงิน", date: "2026-02-10", status: "Approved", icon: "fa-chart-pie", color: "text-emerald-600" },
    { id: "DOC-66007", name: "แผนการดำเนินงาน ESOS 2026", category: "ทั่วไป", date: "2026-02-01", status: "Approved", icon: "fa-rocket", color: "text-purple-500" },
];

let currentPage = 1;
const perPage = 6;
let currentFilteredData = [...documents];

/* ======================
   INITIALIZATION
====================== */
function init() {
    // Set Dashboard Stats
    document.getElementById("totalDocs").innerText = documents.length;
    const cats = [...new Set(documents.map(d => d.category))];
    document.getElementById("totalCats").innerText = cats.length;
    document.getElementById("lastDate").innerText = documents[0].date;

    // Set Category Dropdown
    const catSelect = document.getElementById("filterCategory");
    cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.innerText = c;
        catSelect.appendChild(opt);
    });

    renderGrid();
}

/* ======================
   RENDER LOGIC
====================== */
function renderGrid() {
    const container = document.getElementById("docGrid");
    const emptyState = document.getElementById("emptyState");
    container.innerHTML = "";

    const start = (currentPage - 1) * perPage;
    const subset = currentFilteredData.slice(start, start + perPage);

    if (subset.length === 0) {
        emptyState.classList.remove("hidden");
    } else {
        emptyState.classList.add("hidden");
        subset.forEach(doc => {
            container.innerHTML += `
            <div class="doc-card bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-col h-full">
                <div class="p-6 flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center ${doc.color} text-2xl shadow-inner">
                            <i class="fas ${doc.icon}"></i>
                        </div>
                        <span class="status-badge ${getStatusClass(doc.status)}">${doc.status}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 mb-1 tracking-widest uppercase">${doc.id}</p>
                    <h4 class="font-bold text-lg text-slate-800 leading-tight mb-2 line-clamp-2">${doc.name}</h4>
                    <div class="flex items-center gap-2 text-slate-500 text-xs mb-4">
                        <i class="fas fa-tag"></i> <span>${doc.category}</span>
                        <span class="text-slate-300">|</span>
                        <i class="fas fa-calendar"></i> <span>${doc.date}</span>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                    <button onclick="previewDoc('${doc.name}', '${doc.id}')" 
                        class="flex-grow bg-white hover:bg-blue-600 hover:text-white text-blue-600 border border-blue-200 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2 shadow-sm">
                        <i class="fas fa-eye"></i> เปิดอ่าน
                    </button>
                    <button onclick="downloadDoc('${doc.name}')" 
                        class="w-10 h-10 flex items-center justify-center bg-white hover:bg-slate-100 text-slate-600 border border-slate-200 rounded-lg transition shadow-sm">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            `;
        });
    }

    renderPagination();
}

function getStatusClass(status) {
    switch (status) {
        case 'Approved': return 'bg-green-100 text-green-700';
        case 'Pending': return 'bg-amber-100 text-amber-700';
        case 'Draft': return 'bg-slate-100 text-slate-600';
        default: return 'bg-slate-100 text-slate-600';
    }
}

/* ======================
   SEARCH & FILTER
====================== */
function filterData() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    currentFilteredData = documents.filter(d => {
        const matchSearch = d.name.toLowerCase().includes(search) || d.id.toLowerCase().includes(search);
        const matchCat = cat === "" || d.category === cat;
        return matchSearch && matchCat;
    });

    currentPage = 1;
    renderGrid();
}

// Live Search
document.getElementById("searchInput").addEventListener("keyup", filterData);
document.getElementById("filterCategory").addEventListener("change", filterData);

/* ======================
   PAGINATION
====================== */
function renderPagination() {
    const pages = Math.ceil(currentFilteredData.length / perPage);
    const container = document.getElementById("pagination");
    container.innerHTML = "";

    if (pages <= 1) return;

    for (let i = 1; i <= pages; i++) {
        container.innerHTML += `
        <button onclick="goPage(${i})"
            class="w-10 h-10 flex items-center justify-center rounded-xl text-sm font-bold transition ${
                i === currentPage 
                ? 'bg-blue-600 text-white shadow-md' 
                : 'text-slate-600 hover:bg-slate-100'
            }">
            ${i}
        </button>`;
    }
}

function goPage(p) {
    currentPage = p;
    renderGrid();
    window.scrollTo({ top: 300, behavior: 'smooth' });
}

/* ======================
   INTERACTION FUNCTIONS
====================== */
function previewDoc(name, id) {
    Swal.fire({
        title: 'กำลังเปิดเอกสาร',
        text: `${id}: ${name}`,
        icon: 'info',
        html: `
            <div class="mt-4 p-8 bg-slate-100 rounded-xl border-2 border-dashed border-slate-300">
                <i class="fas fa-file-pdf text-5xl text-red-400 mb-2"></i>
                <p class="text-slate-500">ระบบจำลองการแสดงผล PDF</p>
            </div>
        `,
        showCloseButton: true,
        confirmButtonText: '<i class="fas fa-check mr-2"></i> เข้าใจแล้ว',
        confirmButtonColor: '#2563EB'
    });
}

function downloadDoc(name) {
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
    });
    Toast.fire({
        icon: 'success',
        title: `เริ่มการดาวน์โหลด: ${name}`
    });
}

function adminLogin() {
    Swal.fire({
        title: 'เข้าสู่ระบบผู้ดูแล',
        input: 'password',
        inputAttributes: { autocapitalize: 'off' },
        showCancelButton: true,
        confirmButtonText: 'Login',
        confirmButtonColor: '#2563EB',
        showLoaderOnConfirm: true,
        preConfirm: (login) => {
            if(login === "admin123") return true;
            Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง');
        }
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire('ยินดีต้อนรับ', 'เข้าสู่ระบบจัดการเอกสารเรียบร้อย', 'success');
        }
    });
}

// Run Init
init();
</script>

</body>
</html>
