<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Sarabun', sans-serif;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 1s linear infinite;
    }
    th { @apply p-3 text-sm font-semibold text-left text-gray-700 bg-gray-200; }
    td { @apply p-3 text-sm text-gray-700 border-b border-gray-200; }
  </style>
</head>
<body class="text-gray-800">

  <div id="app" class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="mb-6 bg-white p-6 rounded-xl shadow-lg">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center justify-between w-full md:w-auto">
          <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-teal-400 mr-4">ESOS</h1>
          <p class="text-lg text-gray-600">Easy Submit Online System</p>
        </div>
        <div id="current-date" class="text-md text-gray-500 mt-4 md:mt-0 font-medium"></div>
      </div>
    </header>

    <nav class="mb-6">
      <div class="border-b border-gray-200">
        <ul class="flex flex-wrap -mb-px text-sm font-medium text-center text-gray-500">
          <li class="mr-2">
            <a href="#" onclick="showTab('submit-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-blue-500 rounded-t-lg text-blue-600">
              <i class="fa-solid fa-file-arrow-up mr-2"></i>ส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" onclick="showTab('status-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-list-check mr-2"></i>สถานะส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" onclick="showTab('admin-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-user-shield mr-2"></i>Admin
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main>
      <div id="loading-spinner" class="fixed inset-0 bg-white bg-opacity-75 flex justify-center items-center z-50 hidden">
        <div class="spinner border-4 border-t-4 border-t-blue-500 border-gray-200 rounded-full w-16 h-16"></div>
      </div>
      
      <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-2 px-4 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 z-50">
        <p id="toast-message"></p>
      </div>

      <div id="submit-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg"></div>
      <div id="status-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden"></div>
      <div id="admin-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden"></div>
    </main>

    <div id="modal-container"></div>
  </div>

  <script>
    let allData = [];
    const departments = ["ฝสส.ฯ", "ฝขว.ฯ", "ฝยก.ฯ", "ศสน.ฯ", "ฝปส.ฯ", "ฝกร.ฯ", "ฝยส.ฯ", "ชกส.ฯ", "ฝปพ.ฯ"];

    document.addEventListener('DOMContentLoaded', () => {
      initializeDate();
      loadHtmlPartials();
      initializeForms();
      showTab('submit-tab');
    });

    function initializeDate() {
      const updateClock = () => {
        const now = new Date();
        const thaiDateTime = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Bangkok'
        }).format(now);
        document.getElementById('current-date').textContent = thaiDateTime;
      };
      updateClock();
      setInterval(updateClock, 1000);
    }

    function loadHtmlPartials() {
      document.getElementById('submit-tab').innerHTML = document.getElementById('submit-form-template').innerHTML;
      document.getElementById('status-tab').innerHTML = document.getElementById('status-view-template').innerHTML;
      document.getElementById('admin-tab').innerHTML = document.getElementById('admin-view-template').innerHTML;
      document.getElementById('modal-container').innerHTML = document.getElementById('edit-modal-template').innerHTML;
    }

    function initializeForms() {
      const deptSelects = document.querySelectorAll('.department-select');
      deptSelects.forEach(select => {
        departments.forEach(dept => {
          const option = document.createElement('option');
          option.value = dept;
          option.textContent = dept;
          select.appendChild(option);
        });
      });
      document.getElementById('submission-form').addEventListener('submit', handleFormSubmit);
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
      
      if (tabId === 'status-tab') loadData();
    }

    function showLoading(show) {
      document.getElementById('loading-spinner').classList.toggle('hidden', !show);
    }

    function showToast(message, isSuccess = true) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = message;
      toast.className = `fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg transition-opacity duration-300 z-50 ${isSuccess ? 'bg-green-500' : 'bg-red-500'}`;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 3000);
    }

    // --- CONNECT TO APPS SCRIPT ---

    function handleFormSubmit(event) {
      event.preventDefault();
      const fileInput = document.getElementById('file-input');
      const file = fileInput.files[0];

      if (!file || file.type !== 'application/pdf') {
        showToast("กรุณาแนบไฟล์ PDF", false);
        return;
      }

      showLoading(true);
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function() {
        const formData = {
          department: document.getElementById('department').value,
          docNumber: document.getElementById('docNumber').value,
          subject: document.getElementById('subject').value
        };
        const fileObject = {
          fileData: reader.result,
          fileName: file.name
        };

        google.script.run
          .withSuccessHandler(res => {
            showLoading(false);
            if(res.success) {
              showToast(res.message);
              document.getElementById('submission-form').reset();
              showTab('status-tab');
            }
          })
          .processSubmission(formData, fileObject);
      };
    }

    function loadData() {
      showLoading(true);
      google.script.run.withSuccessHandler(data => {
        allData = data;
        renderStatusTable();
        showLoading(false);
      }).getAllData();
    }

    function renderStatusTable() {
      const tbody = document.getElementById('status-table-body');
      tbody.innerHTML = allData.map((item, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${item.timestamp}</td>
          <td>${item.department}</td>
          <td>${item.docNumber}</td>
          <td class="break-words">${item.subject}</td>
          <td><a href="${item.userFileUrl}" target="_blank" class="text-blue-500">เปิดไฟล์</a></td>
          <td>${item.adminFileUrl ? `<a href="${item.adminFileUrl}" target="_blank" class="text-green-500">ผลตรวจ</a>` : '-'}</td>
          <td><span class="px-2 py-1 rounded text-xs ${getStatusClass(item.status)}">${item.status}</span></td>
        </tr>
      `).join('');
    }

    function getStatusClass(status) {
      if (status === 'อนุมัติ') return 'bg-green-100 text-green-800';
      if (status === 'รอตรวจ') return 'bg-yellow-100 text-yellow-800';
      return 'bg-gray-100 text-gray-800';
    }

    function handleAdminLogin() {
      const pass = document.getElementById('admin-password').value;
      if (pass === 'admin1234') {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').style.display = 'block';
        loadAdminData();
      } else {
        showToast("รหัสผ่านไม่ถูกต้อง", false);
      }
    }

    function loadAdminData() {
        google.script.run.withSuccessHandler(data => {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = data.map((item, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${item.timestamp}</td>
                    <td>${item.department}</td>
                    <td>${item.docNumber}</td>
                    <td>${item.status}</td>
                    <td><button onclick='openEditModal(${JSON.stringify(item)})' class="text-blue-600"><i class="fa-solid fa-pen"></i></button></td>
                </tr>
            `).join('');
        }).getAllData();
    }

    function openEditModal(item) {
        document.getElementById('edit-record-id').value = item.id;
        document.getElementById('edit-docNumber-display').textContent = item.docNumber;
        document.getElementById('edit-subject-display').textContent = item.subject;
        document.getElementById('edit-status').value = item.status;
        document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEditModal() {
        document.getElementById('edit-modal').classList.add('hidden');
    }

    function handleUpdateRecord(event) {
        event.preventDefault();
        showLoading(true);
        const recordData = {
            id: document.getElementById('edit-record-id').value,
            status: document.getElementById('edit-status').value
        };
        const adminFile = document.getElementById('admin-file-input').files[0];
        
        if (adminFile) {
            const reader = new FileReader();
            reader.readAsDataURL(adminFile);
            reader.onload = () => {
                google.script.run.withSuccessHandler(() => {
                    showLoading(false);
                    closeEditModal();
                    loadAdminData();
                }).updateRecord(recordData, {fileData: reader.result, fileName: adminFile.name});
            };
        } else {
            google.script.run.withSuccessHandler(() => {
                showLoading(false);
                closeEditModal();
                loadAdminData();
            }).updateRecord(recordData, null);
        }
    }
  </script>

  <script type="text/html" id="submit-form-template">
    <form id="submission-form" class="space-y-6">
        <h2 class="text-2xl font-semibold border-b pb-2">แบบฟอร์มส่งเอกสาร</h2>
        <div>
            <label class="block mb-2 text-sm font-medium">ฝ่ายอำนวยการ</label>
            <select id="department" class="department-select w-full p-2.5 bg-gray-50 border rounded-lg" required>
                <option value="" disabled selected>-- กรุณาเลือก --</option>
            </select>
        </div>
        <div>
            <label class="block mb-2 text-sm font-medium">ที่หนังสือ</label>
            <input type="text" id="docNumber" class="w-full p-2.5 bg-gray-50 border rounded-lg" placeholder="กค 0405.6/123" required>
        </div>
        <div>
            <label class="block mb-2 text-sm font-medium">ชื่อเรื่อง</label>
            <textarea id="subject" rows="4" class="w-full p-2.5 bg-gray-50 border rounded-lg" required></textarea>
        </div>
        <div>
            <label class="block mb-2 text-sm font-medium">แนบไฟล์ PDF</label>
            <input id="file-input" type="file" accept=".pdf" class="w-full text-sm border rounded-lg cursor-pointer bg-gray-50" required>
        </div>
        <button type="submit" class="w-full text-white bg-blue-600 py-3 rounded-lg hover:bg-blue-700">ส่งเอกสาร</button>
    </form>
  </script>

  <script type="text/html" id="status-view-template">
    <h2 class="text-2xl font-semibold border-b pb-2 mb-4">สถานะการส่งงาน</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr>
            <th>ลำดับ</th><th>วันที่ส่ง</th><th>ฝ่าย</th><th>ที่หนังสือ</th><th>เรื่อง</th><th>ไฟล์</th><th>ผลตรวจ</th><th>สถานะ</th>
          </tr>
        </thead>
        <tbody id="status-table-body"></tbody>
      </table>
    </div>
  </script>

  <script type="text/html" id="admin-view-template">
    <div id="admin-login" class="max-w-md mx-auto text-center py-10">
      <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
      <input type="password" id="admin-password" placeholder="รหัสผ่าน" class="w-full p-3 border rounded-lg mb-4">
      <button onclick="handleAdminLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg">เข้าสู่ระบบ</button>
    </div>
    <div id="admin-panel" style="display:none">
        <h2 class="text-2xl font-bold mb-4">Admin Control Panel</h2>
        <table class="w-full">
            <thead><tr><th>ลำดับ</th><th>วันที่</th><th>ฝ่าย</th><th>ที่หนังสือ</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>
  </script>

  <script type="text/html" id="edit-modal-template">
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
      <div class="bg-white p-6 rounded-lg w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">แก้ไขสถานะ</h3>
        <form onsubmit="handleUpdateRecord(event)">
            <input type="hidden" id="edit-record-id">
            <p id="edit-docNumber-display" class="mb-2 font-bold"></p>
            <p id="edit-subject-display" class="mb-4 text-sm text-gray-600"></p>
            <select id="edit-status" class="w-full p-2 border mb-4">
                <option value="รอตรวจ">รอตรวจ</option>
                <option value="อนุมัติ">อนุมัติ</option>
                <option value="ไปแก้มาใหม่">ไปแก้มาใหม่</option>
            </select>
            <input type="file" id="admin-file-input" accept=".pdf" class="mb-4 w-full">
            <div class="flex justify-end gap-2">
                <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 rounded">ยกเลิก</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">บันทึก</button>
            </div>
        </form>
      </div>
    </div>
  </script>

</body>
</html>
