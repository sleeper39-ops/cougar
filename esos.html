<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body { background-color: #f3f4f6; font-family: 'Sarabun', sans-serif; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    th { @apply p-3 text-sm font-semibold text-left text-gray-700 bg-gray-200; }
    td { @apply p-3 text-sm text-gray-700 border-b border-gray-200; }
    .tab-link.active { @apply border-blue-500 text-blue-600; }
  </style>
</head>
<body class="text-gray-800">

  <div id="app" class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="mb-6 bg-white p-6 rounded-xl shadow-lg">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center justify-between w-full md:w-auto">
          <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-teal-400 mr-4">ESOS</h1>
          <p class="text-lg text-gray-600">Easy Submit Online System</p>
        </div>
        <div id="current-date" class="text-md text-gray-500 mt-4 md:mt-0 font-medium"></div>
      </div>
    </header>

    <nav class="mb-6">
      <div class="border-b border-gray-200">
        <ul class="flex flex-wrap -mb-px text-sm font-medium text-center text-gray-500">
          <li class="mr-2">
            <a href="#" id="link-submit" onclick="showTab('submit-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-blue-500 rounded-t-lg text-blue-600">
              <i class="fa-solid fa-file-arrow-up mr-2"></i>ส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" id="link-status" onclick="showTab('status-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-list-check mr-2"></i>สถานะส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" id="link-admin" onclick="showTab('admin-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-user-shield mr-2"></i>Admin
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main>
      <div id="loading-spinner" class="fixed inset-0 bg-white bg-opacity-75 flex justify-center items-center z-50 hidden">
        <div class="flex flex-col items-center">
            <div class="spinner border-4 border-t-4 border-t-blue-500 border-gray-200 rounded-full w-16 h-16"></div>
            <p class="mt-4 text-blue-600 font-medium">กำลังดำเนินการ...</p>
        </div>
      </div>
      
      <div id="toast" class="fixed top-5 right-5 text-white py-3 px-6 rounded-lg shadow-2xl opacity-0 transition-opacity duration-300 z-[100] pointer-events-none">
        <p id="toast-message"></p>
      </div>

      <div id="submit-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg"></div>
      <div id="status-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden"></div>
      <div id="admin-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden"></div>
    </main>

    <div id="modal-container"></div>
  </div>

  <script>
    let allData = [];
    const departments = ["ฝสส.ฯ", "ฝขว.ฯ", "ฝยก.ฯ", "ศสน.ฯ", "ฝปส.ฯ", "ฝกร.ฯ", "ฝยส.ฯ", "ชกส.ฯ", "ฝปพ.ฯ"];

    document.addEventListener('DOMContentLoaded', () => {
      initializeDate();
      loadHtmlPartials();
      initializeForms();
      showTab('submit-tab');
    });

    function initializeDate() {
      const updateClock = () => {
        const now = new Date();
        const thaiDateTime = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Bangkok'
        }).format(now);
        document.getElementById('current-date').textContent = thaiDateTime;
      };
      updateClock();
      setInterval(updateClock, 1000);
    }

    function loadHtmlPartials() {
      document.getElementById('submit-tab').innerHTML = document.getElementById('submit-form-template').innerHTML;
      document.getElementById('status-tab').innerHTML = document.getElementById('status-view-template').innerHTML;
      document.getElementById('admin-tab').innerHTML = document.getElementById('admin-view-template').innerHTML;
      document.getElementById('modal-container').innerHTML = document.getElementById('edit-modal-template').innerHTML;
    }

    function initializeForms() {
      const deptSelects = document.querySelectorAll('.department-select');
      deptSelects.forEach(select => {
        departments.forEach(dept => {
          const option = document.createElement('option');
          option.value = dept;
          option.textContent = dept;
          select.appendChild(option);
        });
      });
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
      
      // Update Tab Styles
      document.querySelectorAll('.tab-link').forEach(link => {
          link.classList.remove('border-blue-500', 'text-blue-600');
          link.classList.add('border-transparent');
      });
      const activeLink = document.querySelector(`[onclick="showTab('${tabId}'); return false;"]`);
      activeLink.classList.add('border-blue-500', 'text-blue-600');
      activeLink.classList.remove('border-transparent');

      if (tabId === 'status-tab') loadData();
    }

    function showLoading(show) {
      document.getElementById('loading-spinner').classList.toggle('hidden', !show);
    }

    function showToast(message, isSuccess = true) {
      const toast = document.getElementById('toast');
      const msgBox = document.getElementById('toast-message');
      msgBox.textContent = message;
      toast.className = `fixed top-5 right-5 text-white py-3 px-6 rounded-lg shadow-2xl transition-opacity duration-300 z-[100] ${isSuccess ? 'bg-green-600' : 'bg-red-600'}`;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 4000);
    }

    // --- SERVER COMMUNICATION ---

    function handleFormSubmit(event) {
      event.preventDefault();
      const fileInput = document.getElementById('file-input');
      const file = fileInput.files[0];

      if (!file || file.type !== 'application/pdf') {
        showToast("กรุณาแนบไฟล์ PDF เท่านั้น", false);
        return;
      }

      showLoading(true);
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function() {
        const formData = {
          department: document.getElementById('department').value,
          docNumber: document.getElementById('docNumber').value,
          subject: document.getElementById('subject').value
        };
        const fileObject = {
          fileData: reader.result,
          fileName: file.name
        };

        google.script.run
          .withSuccessHandler(res => {
            showLoading(false);
            if(res.success) {
              showToast(res.message);
              document.getElementById('submission-form').reset();
              showTab('status-tab');
            } else {
              showToast("เกิดข้อผิดพลาด: " + res.message, false);
            }
          })
          .withFailureHandler(err => {
            showLoading(false);
            showToast("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้: " + err, false);
          })
          .processSubmission(formData, fileObject);
      };
      reader.onerror = function() {
          showLoading(false);
          showToast("ไม่สามารถอ่านไฟล์ได้", false);
      };
    }

    function loadData() {
      showLoading(true);
      google.script.run
        .withSuccessHandler(data => {
          allData = data;
          renderStatusTable();
          showLoading(false);
        })
        .withFailureHandler(err => {
          showLoading(false);
          showToast("โหลดข้อมูลไม่สำเร็จ: " + err, false);
        })
        .getAllData();
    }

    function renderStatusTable() {
      const tbody = document.getElementById('status-table-body');
      if (!allData || allData.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-gray-400">ไม่พบข้อมูลการส่งงาน</td></tr>`;
          return;
      }
      tbody.innerHTML = allData.map((item, idx) => `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="font-medium">${idx + 1}</td>
          <td>${item.timestamp}</td>
          <td><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold">${item.department}</span></td>
          <td class="font-mono text-xs">${item.docNumber}</td>
          <td class="max-w-xs truncate" title="${item.subject}">${item.subject}</td>
          <td><a href="${item.userFileUrl}" target="_blank" class="text-blue-600 hover:underline"><i class="fa-solid fa-file-pdf mr-1"></i>ดูไฟล์</a></td>
          <td>${item.adminFileUrl ? `<a href="${item.adminFileUrl}" target="_blank" class="text-green-600 hover:underline font-bold"><i class="fa-solid fa-file-circle-check mr-1"></i>ผลตรวจ</a>` : '<span class="text-gray-300">-</span>'}</td>
          <td><span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${getStatusClass(item.status)}">${item.status}</span></td>
        </tr>
      `).join('');
    }

    function getStatusClass(status) {
      if (status === 'อนุมัติ') return 'bg-green-100 text-green-800 border border-green-200';
      if (status === 'รอตรวจ') return 'bg-yellow-100 text-yellow-800 border border-yellow-200';
      if (status === 'ไปแก้มาใหม่') return 'bg-red-100 text-red-800 border border-red-200';
      return 'bg-gray-100 text-gray-800 border border-gray-200';
    }

    function handleAdminLogin() {
      const pass = document.getElementById('admin-password').value;
      if (pass === 'admin1234') { // แนะนำให้ใช้รหัสที่ปลอดภัยกว่านี้
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').style.display = 'block';
        loadAdminData();
      } else {
        showToast("รหัสผ่านไม่ถูกต้อง", false);
      }
    }

    function loadAdminData() {
        showLoading(true);
        google.script.run.withSuccessHandler(data => {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = data.map((item, idx) => `
                <tr class="hover:bg-gray-50">
                    <td>${idx + 1}</td>
                    <td class="text-xs">${item.timestamp}</td>
                    <td class="font-bold">${item.department}</td>
                    <td>${item.docNumber}</td>
                    <td><span class="px-2 py-1 rounded-full text-[10px] ${getStatusClass(item.status)}">${item.status}</span></td>
                    <td>
                      <button onclick='openEditModal(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-100 transition-colors">
                        <i class="fa-solid fa-pen-to-square"></i> จัดการ
                      </button>
                    </td>
                </tr>
            `).join('');
            showLoading(false);
        }).getAllData();
    }

    function openEditModal(item) {
        document.getElementById('edit-record-id').value = item.id;
        document.getElementById('edit-docNumber-display').textContent = item.docNumber;
        document.getElementById('edit-subject-display').textContent = item.subject;
        document.getElementById('edit-status').value = item.status;
        document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEditModal() {
        document.getElementById('edit-modal').classList.add('hidden');
        document.getElementById('admin-file-input').value = ""; // Reset file input
    }

    function handleUpdateRecord(event) {
        event.preventDefault();
        showLoading(true);
        const recordData = {
            id: document.getElementById('edit-record-id').value,
            status: document.getElementById('edit-status').value
        };
        const adminFile = document.getElementById('admin-file-input').files[0];
        
        const finishUpdate = (fileObj) => {
            google.script.run
              .withSuccessHandler(res => {
                  showLoading(false);
                  if(res.success) {
                      showToast("อัปเดตเรียบร้อย");
                      closeEditModal();
                      loadAdminData();
                  } else {
                      showToast(res.message, false);
                  }
              })
              .withFailureHandler(err => {
                  showLoading(false);
                  showToast("การอัปเดตล้มเหลว: " + err, false);
              })
              .updateRecord(recordData, fileObj);
        };

        if (adminFile) {
            const reader = new FileReader();
            reader.readAsDataURL(adminFile);
            reader.onload = () => finishUpdate({fileData: reader.result, fileName: adminFile.name});
        } else {
            finishUpdate(null);
        }
    }
  </script>

  <script type="text/html" id="submit-form-template">
    <div class="max-w-2xl mx-auto py-4">
        <form id="submission-form" onsubmit="handleFormSubmit(event)" class="space-y-6">
            <div class="flex items-center gap-3 mb-4 text-blue-600">
                <i class="fa-solid fa-circle-plus text-3xl"></i>
                <h2 class="text-2xl font-bold">แบบฟอร์มส่งเอกสาร</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block mb-2 text-sm font-semibold text-gray-700">ฝ่ายอำนวยการ <span class="text-red-500">*</span></label>
                    <select id="department" class="department-select w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition-all" required>
                        <option value="" disabled selected>เลือกฝ่ายของคุณ</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 text-sm font-semibold text-gray-700">เลขที่หนังสือ <span class="text-red-500">*</span></label>
                    <input type="text" id="docNumber" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" placeholder="เช่น กค 0405.6/123" required>
                </div>
            </div>

            <div>
                <label class="block mb-2 text-sm font-semibold text-gray-700">ชื่อเรื่อง/ธุรการ <span class="text-red-500">*</span></label>
                <textarea id="subject" rows="3" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" placeholder="ระบุรายละเอียดหรือชื่อเรื่อง..." required></textarea>
            </div>

            <div class="p-6 border-2 border-dashed border-gray-300 rounded-xl bg-blue-50 hover:bg-blue-100 transition-colors cursor-pointer relative">
                <input id="file-input" type="file" accept=".pdf" class="absolute inset-0 opacity-0 cursor-pointer" required onchange="this.nextElementSibling.innerText = this.files[0].name">
                <div class="text-center">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-400 mb-2"></i>
                    <p class="text-gray-600 font-medium">คลิกเพื่อแนบไฟล์ PDF หรือลากไฟล์มาวางที่นี่</p>
                    <p class="text-xs text-gray-400 mt-1">เฉพาะไฟล์ .pdf เท่านั้น</p>
                </div>
            </div>

            <button type="submit" class="w-full text-white bg-gradient-to-r from-blue-600 to-blue-700 py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl hover:from-blue-700 hover:to-blue-800 transform hover:-translate-y-0.5 transition-all">
                <i class="fa-solid fa-paper-plane mr-2"></i> ยืนยันการส่งเอกสาร
            </button>
        </form>
    </div>
  </script>

  <script type="text/html" id="status-view-template">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-list-check mr-2 text-blue-500"></i>รายการส่งงานของคุณ</h2>
        <button onclick="loadData()" class="text-blue-600 hover:rotate-180 transition-transform duration-500 p-2">
            <i class="fa-solid fa-rotate"></i>
        </button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-gray-200">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr>
            <th>#</th><th>วันที่/เวลา</th><th>ฝ่าย</th><th>ที่หนังสือ</th><th>เรื่อง</th><th>ไฟล์ส่ง</th><th>ไฟล์ตอบกลับ</th><th>สถานะ</th>
          </tr>
        </thead>
        <tbody id="status-table-body">
            <tr><td colspan="8" class="text-center py-10"><div class="spinner border-2 border-t-2 border-blue-500 rounded-full w-6 h-6 mx-auto"></div></td></tr>
        </tbody>
      </table>
    </div>
  </script>

  <script type="text/html" id="admin-view-template">
    <div id="admin-login" class="max-w-md mx-auto py-20 px-6 bg-white rounded-2xl">
      <div class="text-center mb-8">
          <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-lock text-4xl text-blue-600"></i>
          </div>
          <h2 class="text-2xl font-bold text-gray-800">ผู้ดูแลระบบ</h2>
          <p class="text-gray-500">กรุณากรอกรหัสผ่านเพื่อเข้าถึงการจัดการ</p>
      </div>
      <input type="password" id="admin-password" placeholder="รหัสผ่าน" class="w-full p-4 border border-gray-300 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-center">
      <button onclick="handleAdminLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-md">เข้าสู่ระบบ</button>
    </div>
    
    <div id="admin-panel" style="display:none">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Admin Control Panel</h2>
            <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold">Admin Mode</span>
        </div>
        <div class="overflow-x-auto rounded-xl border border-gray-200">
            <table class="w-full">
                <thead><tr><th>#</th><th>วันที่</th><th>ฝ่าย</th><th>ที่หนังสือ</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
  </script>

  <script type="text/html" id="edit-modal-template">
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex justify-center items-center z-[200] p-4">
      <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl transform transition-all">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">จัดการรายการเอกสาร</h3>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        
        <form onsubmit="handleUpdateRecord(event)" class="space-y-5">
            <input type="hidden" id="edit-record-id">
            <div class="bg-gray-50 p-4 rounded-xl mb-4">
                <p class="text-xs text-gray-500 uppercase font-bold mb-1">เลขที่หนังสือ</p>
                <p id="edit-docNumber-display" class="font-bold text-blue-700"></p>
                <div class="mt-3">
                    <p class="text-xs text-gray-500 uppercase font-bold mb-1">เรื่อง</p>
                    <p id="edit-subject-display" class="text-sm text-gray-600 leading-relaxed"></p>
                </div>
            </div>

            <div>
                <label class="block mb-2 text-sm font-bold text-gray-700">อัปเดตสถานะ</label>
                <select id="edit-status" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="รอตรวจ">รอตรวจ</option>
                    <option value="อนุมัติ">อนุมัติ</option>
                    <option value="ไปแก้มาใหม่">ไปแก้มาใหม่</option>
                    <option value="ไม่อนุมัติ">ไม่อนุมัติ</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 text-sm font-bold text-gray-700">แนบไฟล์ตอบกลับ (ถ้ามี)</label>
                <input type="file" id="admin-file-input" accept=".pdf" class="w-full text-sm border border-gray-300 rounded-xl cursor-pointer bg-gray-50 file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>

            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">บันทึกข้อมูล</button>
            </div>
        </form>
      </div>
    </div>
  </script>

</body>
</html>
