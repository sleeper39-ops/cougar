<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management System v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.5rem; letter-spacing: 1px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ปรับปรุงหน้าตา Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #000; margin-bottom: 8px; }
        .stat-label { font-size: 13px; color: #888; }

        /* Admin Control Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-img-container { width: 100%; height: 180px; background: #222; cursor: zoom-in; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; flex-grow: 1; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>System Console</h2>
        <a onclick="window.showPage('dash-page', this)" id="nav-dash" class="active"><i class="fas fa-chart-pie"></i> Overview</a>
        <a onclick="window.showPage('live-page', this)" id="nav-live"><i class="fas fa-video"></i> Monitoring</a>
        <a onclick="window.showPage('map-page', this)" id="nav-map"><i class="fas fa-map-marked-alt"></i> Network Map</a>
        <a onclick="window.showPage('calendar-page', this)" id="nav-cal"><i class="fas fa-calendar-alt"></i> Schedule</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Overview</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight: 500;" onclick="window.toggleAuth()">
                <i class="fas fa-lock"></i> Staff Login
            </button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock" style="color:#2ecc71;"></i>
                        <div class="stat-value" id="dash-time">00:00:00</div>
                        <div class="stat-label">System Time</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-database" style="color:#3498db;"></i>
                        <div class="stat-value" id="dash-count">0 Items</div>
                        <div class="stat-label">Total Assets</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-shield-halved" id="status-icon" style="color:#95a5a6;"></i>
                        <div class="stat-value" id="dash-status">Restricted Mode</div>
                        <div class="stat-label">Access Level</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0;"><i class="fas fa-sliders"></i> Configuration</h3>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span style="font-size:12px; font-weight:bold; color:var(--danger);">Global Lock</span>
                                <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                            </div>
                            <button onclick="window.changeDownloadPass()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; font-size:13px; cursor:pointer;">
                                <i class="fas fa-key"></i> Update Access Key
                            </button>
                        </div>
                    </div>

                    <div class="form-row">
                        <input type="hidden" id="editKey">
                        <div class="input-group"><label>Asset Name</label><input type="text" id="itemName" placeholder="Name..."></div>
                        <div class="input-group"><label>Thumbnail URL</label><input type="text" id="itemImg" placeholder="https://..."></div>
                        <div class="input-group"><label>Resource Link</label><input type="text" id="itemLink" placeholder="https://..."></div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="window.saveItem()" id="btn-save" class="btn-download" style="background:var(--success); color:white; margin:0; padding:0 25px;">Save</button>
                            <button onclick="window.resetForm()" class="btn-download" style="background:var(--secondary); color:white; margin:0; padding:0 20px;">Clear</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content">
                <iframe src="cctv.html" sandbox="allow-scripts allow-same-origin" loading="lazy" style="width:100%; height:100%; border:none;"></iframe>
            </div>
            <div id="map-page" class="page-content">
                <iframe src="map.html" sandbox="allow-scripts allow-same-origin" loading="lazy" style="width:100%; height:100%; border:none;"></iframe>
            </div>
            <div id="calendar-page" class="page-content">
                <iframe src="calendar.html" sandbox="allow-scripts allow-same-origin" loading="lazy" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
