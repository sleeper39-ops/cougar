<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 Docks UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Stats Grid */
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2rem; margin-bottom: 10px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #333; }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-action { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; height: 41px; }

        /* Grid & Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .download-card:hover { transform: translateY(-5px); }
        .card-img-container { width: 100%; height: 180px; background: #222; cursor: zoom-in; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .download-info { padding: 20px; text-align: center; flex-grow: 1; }
        .download-info h4 { margin: 0 0 15px 0; font-size: 16px; color: #333; min-height: 40px; }
        
        /* Modal & Helpers */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .page-content { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="window.performLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">เข้าสู่ระบบ</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="window.showPage('dash-page', this)" id="nav-dash" class="active"><i class="fas fa-home"></i> Obs Docks UI</a>
        <a onclick="window.showPage('live-page', this)" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="window.showPage('map-page', this)" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="window.showPage('calendar-page', this)" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
        <a onclick="window.showPage('esos-page', this)" id="nav-esos"><i class="fas fa-rocket"></i> ระบบ ESOS</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title" style="margin:0; font-size:1.2rem; color:#444;">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="window.toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock" style="color:#2ecc71;"></i>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-users" style="color:#e67e22;"></i>
                        <div class="stat-value" id="stat-online">0</div>
                        <div class="stat-label">กำลังออนไลน์ (คน)</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-eye" style="color:#9b59b6;"></i>
                        <div class="stat-value" id="stat-visits">0</div>
                        <div class="stat-label">ผู้เข้าชมทั้งหมด (ครั้ง)</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-folder-open" style="color:#3498db;"></i>
                        <div class="stat-value" id="dash-count">0</div>
                        <div class="stat-label">ไฟล์ในระบบ (รายการ)</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0;"><i class="fas fa-tools"></i> Admin Control</h3>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:12px; font-weight:bold; color:var(--danger);">Lock All</span>
                            <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                        </div>
                    </div>

                    <div class="form-row">
                        <input type="hidden" id="editKey">
                        <div class="input-group">
                            <label>ชื่อไฟล์</label>
                            <input type="text" id="itemName" placeholder="เช่น โปรแกรม OBS...">
                        </div>
                        <div class="input-group">
                            <label>ลิงก์รูปภาพ</label>
                            <input type="text" id="itemImg" placeholder="https://...">
                        </div>
                        <div class="input-group">
                            <label>ลิงก์ดาวน์โหลด / อัพโหลดไฟล์</label>
                            <input type="text" id="itemLink" placeholder="วางลิงก์ที่นี่..." style="margin-bottom:5px;">
                            <input type="file" id="itemFile" style="font-size:11px;">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="window.saveItem()" id="btn-save" class="btn-action" style="background:var(--success);">บันทึก</button>
                            <button onclick="window.resetForm()" class="btn-action" style="background:var(--secondary);">ยกเลิก</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid">
                    </div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="esos-page" class="page-content"><iframe src="esos.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center;" onclick="this.style.display='none'">
        <img id="lightboxImg" style="max-width:90%; max-height:90%; border-radius:10px;">
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
