<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Cloud Integrated System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 280px; /* ขยับความกว้างออกมาทางขวาอีก */
            --sidebar-bg: #1a1c1e;
            --sidebar-hover: #2c2f33;
            --primary-blue: #3498db;
            --bg-light: #f4f6f9;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background: var(--bg-light); overflow: hidden; }

        /* --- Sidebar ปรับปรุงใหม่ --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            padding-top: 25px; 
            flex-shrink: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar h1 { text-align: center; font-size: 1.8rem; margin-bottom: 40px; color: var(--primary-blue); letter-spacing: 2px; }
        
        .nav-item { 
            padding: 18px 30px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 20px; /* เพิ่มระยะห่างระหว่าง Icon กับ Text */
            transition: all 0.3s ease; 
            color: #adb5bd; 
            font-size: 16px; /* ปรับขนาดตัวอักษรเมนู */
            text-decoration: none;
            border-left: 5px solid transparent;
        }

        /* ขยายขนาด Icon */
        .nav-item i { 
            font-size: 1.4rem; /* ขนาดไอคอนใหญ่ขึ้นตามสั่ง */
            width: 25px; 
            text-align: center;
        }

        .nav-item:hover { 
            background: var(--sidebar-hover); 
            color: #ffffff; 
            padding-left: 40px; 
        }

        .nav-item.active { 
            background: #24272b; 
            color: white; 
            border-left: 5px solid var(--primary-blue); 
        }

        /* --- Main Content Area --- */
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-header { 
            height: 65px; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 35px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* Container สำหรับแสดงเนื้อหาหน้าเว็บต่างๆ */
        #content-frame-container { 
            flex: 1; 
            width: 100%; 
            height: 100%;
            border: none;
            background: var(--bg-light);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Cougar2</h1>
        <div class="nav-item active" onclick="switchPage('dashboard', this)">
            <i class="fas fa-home"></i> <span>หน้าหลัก</span>
        </div>
        <div class="nav-item" onclick="switchPage('cctv.html', this)">
            <i class="fas fa-video"></i> <span>ระบบกล้องสด</span>
        </div>
        <div class="nav-item" onclick="switchPage('map.html', this)">
            <i class="fas fa-map-marked-alt"></i> <span>แผนที่ระบบ</span>
        </div>
        <div class="nav-item" onclick="switchPage('calendar.html', this)">
            <i class="fas fa-calendar-alt"></i> <span>ปฏิทินงาน</span>
        </div>
    </div>

    <div class="wrapper">
        <div class="top-header">
            <h2 id="current-title">Dashboard</h2>
            <div id="admin-status" style="font-size: 14px; color: #7f8c8d;">
                <i class="fas fa-circle" style="color: #2ecc71; font-size: 10px;"></i> System Online
            </div>
        </div>

        <div id="content-frame-container">
            <iframe src="about:blank" id="main-iframe"></iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('main-iframe');
        const titleText = document.getElementById('current-title');

        // ฟังก์ชันสลับหน้าเว็บ
        function switchPage(url, element) {
            // 1. ปรับสถานะปุ่มใน Sidebar
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // 2. เปลี่ยนหัวข้อ
            const label = element.querySelector('span').innerText;
            titleText.innerText = label;

            // 3. โหลดไฟล์ HTML เข้ามาในฝั่งขวา
            if(url === 'dashboard') {
                // หากหน้าหลักอยู่ในไฟล์เดียวกัน ให้ใส่ Logic หรือโหลดหน้า home.html
                iframe.srcdoc = `
                    <div style="font-family:sans-serif; padding:50px; text-align:center; color:#555;">
                        <h2>ยินดีต้อนรับสู่ระบบ Cougar2</h2>
                        <p>กรุณาเลือกเมนูทางด้านซ้ายเพื่อเริ่มใช้งาน</p>
                    </div>`;
            } else {
                iframe.src = url; // โหลด cctv.html, map.html ฯลฯ
            }
        }

        // ตั้งค่าหน้าเริ่มต้น
        window.onload = () => {
            switchPage('dashboard', document.querySelector('.nav-item'));
        };
    </script>
</body>
</html>
