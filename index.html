<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - CCTV SYSTEM</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #msg { color: #e74c3c; font-size: 14px; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>📡 CCTV Login</h2>
    <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    <p id="msg"></p>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const msg = document.getElementById("msg");

        // แก้ไขเงื่อนไขการตรวจสอบที่นี่
        // ตัวอย่าง: username คือ admin และ password คือ 1234
        if (user === "admin" && pass === "admin2") {
            // 1. สร้าง "บัตรผ่าน" ลงในเครื่อง (สำคัญมาก!)
            sessionStorage.setItem("isLoggedIn", "true");
            
            // 2. ส่งไปหน้าแผนที่ (ตรวจสอบว่าชื่อไฟล์ตรงกัน)
            window.location.href = "map.html"; 
        } else {
            msg.innerText = "ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง";
            // ล้างค่ารหัสผ่านเพื่อให้พิมพ์ใหม่
            document.getElementById("password").value = "";
        }
    }

    // ดักจับการกดปุ่ม Enter
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkLogin();
        }
    });
</script>

</body>
</html>
