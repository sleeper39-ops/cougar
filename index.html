<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Firebase Cloud Dashboard</title>
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 280px;
            --text-grey: #888888;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; letter-spacing: 2px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 16px 25px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; font-size: 16px; }
        .sidebar a svg { width: 22px; height: 22px; fill: currentColor; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; padding-left: 30px; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .top-nav { height: 65px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 35px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Views */
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        .stat-box .icon-container { 
            width: 3.5rem; height: 3.5rem; margin: 0 auto 12px auto;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease;
        }
        .stat-box svg { width: 100%; height: 100%; }
        .stat-box:hover .icon-container { transform: scale(1.1); }
        
        .stat-value { font-size: 1.6rem; font-weight: 800; color: #2c3e50; line-height: 1.2; }
        .stat-label { font-size: 12px; color: var(--text-grey); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }

        /* Admin UI */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Download Grid */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 180px; object-fit: contain; background: #222; }
        .btn-download { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-download svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
        <div class="login-card" style="background: white; padding: 35px; border-radius: 20px; width: 350px; text-align: center;">
            <h3 style="margin-top:0;">Admin Login</h3>
            <input type="text" id="loginUser" placeholder="Username" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            <input type="password" id="loginPass" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            <button onclick="performLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">เข้าสู่ระบบ</button>
            <p onclick="document.getElementById('loginModal').style.display='none'" style="cursor:pointer; color:#999; font-size:12px; margin-top:15px;">ยกเลิก</p>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page', this)" class="active" id="btn-home-nav"></a>
        <a onclick="showPage('live-page', this)" id="btn-live-nav"></a>
        <a onclick="showPage('map-page', this)" id="btn-map-nav"></a>
        <a onclick="showPage('calendar-page', this)" id="btn-cal-nav"></a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">หน้าหลัก</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <div class="icon-container" style="color:#2ecc71" id="svg-clock"></div>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <div class="icon-container" style="color:#3498db" id="svg-folder"></div>
                        <div class="stat-value" id="dash-count">0 รายการ</div>
                        <div class="stat-label">ไฟล์ในระบบ</div>
                    </div>
                    <div class="stat-box">
                        <div class="icon-container" id="status-icon-container"></div>
                        <div class="stat-value" id="dash-status">Guest Mode</div>
                        <div class="stat-label">โหมดการใช้งาน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h4 style="margin:0;">Admin Control</h4>
                        <div>
                            <span style="font-size:12px; font-weight:bold; color:var(--danger);">Lock All</span>
                            <input type="checkbox" id="globalLock" onchange="toggleGlobalLock()">
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editKey">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; padding:0 20px; height:40px;">บันทึก</button>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1SGjQXgfQykrV-psyDDwWbuqfTlE7Zhk",
            authDomain: "cougar2-database.firebaseapp.com",
            databaseURL: "https://cougar2-database-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cougar2-database",
            storageBucket: "cougar2-database.firebasestorage.app",
            messagingSenderId: "429808185249",
            appId: "1:429808185249:web:4afa08e0a7a973b00d25e0"
        };

        const icons = {
            home: `<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>`,
            video: `<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>`,
            map: `<svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>`,
            calendar: `<svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>`,
            clock: `<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
            folder: `<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`,
            shield: `<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>`,
            download: `<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`,
            lock: `<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>`
        };

        // Render Static Icons
        document.getElementById('btn-home-nav').innerHTML = icons.home + ' หน้าหลัก';
        document.getElementById('btn-live-nav').innerHTML = icons.video + ' ระบบกล้องสด';
        document.getElementById('btn-map-nav').innerHTML = icons.map + ' แผนที่ระบบ';
        document.getElementById('btn-cal-nav').innerHTML = icons.calendar + ' ปฏิทิน';
        document.getElementById('svg-clock').innerHTML = icons.clock;
        document.getElementById('svg-folder').innerHTML = icons.folder;
        document.getElementById('status-icon-container').innerHTML = icons.shield;

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let items = [];
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let isGlobalLocked = false;
        let downloadPass = "1234";

        onValue(ref(db, "cougar_data"), (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({ key: k, ...data[k] })) : [];
            window.renderItems();
        });

        onValue(ref(db, "settings"), (snap) => {
            const s = snap.val() || {};
            isGlobalLocked = s.globalLock || false;
            downloadPass = s.dlPass || "1234";
            if(isAdmin && document.getElementById('globalLock')) document.getElementById('globalLock').checked = isGlobalLocked;
            window.renderItems();
        });

        window.renderItems = () => {
            const list = document.getElementById('download-list');
            if(!list) return;
            list.innerHTML = '';
            items.forEach(item => {
                const isLocked = isGlobalLocked || item.locked;
                const card = document.createElement('div');
                card.className = 'download-card';
                card.innerHTML = `
                    <img src="${item.img || 'https://via.placeholder.com/300x180'}" class="card-img">
                    <div style="padding:20px; text-align:center;">
                        <h4 style="margin:0 0 10px 0;">${item.name}</h4>
                        <button onclick="window.handleDownload('${item.link}', ${item.locked})" 
                                class="btn-download" 
                                style="background:${isLocked ? 'var(--warning)' : 'var(--success)'}; color:white;">
                            ${isLocked ? icons.lock : icons.download} ${isLocked ? 'Locked' : 'Download'}
                        </button>
                    </div>
                    ${isAdmin ? `<div style="padding:10px; border-top:1px solid #eee; display:flex; justify-content:space-around; align-items:center;">
                        <button onclick="window.editItem('${item.key}')" style="border:none; background:none; color:var(--primary); cursor:pointer;">Edit</button>
                        <button onclick="window.deleteItem('${item.key}')" style="border:none; background:none; color:var(--danger); cursor:pointer;">Delete</button>
                        <input type="checkbox" ${item.locked ? 'checked' : ''} onchange="window.toggleItemLock('${item.key}', ${item.locked})">
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            document.getElementById('dash-count').innerText = items.length + " รายการ";
        };

        window.saveItem = async () => {
            const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('itemName').value,
                img: document.getElementById('itemImg').value,
                link: document.getElementById('itemLink').value,
                locked: false
            };
            if(key) await update(ref(db, `cougar_data/${key}`), data);
            else await push(ref(db, "cougar_data"), data);
            location.reload();
        };

        window.toggleItemLock = (key, curr) => update(ref(db, `cougar_data/${key}`), { locked: !curr });
        window.toggleGlobalLock = () => update(ref(db, "settings"), { globalLock: document.getElementById('globalLock').checked });
        window.deleteItem = (key) => confirm("ลบไฟล์นี้?") && remove(ref(db, `cougar_data/${key}`));
        
        window.editItem = (key) => {
            const item = items.find(i => i.key === key);
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editKey').value = key;
            document.getElementById('btn-save').innerText = "Update";
        };

        window.handleDownload = (link, itemLocked) => {
            if(isGlobalLocked || itemLocked) {
                const pass = prompt("ระบุรหัสผ่าน:");
                if(pass === downloadPass) window.open(link, '_blank');
                else if(pass !== null) alert("รหัสผ่านไม่ถูกต้อง");
            } else window.open(link, '_blank');
        };

        window.showPage = (id, el) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('nav-title').innerText = el.innerText.trim();
        };

        window.toggleAuth = () => {
            if(isAdmin) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            else document.getElementById('loginModal').style.display='flex';
        };

        window.performLogin = () => {
            if(document.getElementById('loginUser').value === "admin" && document.getElementById('loginPass').value === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else alert("Username หรือ Password ไม่ถูกต้อง");
        };

        if(isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('auth-btn').innerText = "Logout Admin";
            document.getElementById('auth-btn').style.background = "var(--danger)";
            document.getElementById('dash-status').innerText = "Admin Mode";
            document.getElementById('status-icon-container').style.color = "#2ecc71"; 
        }

        setInterval(() => {
            document.getElementById('dash-time').innerText = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
