<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 Docks UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar & Layout */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Animation */
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { 
            background: white; padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .stat-box i { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #000; }
        .stat-label { font-size: 11px; color: #888; margin-top: 5px; }

        /* 🔑 Admin Auth Button (ลดขนาดลงเป็นพิเศษ) */
        #auth-btn {
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 4px 12px; /* ลด padding จาก 6px 14px */
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 11px;    /* ลดขนาดตัวอักษรลงเหลือ 11px */
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            transition: 0.2s;
            margin-bottom: 2px;
            height: 28px;      /* คุมความสูงไม่ให้โดดจากตัวหนังสือ */
        }
        #auth-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Admin Panel Control */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: bold; color: #555; }
        .input-group input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 13px; }
        .btn-action { padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; height: 38px; }

        /* Grid & Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; height: 100%; transition: 0.2s; }
        
        .download-count-badge {
            position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.6);
            color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px;
            display: flex; align-items: center; gap: 5px; backdrop-filter: blur(4px); z-index: 1;
        }
        .card-img-container { width: 100%; height: 170px; background: #222; cursor: zoom-in; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        .download-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .download-info h4 { margin: 0 0 15px 0; font-size: 15px; color: #333; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        
        .btn-download { margin-top: auto; display: block; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; color: white; background: var(--primary); text-decoration: none; }

        /* 🛠️ Admin Action Buttons (ปรับให้เล็กลงเพื่อไม่ให้ล้นการ์ด) */
        .admin-actions { 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 6px;  /* ลด padding รอบแถบปุ่ม */
            background: #fdfdfd; 
            border-top: 1px solid #eee;
            gap: 4px;          /* ลดระยะห่างระหว่างปุ่มลง */
        }
        .btn-admin-tool { 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 10px;    /* ลดขนาดตัวอักษรลงเหลือ 10px */
            font-weight: 700; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 3px;          /* ลดช่องว่างระหว่างไอคอนกับข้อความ */
            padding: 5px 2px;  /* ลด padding ในตัวปุ่มให้ผอมลง */
            transition: all 0.2s ease-in-out; 
            flex: 1; 
            white-space: nowrap; 
            min-width: 0;       /* อนุญาตให้ปุ่มยืดหยุ่นได้เต็มที่ */
            text-decoration: none; 
        }
        
        .btn-edit-tool { color: #3498db; border-color: #3498db; }
        .btn-reset-tool { color: #f39c12; border: 1px solid #f39c12 !important; }
        .btn-lock-tool { color: #7f8c8d; border-color: #7f8c8d; }
        .btn-lock-tool.active { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }
        .btn-delete-tool { color: #e74c3c; border-color: #e74c3c; }
        
        .btn-admin-tool:hover { filter: brightness(0.95); background: #f9f9f9; }

        /* สวิตซ์ Global Lock */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;" placeholder="Username">
            <input type="password" id="loginPass" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;" placeholder="Password">
            <button onclick="window.performLogin()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">เข้าสู่ระบบ</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="window.showPage('dash-page', this)" id="nav-dash" class="active"><i class="fas fa-home"></i> Obs Docks UI</a>
        <a onclick="window.showPage('edoc-page', this)" id="nav-edoc"><i class="fas fa-file-alt"></i> ระบบ E-doc</a>
        <a onclick="window.showPage('live-page', this)" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="window.showPage('map-page', this)" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="window.showPage('calendar-page', this)" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
        <a onclick="window.showPage('esos-page', this)" id="nav-esos"><i class="fas fa-rocket"></i> ระบบ ESOS</a>
    </div>
    
    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Obs Docks UI</h2>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock" style="color:#2ecc71;"></i>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-folder-open" style="color:#3498db;"></i>
                        <div class="stat-value" id="dash-count">0 รายการ</div>
                        <div class="stat-label">ไฟล์ในระบบ</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-shield-alt" id="status-icon" style="color:#95a5a6;"></i>
                        <div class="stat-value" id="dash-status">Guest Mode</div>
                        <div class="stat-label">โหมดการใช้งาน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-user-cog" style="color:var(--primary);"></i>
                        <button id="auth-btn" onclick="window.toggleAuth()">
                            <i class="fas fa-user-lock"></i> Admin Login
                        </button>
                        <div class="stat-label">ระบบแอดมิน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0;"><i class="fas fa-tools"></i> Admin Control Panel</h3>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span style="font-size:11px; font-weight:bold; color:var(--danger);">Lock Downloads</span>
                                <label class="switch">
                                    <input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <button onclick="window.resetAllCounts()" style="background:var(--warning); color:white; border:none; padding:6px 12px; border-radius:6px; font-size:11px; cursor:pointer; font-weight:bold; display:flex; align-items:center; gap:5px;">
                                <i class="fas fa-sync-alt"></i> รีเซ็ตจำนวนทั้งหมด
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editKey">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName" placeholder="ระบุชื่อ..."></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg" placeholder="URL รูป..."></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink" placeholder="URL ดาวน์โหลด..."></div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="window.saveItem()" id="btn-save" class="btn-action" style="background:var(--success);">บันทึก</button>
                            <button onclick="window.resetForm()" class="btn-action" style="background:var(--secondary);">ยกเลิก</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>
            
            <div id="edoc-page" class="page-content"><iframe src="e-doc.html" style="width:100%; height:100%; border:none; border-radius:15px; background:white;"></iframe></div>
            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="esos-page" class="page-content"><iframe src="esos.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
