<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Cloud Online System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- CSS เดิมเพื่อให้หน้าตาเหมือนรูปที่ 1 --- */
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-body: #f0f2f5;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .top-nav h2 { margin: 0; font-size: 1.5rem; color: #2c3e50; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #000; margin-bottom: 8px; }
        .stat-label { font-size: 13px; color: #888; }
        .icon-time { color: #2ecc71; }
        .icon-folder { color: #3498db; }
        .icon-shield { color: #2ecc71; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        .btn-action { padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; height: 41px; color: white; }

        /* Download Card Grid */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.2s; }
        .download-card:hover { transform: translateY(-3px); }
        .card-img-container { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; flex-grow: 1; }
        .download-info h4 { margin: 0 0 15px 0; font-size: 15px; font-weight: 600; color: #2c3e50; line-height: 1.4; height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .is-open { background: var(--success); color: white; }
        .is-open:hover { background: #219150; }
        .is-locked { background: var(--warning); color: white; cursor: not-allowed; }
        
        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 12px; background: #fdfdfd; border-top: 1px solid #f0f0f0; }
        .admin-btn-text { border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="window.performLogin()" class="btn-login">เข้าสู่ระบบ</button>
            <button onclick="window.closeLoginModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="top-nav">
        <h2>Dashboard</h2>
        <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="window.toggleAuth()">Admin Login</button>
    </div>

    <div class="main-content">
        <div class="dashboard-stats">
            <div class="stat-box"><i class="fas fa-clock icon-time"></i><div class="stat-value" id="dash-time">00:00</div><div class="stat-label">เวลาปัจจุบัน</div></div>
            <div class="stat-box"><i class="fas fa-folder-open icon-folder"></i><div class="stat-value" id="dash-count">0 รายการ</div><div class="stat-label">ไฟล์บน Cloud</div></div>
            <div class="stat-box"><i class="fas fa-shield-alt icon-shield" id="status-icon"></i><div class="stat-value" id="dash-status">Guest Mode</div><div class="stat-label">โหมดการใช้งาน</div></div>
        </div>

        <div id="admin-panel">
            <div class="admin-header">
                <h3><i class="fas fa-tools"></i> Admin Control</h3>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:12px; font-weight:bold; color:#d35400;">Lock All Downloads</span>
                    <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                </div>
            </div>
            <div class="form-row">
                <input type="hidden" id="editId" value="">
                <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName" placeholder="ระบุชื่อไฟล์..."></div>
                <div class="input-group"><label>ลิงก์รูปภาพ</label><input type="text" id="itemImg" placeholder="URL รูปภาพ..."></div>
                <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink" placeholder="URL ดาวน์โหลด..."></div>
                <div class="btn-group">
                    <button onclick="window.saveItem()" id="btn-save" class="btn-action" style="background:var(--success);">บันทึก</button>
                    <button onclick="window.resetForm()" class="btn-action" style="background:var(--secondary);">ยกเลิก</button>
                </div>
            </div>
        </div>

        <div id="download-list" class="download-grid"></div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1SGjQXgfQykrV-psyDDwWbuqfTlE7Zhk",
            authDomain: "cougar2-database.firebaseapp.com",
            databaseURL: "https://cougar2-database-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cougar2-database",
            storageBucket: "cougar2-database.firebasestorage.app",
            messagingSenderId: "429808185249",
            appId: "1:429808185249:web:4afa08e0a7a973b00d25e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let items = [];
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let isGlobalLocked = false;

        // --- Firebase Realtime Sync ---
        onValue(ref(db, "cougar_data"), (snapshot) => {
            const data = snapshot.val();
            items = data ? Object.keys(data).map(key => ({ key, ...data[key] })) : [];
            window.renderItems();
        });

        onValue(ref(db, "settings/globalLock"), (snapshot) => {
            isGlobalLocked = snapshot.val() || false;
            document.getElementById('globalLock').checked = isGlobalLocked;
            window.renderItems();
        });

        // --- Core Functions ---
        window.renderItems = () => {
            const list = document.getElementById('download-list');
            if(!list) return;
            list.innerHTML = '';
            
            items.forEach((item) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const card = document.createElement('div');
                card.className = 'download-card';
                card.innerHTML = `
                    <div class="card-img-container" onclick="window.openImage('${item.img}')">
                        <img src="${item.img || 'https://via.placeholder.com/300x180?text=Cougar2'}">
                    </div>
                    <div class="download-info">
                        <h4>${item.name}</h4>
                        <button onclick="window.secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                            <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> Download Now
                        </button>
                    </div>
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <button onclick="window.editItem('${item.key}')" class="admin-btn-text" style="color:var(--primary)"><i class="fas fa-edit"></i> Edit</button>
                        <button onclick="window.deleteItem('${item.key}')" class="admin-btn-text" style="color:var(--danger)"><i class="fas fa-trash"></i> Delete</button>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            window.updateDashboard();
        };

        window.saveItem = async () => {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;

            if (!name || !link) return alert("กรอกข้อมูลให้ครบ");

            if (id) {
                await update(ref(db, `cougar_data/${id}`), { name, img, link });
            } else {
                const newRef = push(ref(db, "cougar_data"));
                await set(newRef, { name, img, link, locked: false });
            }
            window.resetForm();
        };

        window.deleteItem = async (key) => {
            if(confirm("ลบออกจาก Cloud?")) await remove(ref(db, `cougar_data/${key}`));
        };

        window.toggleGlobalLock = async () => {
            await set(ref(db, "settings/globalLock"), document.getElementById('globalLock').checked);
        };

        window.editItem = (key) => {
            const item = items.find(i => i.key === key);
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editId').value = key;
            document.getElementById('btn-save').innerText = "Update Cloud";
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        // UI & Auth
        window.performLogin = () => {
            if (document.getElementById('loginUser').value === "admin" && document.getElementById('loginPass').value === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else alert("รหัสผิด!");
        };
        window.toggleAuth = () => {
            if (isAdmin) {
                if(confirm("Logout?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else document.getElementById('loginModal').style.display = 'flex';
        };
        window.closeLoginModal = () => document.getElementById('loginModal').style.display = 'none';
        window.resetForm = () => {
            document.getElementById('itemName').value = ''; document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = ''; document.getElementById('editId').value = '';
            document.getElementById('btn-save').innerText = "บันทึก";
        };
        window.openImage = (src) => { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; };
        window.secureDownload = (link, locked) => { if(locked) alert("Locked by Admin"); else window.open(link, '_blank'); };
        window.updateDashboard = () => {
            const countEl = document.getElementById('dash-count');
            if(countEl) countEl.innerText = `${items.length} รายการ`;
        }
    </script>
</body>
</html>
