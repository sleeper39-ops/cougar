<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Cloud Realtime System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* --- ใช้ Style เดิมของคุณทั้งหมด (ผมละไว้เพื่อความกระชับ) --- */
        :root { --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6; --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px; }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }
        .stat-label { font-size: 13px; color: #888; }
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: bold; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-img-container { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; flex-grow: 1; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }
        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 12px; background: #fdfdfd; border-top: 1px solid #f0f0f0; }
        .admin-btn-text { border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; }
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button id="doLogin" class="btn-login">เข้าสู่ระบบ</button>
            <button onclick="closeLoginModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box"><i class="fas fa-clock" style="color:#2ecc71"></i><div class="stat-value" id="dash-time">00:00</div><div class="stat-label">เวลาปัจจุบัน</div></div>
                    <div class="stat-box"><i class="fas fa-folder-open" style="color:#3498db"></i><div class="stat-value" id="dash-count">0 รายการ</div><div class="stat-label">ไฟล์บน Cloud</div></div>
                    <div class="stat-box"><i class="fas fa-shield-alt" id="status-icon"></i><div class="stat-value" id="dash-status">Guest Mode</div><div class="stat-label">โหมดการใช้งาน</div></div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3><i class="fas fa-tools"></i> Admin Control</h3>
                        <div class="setting-item">
                            <span style="font-size:12px; font-weight:bold; color:#d35400;">Lock All</span>
                            <label class="switch"><input type="checkbox" id="globalLock"><span class="slider"></span></label>
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editKey" value="">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <div class="btn-group">
                            <button id="saveBtn" class="btn-action" style="background:var(--success);">บันทึก</button>
                            <button onclick="resetForm()" class="btn-action" style="background:var(--secondary);">ยกเลิก</button>
                        </div>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // 1. ตรวจสอบ Config ของคุณให้ชัวร์
        const firebaseConfig = {
            apiKey: "AIzaSyD1SGjQXgfQykrV-psyDDwWbuqfTlE7Zhk",
            authDomain: "cougar2-database.firebaseapp.com",
            databaseURL: "https://cougar2-database-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cougar2-database",
            storageBucket: "cougar2-database.firebasestorage.app",
            messagingSenderId: "429808185249",
            appId: "1:429808185249:web:4afa08e0a7a973b00d25e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let items = [];
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let isGlobalLocked = false;

        // --- Firebase Realtime Sync ---
        // ดึงข้อมูลรายการไฟล์
        onValue(ref(db, "cougar_data"), (snapshot) => {
            const data = snapshot.val();
            items = data ? Object.keys(data).map(key => ({ key, ...data[key] })) : [];
            renderItems();
        });

        // ดึงสถานะ Global Lock จาก Cloud
        onValue(ref(db, "settings/globalLock"), (snapshot) => {
            isGlobalLocked = snapshot.val() || false;
            const lockEl = document.getElementById('globalLock');
            if(lockEl) lockEl.checked = isGlobalLocked;
            renderItems();
        });

        // --- Core Functions ---
        window.renderItems = () => {
            const list = document.getElementById('download-list');
            if(!list) return;
            list.innerHTML = '';
            
            items.forEach((item) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const card = document.createElement('div');
                card.className = 'download-card';
                card.innerHTML = `
                    <div class="card-img-container" onclick="openImage('${item.img}')">
                        <img src="${item.img || 'https://via.placeholder.com/300x180?text=Cougar2'}">
                    </div>
                    <div class="download-info">
                        <h4>${item.name}</h4>
                        <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                            <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> 
                            ${effectivelyLocked ? 'Password Required' : 'Download Now'}
                        </button>
                    </div>
                    ${isAdmin ? `
                    <div class="admin-controls">
                        <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="window.toggleItemLock('${item.key}', ${item.locked})"><span class="slider"></span></label>
                        <button onclick="window.editItem('${item.key}')" class="admin-btn-text" style="color:var(--primary)"><i class="fas fa-edit"></i></button>
                        <button onclick="window.deleteItem('${item.key}')" class="admin-btn-text" style="color:var(--danger)"><i class="fas fa-trash"></i></button>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            updateDashboard();
        };

        window.saveItem = async () => {
            const key = document.getElementById('editKey').value;
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;

            if (!name || !link) return alert("กรอกชื่อและลิงก์ด้วยครับ");

            if (key) {
                // อัปเดตตัวเดิม
                await update(ref(db, `cougar_data/${key}`), { name, img, link });
            } else {
                // เพิ่มใหม่
                const newRef = push(ref(db, "cougar_data"));
                await set(newRef, { name, img, link, locked: false, createdAt: Date.now() });
            }
            resetForm();
        };

        window.deleteItem = async (key) => {
            if(confirm("ลบออกจาก Cloud ใช่ไหม?")) await remove(ref(db, `cougar_data/${key}`));
        };

        window.toggleItemLock = async (key, current) => {
            await update(ref(db, `cougar_data/${key}`), { locked: !current });
        };

        window.toggleGlobalLock = async () => {
            const status = document.getElementById('globalLock').checked;
            await set(ref(db, "settings/globalLock"), status);
        };

        // --- UI & Auth ---
        window.performLogin = () => {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if (u === "admin" && p === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("รหัสผิด!"); }
        };

        window.toggleAuth = () => {
            if (isAdmin) {
                if(confirm("Logout?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        };

        window.editItem = (key) => {
            const item = items.find(i => i.key === key);
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editKey').value = key;
            document.getElementById('saveBtn').innerText = "Update Cloud";
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        // ผูกฟังก์ชันกับหน้าเว็บ
        document.getElementById('saveBtn').onclick = window.saveItem;
        document.getElementById('auth-btn').onclick = window.toggleAuth;
        document.getElementById('doLogin').onclick = window.performLogin;
        document.getElementById('globalLock').onchange = window.toggleGlobalLock;
    </script>

    <script>
        // ฟังก์ชัน UI ทั่วไป (ไม่ต้องใช้ Firebase)
        function updateDashboard() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
            const count = document.getElementById('download-list').children.length;
            document.getElementById('dash-count').innerText = count + " รายการ";
            
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('dash-status').innerText = isAdmin ? "Admin Mode" : "Guest Mode";
            document.getElementById('status-icon').style.color = isAdmin ? "#2ecc71" : "#95a5a6";
            if(isAdmin) document.getElementById('admin-panel').style.display = 'block';
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function openImage(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function resetForm() {
            document.getElementById('itemName').value = ''; document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = ''; document.getElementById('editKey').value = '';
            document.getElementById('saveBtn').innerText = "บันทึก";
        }
        
        async function secureDownload(link, itemLocked) {
            // ดึงค่า Global Lock จากหน้าเว็บ (หรือจะดึงจากตัวแปรใน Module ก็ได้)
            const isGL = document.getElementById('globalLock')?.checked;
            if (isGL || itemLocked) {
                const pass = prompt("ใส่รหัสผ่านดาวน์โหลด:");
                if (pass === "1234") window.open(link, '_blank'); // แก้รหัสผ่านตรงนี้ตามใจชอบ
                else if(pass) alert("รหัสผิด");
            } else { window.open(link, '_blank'); }
        }

        window.onload = updateDashboard;
    </script>
</body>
</html>
