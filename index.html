<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Firebase Realtime System</title>
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a svg { width: 20px; height: 20px; fill: currentColor; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-box .svg-icon { width: 40px; height: 40px; margin: 0 auto 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #000; }
        .stat-label { font-size: 13px; color: #888; text-transform: uppercase; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-container { width: 100%; height: 180px; background: #222; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; }
        .btn-download { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-download svg { width: 18px; height: 18px; fill: white; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3>Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="window.performLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">เข้าสู่ระบบ</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><span id="icon-home"></span> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><span id="icon-live"></span> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><span id="icon-map"></span> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><span id="icon-cal"></span> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="window.toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <div class="svg-icon" style="color:#2ecc71" id="stat-clock"></div>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <div class="svg-icon" style="color:#3498db" id="stat-folder"></div>
                        <div class="stat-value" id="dash-count">0 รายการ</div>
                        <div class="stat-label">ไฟล์ในระบบ</div>
                    </div>
                    <div class="stat-box">
                        <div class="svg-icon" id="stat-shield"></div>
                        <div class="stat-value" id="dash-status">Guest Mode</div>
                        <div class="stat-label">โหมดการใช้งาน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0;">Admin Control</h3>
                        <div style="display:flex; gap:20px; align-items:center;">
                            <div style="background:#f8f9fa; padding:5px 15px; border-radius:10px; border:1px solid #eee;">
                                <span style="font-size:12px; font-weight:bold; color:var(--danger);">Lock All</span>
                                <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editKey">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <button onclick="window.saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; padding:0 20px; height:40px;">บันทึก</button>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyD1SGjQXgfQykrV-psyDDwWbuqfTlE7Zhk",
            authDomain: "cougar2-database.firebaseapp.com",
            databaseURL: "https://cougar2-database-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cougar2-database",
            storageBucket: "cougar2-database.firebasestorage.app",
            messagingSenderId: "429808185249",
            appId: "1:429808185249:web:4afa08e0a7a973b00d25e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- SVG Icons Data ---
        const icons = {
            home: `<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>`,
            live: `<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>`,
            map: `<svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>`,
            cal: `<svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>`,
            clock: `<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
            folder: `<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`,
            shield: `<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>`,
            download: `<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`,
            lock: `<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>`
        };

        // Init Static Icons
        document.getElementById('icon-home').innerHTML = icons.home;
        document.getElementById('icon-live').innerHTML = icons.live;
        document.getElementById('icon-map').innerHTML = icons.map;
        document.getElementById('icon-cal').innerHTML = icons.cal;
        document.getElementById('stat-clock').innerHTML = icons.clock;
        document.getElementById('stat-folder').innerHTML = icons.folder;
        document.getElementById('stat-shield').innerHTML = icons.shield;

        // --- System Logic ---
        let items = [];
        let isGlobalLocked = false;
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" };

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Firebase Sync
        onValue(ref(db, "cougar_data"), (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({ key: k, ...data[k] })) : [];
            window.renderItems();
        });

        onValue(ref(db, "settings"), (snap) => {
            const s = snap.val() || {};
            isGlobalLocked = s.globalLock || false;
            if(isAdmin && document.getElementById('globalLock')) document.getElementById('globalLock').checked = isGlobalLocked;
            window.renderItems();
        });

        window.renderItems = () => {
            const list = document.getElementById('download-list');
            if(!list) return;
            list.innerHTML = '';
            items.forEach(item => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const card = document.createElement('div');
                card.className = 'download-card';
                card.innerHTML = `
                    <div class="card-img-container" onclick="window.open('${item.img}','_blank')">
                        <img src="${item.img || 'https://via.placeholder.com/300x180'}">
                    </div>
                    <div class="download-info">
                        <h4>${item.name}</h4>
                        <button onclick="window.secureDownload('${item.link}', ${item.locked})" 
                                class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                            ${effectivelyLocked ? icons.lock : icons.download}
                            ${effectivelyLocked ? 'Password Required' : 'Download Now'}
                        </button>
                    </div>
                    ${isAdmin ? `
                    <div style="padding:10px; background:#f9f9f9; border-top:1px solid #eee; display:flex; justify-content:space-around; align-items:center;">
                        <button onclick="window.editItem('${item.key}')" style="border:none; background:none; color:var(--primary); font-weight:bold; cursor:pointer;">Edit</button>
                        <button onclick="window.deleteItem('${item.key}')" style="border:none; background:none; color:var(--danger); font-weight:bold; cursor:pointer;">Delete</button>
                        <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="window.toggleItemLock('${item.key}', ${item.locked})"><span class="slider"></span></label>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            document.getElementById('dash-count').innerText = items.length + " รายการ";
        };

        window.saveItem = async () => {
            const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('itemName').value,
                img: document.getElementById('itemImg').value,
                link: document.getElementById('itemLink').value,
                locked: key ? items.find(i => i.key === key).locked : false
            };
            if(data.name && data.link) {
                if(key) await update(ref(db, `cougar_data/${key}`), data);
                else await push(ref(db, "cougar_data"), data);
                window.resetForm();
            }
        };

        window.secureDownload = async (link, itemLocked) => {
            if (isGlobalLocked || itemLocked) {
                const pass = prompt("กรุณาใส่รหัสผ่าน:");
                if (!pass) return;
                const hashedInput = await hashText(pass);
                // เช็ค hash จาก Firebase settings หรือ default
                onValue(ref(db, "settings/dlPassHash"), async (snap) => {
                    const currentHash = snap.val() || HASH_CONFIG.dl;
                    if (hashedInput === currentHash) window.open(link, '_blank');
                    else alert("รหัสไม่ถูกต้อง");
                }, { onlyOnce: true });
            } else { window.open(link, '_blank'); }
        };

        window.toggleItemLock = (key, curr) => update(ref(db, `cougar_data/${key}`), { locked: !curr });
        window.toggleGlobalLock = () => update(ref(db, "settings"), { globalLock: document.getElementById('globalLock').checked });
        window.deleteItem = (key) => confirm("ต้องการลบ?") && remove(ref(db, `cougar_data/${key}`));
        
        window.editItem = (key) => {
            const item = items.find(i => i.key === key);
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editKey').value = key;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = '';
            document.getElementById('editKey').value = '';
            document.getElementById('btn-save').innerText = "บันทึก";
        };

        window.toggleAuth = () => {
            if(isAdmin) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            else document.getElementById('loginModal').style.display = 'flex';
        };

        window.performLogin = () => {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if (u === "admin" && p === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
            document.getElementById('nav-title').innerText = document.getElementById('nav-' + id.split('-')[0]).innerText;
        };

        // Dashboard Clock & Status
        setInterval(() => {
            document.getElementById('dash-time').innerText = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        if(isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('auth-btn').innerText = "Logout Admin";
            document.getElementById('auth-btn').style.background = "var(--danger)";
            document.getElementById('dash-status').innerText = "Admin Mode";
            document.getElementById('stat-shield').style.color = "#2ecc71";
        } else {
            document.getElementById('stat-shield').style.color = "#95a5a6";
        }

    </script>
</body>
</html>
