<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cougar2 - Full System Cloud</title>

<script type="module">
/* ================= Firebase Import ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    set,
    update,
    remove,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ================= Firebase Config ================= */
const firebaseConfig = {
    apiKey: "AIzaSyD1SGjQXgfQykrV-psyDDwWbuqfTlE7Zhk",
    authDomain: "cougar2-database.firebaseapp.com",
    databaseURL: "https://cougar2-database-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "cougar2-database",
    storageBucket: "cougar2-database.firebasestorage.app",
    messagingSenderId: "429808185249",
    appId: "1:429808185249:web:4afa08e0a7a973b00d25e0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let items = [];
let isAdmin = false;

/* ================= Clock ================= */
setInterval(() => {
    const now = new Date();
    const el = document.getElementById("dash-time");
    if (el) el.innerText = now.toLocaleTimeString("th-TH");
}, 1000);

/* ================= Realtime Load ================= */
onValue(ref(db, "cougar_data"), (snapshot) => {
    const data = snapshot.val() || {};
    items = Object.keys(data).map(id => ({ id, ...data[id] }));
    renderItems();

    const count = document.getElementById("dash-count");
    if (count) count.innerText = items.length + " รายการ";
});

/* ================= Render ================= */
function renderItems() {
    const container = document.getElementById("download-list");
    if (!container) return;

    container.innerHTML = "";

    items.forEach(item => {

        const imgSrc = item.image?.startsWith("http")
            ? item.image
            : "https://via.placeholder.com/300x180?text=Cougar2";

        const card = document.createElement("div");
        card.className = "download-card";

        card.innerHTML = `
        <div class="card-img-container"
            onclick="openLightbox('${imgSrc}')">
            <img src="${imgSrc}"
            onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
        </div>

        <div class="download-info">
            <h4>${item.name}</h4>
            <button class="btn-download"
                ${item.locked ? "disabled" : ""}
                onclick="openLink('${item.link}')">
                ${item.locked ? "Locked" : "Download Now"}
            </button>
        </div>

        ${isAdmin ? `
        <div class="admin-controls">
            <button onclick="editItem('${item.id}')">Edit</button>
            <button onclick="deleteItem('${item.id}')">Delete</button>
            <button onclick="toggleLock('${item.id}', ${item.locked})">
                ${item.locked ? "Unlock" : "Lock"}
            </button>
        </div>` : ""}
        `;

        container.appendChild(card);
    });
}

/* ================= Save ================= */
window.saveItem = async function () {
    const name = itemName.value.trim();
    const image = itemImg.value.trim();
    const link = itemLink.value.trim();
    const editId = document.getElementById("editId").value;

    if (!name || !link) return alert("กรอกข้อมูลให้ครบ");

    if (editId) {
        await update(ref(db, "cougar_data/" + editId), { name, image, link });
    } else {
        const newRef = push(ref(db, "cougar_data"));
        await set(newRef, {
            name, image, link,
            locked: false,
            createdAt: Date.now()
        });
    }

    resetForm();
};

/* ================= Admin Functions ================= */
window.editItem = function(id){
    const item = items.find(x=>x.id===id);
    if(!item) return;
    itemName.value = item.name;
    itemImg.value = item.image || "";
    itemLink.value = item.link;
    editId.value = id;
};

window.deleteItem = async function(id){
    if(confirm("ลบใช่ไหม?"))
        await remove(ref(db,"cougar_data/"+id));
};

window.toggleLock = async function(id,current){
    await update(ref(db,"cougar_data/"+id),{locked:!current});
};

window.resetForm = function(){
    itemName.value="";
    itemImg.value="";
    itemLink.value="";
    editId.value="";
};

/* ================= UI ================= */
window.openLightbox = function(src){
    lightboxImg.src = src;
    imgLightbox.style.display="flex";
};

window.openLink = function(url){
    window.open(url,"_blank");
};

window.toggleAuth = function(){
    loginModal.style.display="flex";
};

window.performLogin = function(){
    if(loginUser.value==="admin" && loginPass.value==="1234"){
        isAdmin=true;
        adminPanel.style.display="block";
        dashStatus.innerText="Admin Mode";
        loginModal.style.display="none";
        renderItems();
    }else{
        alert("รหัสผิด");
    }
};

window.showPage = function(page){
    document.querySelectorAll(".page-content")
        .forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
};
</script>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f2}
.download-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.download-card{background:white;border-radius:12px;padding:10px}
.card-img-container{height:180px;background:#222;display:flex;align-items:center;justify-content:center;cursor:pointer}
.card-img-container img{max-width:100%;max-height:100%}
.btn-download{width:100%;padding:10px;margin-top:10px}
.admin-controls{margin-top:10px;display:flex;gap:5px}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;align-items:center;justify-content:center}
.lightbox img{max-width:90%;max-height:90%}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
.login-card{background:white;padding:20px}
</style>
</head>

<body>

<div id="loginModal" class="modal-overlay">
<div class="login-card">
<input id="loginUser" placeholder="user">
<input id="loginPass" type="password" placeholder="pass">
<button onclick="performLogin()">Login</button>
</div>
</div>

<button onclick="toggleAuth()">Admin</button>

<div id="adminPanel" style="display:none;">
<input type="hidden" id="editId">
<input id="itemName" placeholder="ชื่อไฟล์">
<input id="itemImg" placeholder="URL รูป">
<input id="itemLink" placeholder="URL ไฟล์">
<button onclick="saveItem()">บันทึก</button>
<button onclick="resetForm()">X</button>
</div>

<div id="dashStatus">Guest Mode</div>
<div id="dash-time"></div>
<div id="dash-count"></div>

<div id="download-list" class="download-grid"></div>

<div id="imgLightbox" class="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

</body>
</html>
