<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cougar2 - Full System Cloud</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
--primary:#3498db;
--danger:#e74c3c;
--success:#27ae60;
--warning:#f39c12;
--secondary:#95a5a6;
--bg-dark:#1a1a1a;
--bg-body:#f0f2f5;
--sidebar-width:260px;
}

body{display:flex;margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg-body);height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-width);background:var(--bg-dark);color:white;padding:25px 15px;display:flex;flex-direction:column;}
.sidebar h2{color:var(--primary);text-align:center;margin-bottom:40px;}
.sidebar a{color:#bbb;text-decoration:none;padding:14px 20px;border-radius:10px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.sidebar a:hover,.sidebar a.active{background:var(--primary);color:white;}

.wrapper{flex:1;display:flex;flex-direction:column;}
.top-nav{height:60px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.main-content{flex:1;padding:30px;overflow-y:auto;}

.page-content{display:none;height:100%;}
.page-content.active{display:block;}

.dashboard-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.stat-box{background:white;padding:25px 20px;border-radius:15px;text-align:center;border:1px solid #eee;}
.stat-value{font-size:1.4rem;font-weight:bold;}

#admin-panel{display:none;background:white;padding:25px;border-radius:15px;border:2px dashed var(--primary);margin-bottom:30px;}

.form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:20px;align-items:flex-end;}
.input-group{display:flex;flex-direction:column;gap:8px;}
.input-group input{padding:10px;border:1px solid #ddd;border-radius:8px;}

.download-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.download-card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.05);}
.card-img-container{width:100%;height:180px;background:#222;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.card-img-container img{width:100%;height:100%;object-fit:contain;}
.download-info{padding:20px;text-align:center;}

.btn-download{width:100%;padding:12px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;}
.is-open{background:var(--success);color:white;}

.admin-controls{display:flex;justify-content:center;gap:15px;padding:10px;background:#f9f9f9;border-top:1px solid #eee;}
.admin-btn-text{border:none;background:none;cursor:pointer;font-size:13px;font-weight:bold;}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;}
.login-card{background:white;padding:30px;border-radius:20px;width:350px;text-align:center;}
.login-input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
.btn-login{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;}

.lightbox{display:none;position:fixed;z-index:9999;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;}
.lightbox img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay">
<div class="login-card">
<h3><i class="fas fa-user-shield"></i> Admin Login</h3>
<input type="text" id="loginUser" class="login-input" placeholder="Username">
<input type="password" id="loginPass" class="login-input" placeholder="Password">
<button onclick="window.performLogin()" class="btn-login">เข้าสู่ระบบ</button>
<button onclick="document.getElementById('loginModal').style.display='none'" style="margin-top:10px;background:none;border:none;color:#999;cursor:pointer;">ยกเลิก</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Cougar2</h2>
<a onclick="window.showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
</div>

<!-- MAIN -->
<div class="wrapper">
<div class="top-nav">
<h2 id="nav-title">Dashboard</h2>
<button id="auth-btn" style="background:var(--primary);color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;" onclick="window.toggleAuth()">Admin Login</button>
</div>

<div class="main-content">

<div id="dash-page" class="page-content active">

<div class="dashboard-stats">
<div class="stat-box"><div class="stat-value" id="dash-time">00:00</div><div>เวลาปัจจุบัน</div></div>
<div class="stat-box"><div class="stat-value" id="dash-count">0 รายการ</div><div>ไฟล์ในระบบ</div></div>
<div class="stat-box"><div class="stat-value" id="dash-status">Guest Mode</div><div>โหมดการใช้งาน</div></div>
</div>

<div id="admin-panel">
<div class="form-row">
<input type="hidden" id="editId" value="">

<div class="input-group">
<label>ชื่อไฟล์</label>
<input type="text" id="itemName" placeholder="ชื่อไฟล์">
</div>

<div class="input-group">
<label>ลิงก์รูปภาพ</label>
<input type="text" id="itemImg" placeholder="URL รูปภาพ">
</div>

<div class="input-group">
<label>ลิงก์ดาวน์โหลด</label>
<input type="text" id="itemLink" placeholder="URL ไฟล์">
</div>

<div>
<button onclick="window.saveItem()" id="btn-save" style="background:var(--success);color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">บันทึก</button>
<button onclick="window.resetForm()" style="background:var(--secondary);color:white;padding:10px 15px;border:none;border-radius:8px;cursor:pointer;">X</button>
</div>

</div>
</div>

<div id="download-list" class="download-grid"></div>

</div>
</div>
</div>

<!-- LIGHTBOX -->
<div id="imgLightbox" class="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script type="module" src="script.js"></script>
</body>
</html>
