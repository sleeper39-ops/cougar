<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Secure Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar & Layout */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index: 1000; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-card h3 { margin-top: 0; text-align: center; color: var(--bg-dark); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-options { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 20px; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-box i { font-size: 2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .icon-time { color: #2ecc71; } .icon-file { color: #3498db; } .icon-mode { color: #e67e22; }

        /* Admin Content */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .page-content { display: none; height: 100%; }
        .page-content.active { display: block; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-container img { width: 100%; height: 180px; object-fit: contain; background: #222; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="ชื่อผู้ใช้ (Username)">
            <input type="password" id="loginPass" class="login-input" placeholder="รหัสผ่าน (Password)">
            <div class="login-options">
                <label><input type="checkbox" id="rememberMe"> จดจำฉันไว้</label>
                <span onclick="forgotPass()" style="color:var(--primary); cursor:pointer;">ลืมรหัสผ่าน?</span>
            </div>
            <button onclick="handleLogin()" class="btn-login">เข้าสู่ระบบ</button>
            <button onclick="closeLogin()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#888;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock icon-time"></i>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-folder icon-file"></i>
                        <div class="stat-value" id="dash-count">0 รายการ</div>
                        <div class="stat-label">ไฟล์ในระบบ</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-user-circle icon-mode"></i>
                        <div class="stat-value" id="dash-status">Guest</div>
                        <div class="stat-label">สถานะผู้ใช้</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <h4>จัดการข้อมูลไฟล์</h4>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="itemName" placeholder="ชื่อไฟล์" class="login-input" style="margin:0">
                        <input type="text" id="itemLink" placeholder="ลิงก์โหลด" class="login-input" style="margin:0">
                        <button onclick="saveItem()" class="btn-login" style="width:150px">เพิ่มไฟล์</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <script>
        // กำหนดค่าเริ่มต้น Admin
        const ADMIN_CRED = { user: "admin", pass: "admin2", keyword: "password" };
        
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        // --- ระบบ Login ---
        function toggleAuth() {
            if (isLoggedIn()) {
                logout();
            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }
        }

        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const remember = document.getElementById('rememberMe').checked;

            if (u === ADMIN_CRED.user && p === ADMIN_CRED.pass) {
                const storage = remember ? localStorage : sessionStorage;
                storage.setItem('isAdmin', 'true');
                location.reload();
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!");
            }
        }

        function isLoggedIn() {
            return localStorage.getItem('isAdmin') === 'true' || sessionStorage.getItem('isAdmin') === 'true';
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            sessionStorage.removeItem('isAdmin');
            location.reload();
        }

        // --- ระบบกู้คืนรหัสผ่านด้วย Keyword ---
        function forgotPass() {
            const key = prompt("กรุณาใส่ Keyword เพื่อดูรหัสผ่าน:");
            if (key === ADMIN_CRED.keyword) {
                alert(`ข้อมูลเข้าระบบของคุณคือ:\nUsername: ${ADMIN_CRED.user}\nPassword: ${ADMIN_CRED.pass}`);
            } else if (key !== null) {
                alert("Keyword ไม่ถูกต้อง!");
            }
        }

        // --- ระบบหน้าจอและแดชบอร์ด ---
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function updateDashboard() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('dash-count').innerText = items.length + " รายการ";
            
            if(isLoggedIn()) {
                document.getElementById('dash-status').innerText = "Admin Account";
                document.getElementById('dash-status').style.color = "var(--success)";
                document.getElementById('admin-panel').style.display = "block";
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container"><img src="https://via.placeholder.com/300x180?text=File"></div>
                        <div style="padding:15px; text-align:center;">
                            <h4>${item.name}</h4>
                            <button onclick="window.open('${item.link}')" class="btn-login" style="background:var(--success)">Download</button>
                        </div>
                    </div>`;
            });
            updateDashboard();
        }

        function saveItem() {
            const n = document.getElementById('itemName').value;
            const l = document.getElementById('itemLink').value;
            if(n && l) {
                items.push({name: n, link: l});
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                renderItems();
                document.getElementById('itemName').value = '';
                document.getElementById('itemLink').value = '';
            }
        }

        window.onload = () => {
            renderItems();
            setInterval(updateDashboard, 1000);
        };
    </script>
</body>
</html>
