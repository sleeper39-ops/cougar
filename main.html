<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        
        /* Search Bar */
        .search-container { position: relative; width: 350px; }
        .search-container input { width: 100%; padding: 10px 15px 10px 40px; border-radius: 20px; border: 1px solid #ddd; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        .search-container i { position: absolute; left: 15px; top: 12px; color: #999; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 10px; }

        /* Category Tabs */
        .category-tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; background: white; border-radius: 20px; cursor: pointer; border: 1px solid #ddd; font-size: 14px; transition: 0.3s; color: #666; font-weight: 500; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 150px auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }

        /* Grid & Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.3s; }
        .download-card:hover { transform: translateY(-5px); }
        .card-img-container { height: 160px; background: #222; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .card-img-container img { height: 100%; width: 100%; object-fit: contain; }
        .card-tag { font-size: 10px; background: #f0f2f5; padding: 4px 10px; border-radius: 10px; color: var(--primary); font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .download-info { padding: 15px; text-align: center; flex-grow: 1; }
        .download-info h4 { margin: 0 0 15px 0; font-size: 15px; height: 2.5em; overflow: hidden; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }
        
        .admin-controls { display: flex; justify-content: center; gap: 15px; padding: 10px; background: #fdfdfd; border-top: 1px solid #eee; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .lightbox { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password" onkeyup="if(event.key==='Enter') performLogin()">
            <button onclick="performLogin()" class="btn-login">เข้าสู่ระบบ</button>
            <p onclick="handleForgotPassword()" style="font-size:12px; color:var(--primary); cursor:pointer; margin-top:15px;">ลืมรหัสผ่าน?</p>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="border:none; background:none; color:#999; cursor:pointer; margin-top:10px;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchBar" placeholder="ค้นหาชื่อไฟล์..." oninput="renderItems()">
            </div>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box"><i class="fas fa-clock" style="color:var(--success)"></i><div class="stat-value" id="dash-time">00:00</div><div class="stat-label">เวลาปัจจุบัน</div></div>
                    <div class="stat-box"><i class="fas fa-folder-open" style="color:var(--primary)"></i><div class="stat-value" id="dash-count">0 รายการ</div><div class="stat-label">ไฟล์ทั้งหมด</div></div>
                    <div class="stat-box"><i class="fas fa-shield-alt" id="status-icon"></i><div class="stat-value" id="dash-status">Guest Mode</div><div class="stat-label">โหมดการใช้งาน</div></div>
                </div>

                <div id="admin-panel">
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink"></div>
                        <div class="input-group">
                            <label>หมวดหมู่</label>
                            <select id="itemCat">
                                <option value="ทั่วไป">ทั่วไป</option>
                                <option value="เอกสาร">เอกสาร</option>
                                <option value="วิดีโอ">วิดีโอ</option>
                                <option value="โปรแกรม">โปรแกรม</option>
                            </select>
                        </div>
                        <div class="btn-group" style="display:flex; gap:5px;">
                            <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                            <button onclick="resetForm()" style="background:var(--secondary); color:white; border:none; padding:10px 10px; border-radius:8px; cursor:pointer;"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div style="margin-top:15px; padding-top:15px; border-top:1px solid #eee; display:flex; gap:20px; align-items:center;">
                        <span style="font-size:12px; font-weight:bold; color:var(--danger);">Global Lock All:</span>
                        <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                        <input type="text" id="newDownloadPass" placeholder="รหัสผ่านใหม่" style="padding:5px; border-radius:5px; border:1px solid #ddd; font-size:12px;">
                        <button onclick="changeDownloadPass()" style="font-size:12px; cursor:pointer;">เปลี่ยนรหัสโหลด</button>
                    </div>
                </div>

                <div class="category-tabs" id="catTabs">
                    <div class="tab active" onclick="filterCat('ทั้งหมด')">ทั้งหมด</div>
                    <div class="tab" onclick="filterCat('เอกสาร')">เอกสาร</div>
                    <div class="tab" onclick="filterCat('วิดีโอ')">วิดีโอ</div>
                    <div class="tab" onclick="filterCat('โปรแกรม')">โปรแกรม</div>
                    <div class="tab" onclick="filterCat('ทั่วไป')">ทั่วไป</div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100vh; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100vh; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100vh; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script>
        const ADMIN_CONF = { user: "admin", pass: "admin2", keyword: "password" };
        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" };
        
        let items = JSON.parse(localStorage.getItem('cougar_v3_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;
        let currentFilter = 'ทั้งหมด';

        // --- Core Functions ---
        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function toggleAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("Logout?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function performLogin() {
            const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
            if (u === ADMIN_CONF.user && p === ADMIN_CONF.pass) {
                sessionStorage.setItem('isAdmin', 'true'); location.reload();
            } else alert("Error!");
        }

        function filterCat(cat) {
            currentFilter = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === cat));
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            const search = document.getElementById('searchBar').value.toLowerCase();
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            list.innerHTML = '';

            const filtered = items.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(search);
                const matchCat = (currentFilter === 'ทั้งหมด' || item.cat === currentFilter);
                return matchSearch && matchCat;
            });

            filtered.forEach((item) => {
                const realIdx = items.indexOf(item);
                const effectivelyLocked = isGlobalLocked || item.locked;
                
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x160?text=No+Image'}">
                        </div>
                        <div class="download-info">
                            <span class="card-tag">${item.cat || 'ทั่วไป'}</span>
                            <h4>${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> ${effectivelyLocked ? 'Locked' : 'Download'}
                            </button>
                        </div>
                        ${isAdmin ? `
                            <div class="admin-controls">
                                <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${realIdx})"><span class="slider"></span></label>
                                <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="editItem(${realIdx})"></i>
                                <i class="fas fa-trash" style="color:var(--danger); cursor:pointer" onclick="deleteItem(${realIdx})"></i>
                            </div>
                        ` : ''}
                    </div>`;
            });
            updateDashboard();
        }

        function saveItem() {
            const idx = parseInt(document.getElementById('editIndex').value);
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const cat = document.getElementById('itemCat').value;

            if (name && link) {
                const data = { name, img, link, cat, locked: (idx > -1 ? items[idx].locked : false) };
                if (idx > -1) items[idx] = data; else items.push(data);
                localStorage.setItem('cougar_v3_data', JSON.stringify(items));
                resetForm(); renderItems();
            }
        }

        function toggleItemLock(i) { items[i].locked = !items[i].locked; localStorage.setItem('cougar_v3_data', JSON.stringify(items)); renderItems(); }
        
        function toggleGlobalLock() { 
            isGlobalLocked = document.getElementById('globalLock').checked; 
            localStorage.setItem('global_lock', isGlobalLocked); 
            renderItems(); 
        }

        async function secureDownload(link, locked) {
            if (isGlobalLocked || locked) {
                const p = prompt("Password:");
                if (!p) return;
                const hashed = await hashText(p);
                const current = localStorage.getItem('custom_download_hash') || HASH_CONFIG.dl;
                if (hashed === current) window.open(link, '_blank'); else alert("Wrong!");
            } else window.open(link, '_blank');
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('itemCat').value = item.cat || 'ทั่วไป';
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteItem(i) { if(confirm("Delete?")) { items.splice(i,1); localStorage.setItem('cougar_v3_data', JSON.stringify(items)); renderItems(); } }
        
        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = '';
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        async function changeDownloadPass() {
            const p = document.getElementById('newDownloadPass').value;
            if(p) { localStorage.setItem('custom_download_hash', await hashText(p)); alert("Success!"); }
        }

        function openImage(src) { if(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; } }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
        }

        function updateDashboard() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
            document.getElementById('dash-count').innerText = items.length + " รายการ";
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('dash-status').innerText = isAdmin ? "Admin Mode" : "Guest Mode";
            document.getElementById('status-icon').style.color = isAdmin ? "var(--success)" : "var(--secondary)";
        }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
                document.getElementById('globalLock').checked = isGlobalLocked;
            }
            renderItems();
            setInterval(updateDashboard, 1000);
        };
    </script>
</body>
</html>
