<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Double Secure System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Login Card Design */
        #login-area { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .login-input:focus { border-color: var(--primary); }
        
        .btn-login { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .remember-me { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; margin: 10px 0; }

        /* Hidden Keyword Section */
        #keyword-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; animation: fadeIn 0.5s ease; }

        /* Final Popup */
        .popup-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .popup-card { background: #222; color: white; padding: 40px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* Admin Panel */
        #admin-panel { display: none; background: #fff; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2>Dashboard</h2>
            <button id="logout-btn" style="display:none; background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="logout()">Logout Admin</button>
        </div>

        <div class="main-content">
            <div id="login-area">
                <i class="fas fa-lock" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
                <h3 style="margin: 0 0 20px 0;">Admin Authentication</h3>
                
                <div id="id-pass-section">
                    <input type="text" id="user-id" class="login-input" placeholder="Username">
                    <input type="password" id="user-pass" class="login-input" placeholder="Password">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> จำรหัสผ่าน
                    </label>
                    <button class="btn-login" onclick="validateFirstStep()">Verify Identity</button>
                </div>

                <div id="keyword-section">
                    <p style="font-size: 12px; color: var(--danger); font-weight: bold;">Step 2: Enter Security Keyword</p>
                    <input type="password" id="security-keyword" class="login-input" placeholder="Keyword">
                    <button class="btn-login" style="background: var(--success);" onclick="validateKeyword()">Unlock Admin Panel</button>
                </div>
            </div>

            <div id="admin-panel">
                <h3><i class="fas fa-tools"></i> ระบบจัดการแอดมินเปิดใช้งานแล้ว</h3>
                <p>ยินดีต้อนรับแอดมิน คุณสามารถแก้ไขข้อมูลไฟล์ได้ที่นี่</p>
                <hr>
                <button onclick="location.reload()" style="padding: 10px; cursor:pointer;">รีเฟรชหน้าเพื่อจัดการไฟล์</button>
            </div>
        </div>
    </div>

    <div id="finalPopup" class="popup-overlay">
        <div class="popup-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
            <h2>Access Granted</h2>
            <p>ยืนยันตัวตนสำเร็จ!</p>
            <button onclick="enterAdmin()" style="width:100%; padding:10px; border-radius:8px; border:none; background:var(--primary); color:white; cursor:pointer; font-weight:bold;">ไปที่แผงควบคุม</button>
        </div>
    </div>

    <script>
        // ตั้งค่ารหัสผ่าน (ใช้คำว่า admin / password / password ตามลำดับ)
        const HASH_ID = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"; // admin
        const HASH_PASS = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"; // password
        const HASH_KEY = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"; // password (keyword)

        async function hash(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // โหลดรหัสที่จำไว้
        window.onload = () => {
            if(localStorage.getItem('remembered_id')) {
                document.getElementById('user-id').value = localStorage.getItem('remembered_id');
                document.getElementById('user-pass').value = localStorage.getItem('remembered_pass');
                document.getElementById('remember').checked = true;
            }
            if(sessionStorage.getItem('isAdmin') === 'true') showAdminPanel();
        };

        // ขั้นตอนที่ 1: ตรวจ ID/PASS
        async function validateFirstStep() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const rem = document.getElementById('remember').checked;

            if(await hash(id) === HASH_ID && await hash(pass) === HASH_PASS) {
                if(rem) {
                    localStorage.setItem('remembered_id', id);
                    localStorage.setItem('remembered_pass', pass);
                } else {
                    localStorage.removeItem('remembered_id');
                    localStorage.removeItem('remembered_pass');
                }
                // แสดงช่อง Keyword
                document.getElementById('id-pass-section').style.opacity = "0.5";
                document.getElementById('id-pass-section').style.pointerEvents = "none";
                document.getElementById('keyword-section').style.display = "block";
            } else {
                alert("ID หรือ Password ไม่ถูกต้อง!");
            }
        }

        // ขั้นตอนที่ 2: ตรวจ Keyword
        async function validateKeyword() {
            const key = document.getElementById('security-keyword').value;
            if(await hash(key) === HASH_KEY) {
                // เด้ง Popup สุดท้าย
                document.getElementById('finalPopup').style.display = 'flex';
            } else {
                alert("คีย์เวิร์ดความปลอดภัยไม่ถูกต้อง!");
            }
        }

        function enterAdmin() {
            sessionStorage.setItem('isAdmin', 'true');
            document.getElementById('finalPopup').style.display = 'none';
            showAdminPanel();
        }

        function showAdminPanel() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        }
    </script>
</body>
</html>
