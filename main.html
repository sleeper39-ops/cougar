<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Google Drive Library</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg-dark: #1a1a1a;
            --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }

        body { 
            display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-body); height: 100vh; overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: var(--sidebar-width); background: var(--bg-dark); color: white; 
            padding: 25px 15px; display: flex; flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; letter-spacing: 2px; }

        .sidebar a { 
            color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; 
            margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px;
        }

        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* Main Content Area */
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ระบบ Card สำหรับแสดงไฟล์ */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .download-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #ddd; 
        }
        .download-card img { width: 100%; height: 200px; object-fit: cover; background: #eee; border-bottom: 1px solid #eee; }
        .download-info { padding: 20px; text-align: center; }

        .btn-download {
            display: inline-block; background: var(--bg-dark); color: white; 
            text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; 
            width: 90%; transition: 0.3s;
        }
        .btn-download:hover { background: var(--primary); }

        /* ส่วนของ Admin */
        .admin-panel { background: #fff; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-form { display: flex; flex-wrap: wrap; gap: 15px; }
        .admin-form input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1; min-width: 200px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .logout-btn { margin-top: auto; background: var(--danger); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
    </div>

    <div class="main-content">
        
        <div id="dash-page" class="page-content active">
            <h1>ระบบจัดการไฟล์ (Google Drive)</h1>
            
            <div class="admin-panel">
                <h3 style="margin-top:0;"><i class="fas fa-link"></i> เพิ่มลิงก์ไฟล์จาก Google Drive</h3>
                <div class="admin-form">
                    <input type="text" id="itemName" placeholder="ระบุชื่อไฟล์/โปรแกรม">
                    <input type="text" id="itemImgLink" placeholder="ลิงก์รูปภาพ (Google Drive)">
                    <input type="text" id="itemFileLink" placeholder="ลิงก์ดาวน์โหลดไฟล์ (Google Drive)">
                    <button class="btn-add" onclick="addNewItem()">เพิ่มรายการ</button>
                </div>
                <p style="font-size: 11px; color: #666; margin-top:10px;">
                    * ข้อแนะนำ: นำลิงก์ที่แชร์เป็น 'ทุกคนที่มีลิงก์' มาวางได้เลย ระบบจะทำพรีวิวให้เองครับ
                </p>
            </div>

            <div id="download-list" class="download-grid"></div>
        </div>

        <div id="live-page" class="page-content">...</div>
        <div id="map-page" class="page-content">...</div>

    </div>

    <script>
        // ฟังก์ชันแปลงลิงก์ Google Drive ให้เป็น Direct Link สำหรับรูปภาพ
       function formatDriveLink(url) {
    if (!url || typeof url !== 'string') return '';
    url = url.trim();

    // ตรวจสอบว่าเป็นลิงก์ Google Drive หรือไม่
    if (url.includes('drive.google.com')) {
        let id = "";
        
        // ดึง ID จากรูปแบบ /file/d/ID/view (เหมือนลิงก์ที่คุณส่งมา)
        if (url.includes('/file/d/')) {
            id = url.split('/file/d/')[1].split('/')[0];
        } 
        // ดึง ID จากรูปแบบ ?id=ID
        else if (url.includes('id=')) {
            id = url.split('id=')[1].split('&')[0];
        }

        if (id) {
            // ส่งกลับลิงก์ที่เป็นไฟล์รูปภาพโดยตรงเพื่อให้แสดงผลบนหน้าเว็บได้
            return `https://drive.google.com/uc?export=view&id=${id}`;
        }
    }
    return url;
}

        let fileItems = JSON.parse(localStorage.getItem('cougar_drive_files')) || [];

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            fileItems.forEach((item, index) => {
                // แปลงลิงก์รูปให้แสดงพรีวิวได้
                const previewImg = formatDriveLink(item.img);
                
                list.innerHTML += `
                    <div class="download-card">
                        <img src="${previewImg}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Preview'" alt="preview">
                        <div class="download-info">
                            <h3 style="margin-top:0;">${item.name}</h3>
                            <a href="${item.link}" target="_blank" class="btn-download">
                                <i class="fas fa-external-link-alt"></i> Link : Download
                            </a>
                            <p onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer; font-size:11px; margin-top:15px;">[ ลบรายการ ]</p>
                        </div>
                    </div>
                `;
            });
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImgLink').value;
            const link = document.getElementById('itemFileLink').value;

            if (name && link) {
                fileItems.push({ name, img, link });
                localStorage.setItem('cougar_drive_files', JSON.stringify(fileItems));
                renderItems();
                
                // ล้างค่า
                document.getElementById('itemName').value = '';
                document.getElementById('itemImgLink').value = '';
                document.getElementById('itemFileLink').value = '';
            } else {
                alert("กรุณากรอกชื่อและลิงก์ไฟล์ดาวน์โหลด");
            }
        }

        function deleteItem(index) {
            if (confirm("ยืนยันการลบรายการ?")) {
                fileItems.splice(index, 1);
                localStorage.setItem('cougar_drive_files', JSON.stringify(fileItems));
                renderItems();
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            const navId = 'nav-' + pageId.split('-')[0];
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');
        }

        window.onload = renderItems;

        function logout() { if(confirm("ยืนยันการออกจากระบบ?")) window.location.href = "login.html"; }
    </script>
</body>
</html>
