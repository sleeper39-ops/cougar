<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar & Layout */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }
        .wrapper { flex: 1; display: flex; flex-direction: column; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Unified Auth Modal */
        .auth-overlay { display: none; position: fixed; z-index: 10000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .auth-card { background: #222; padding: 35px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #444; color: white; animation: zoomIn 0.3s ease; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; box-sizing: border-box; outline: none; }
        .auth-input:focus { border-color: var(--primary); }
        
        /* สลับหน้า Login / Keyword */
        #keyword-form { display: none; }
        .switch-link { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        
        /* Success Popup */
        .success-overlay { display: none; position: fixed; z-index: 11000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; }
        .success-card { background: #111; padding: 40px; border-radius: 25px; text-align: center; border: 2px solid var(--success); color: white; }

        /* Admin Panel Items */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 20px; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; padding-bottom: 15px; }
        .card-img { height: 150px; background: #333; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a class="active"><i class="fas fa-home"></i> Dashboard</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2>System Overview</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="admin-panel">
                <h3 style="margin-top:0;">Management Console</h3>
                <p>ยินดีต้อนรับแอดมิน คุณสามารถเพิ่มหรือแก้ไขไฟล์ได้ที่นี่</p>
                <button onclick="location.reload()" style="padding:8px; cursor:pointer;">รีเฟรชระบบ</button>
            </div>
            
            <div id="download-list" class="download-grid">
                <div class="download-card">
                    <div class="card-img"><img src="https://via.placeholder.com/300x150?text=Sample+File"></div>
                    <h4>Sample File 01</h4>
                    <button style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px;">Download</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="auth-overlay">
        <div class="auth-card">
            <i class="fas fa-user-lock" style="font-size: 45px; color: var(--primary); margin-bottom: 15px;"></i>
            
            <div id="login-form">
                <h3>Admin Login</h3>
                <input type="text" id="admin-id" class="auth-input" placeholder="Username">
                <input type="password" id="admin-pass" class="auth-input" placeholder="Password">
                <label style="font-size:12px; color:#888; display:flex; align-items:center; justify-content:center; gap:5px;">
                    <input type="checkbox" id="remember-me"> จดจำรหัสผ่าน
                </label>
                <button onclick="processLogin()" style="width:100%; padding:12px; margin-top:15px; background:var(--success); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">Login</button>
                <span class="switch-link" onclick="switchForm('keyword')">ลืมรหัสผ่านใช่หรือไม่?</span>
            </div>

            <div id="keyword-form">
                <h3 style="color:var(--warning);">Recovery Mode</h3>
                <p style="font-size:12px; color:#aaa;">กรุณาใส่คีย์เวิร์ดเพื่อแสดงข้อมูลเข้าระบบ</p>
                <input type="password" id="input-keyword" class="auth-input" placeholder="Enter Keyword">
                <button onclick="checkKeyword()" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">แสดงรหัสผ่าน</button>
                <span class="switch-link" onclick="switchForm('login')">กลับไปหน้า Login</span>
            </div>

            <button onclick="closeAuthModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="successPopup" class="success-overlay">
        <div class="success-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
            <h2>Access Granted!</h2>
            <p>เข้าสู่ระบบสำเร็จ ยินดีต้อนรับแอดมิน</p>
            <button onclick="enterAdmin()" style="padding:10px 40px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:20px;">ตกลง</button>
        </div>
    </div>

    <script>
        // กำหนดค่าตัวแปร
        const CONFIG = {
            id: "admin",
            pass: "admin2",
            keyword: "password"
        };

        // โหลดรหัสที่จำไว้ (ถ้ามี)
        window.onload = () => {
            if(localStorage.getItem('remember_id')) {
                document.getElementById('admin-id').value = localStorage.getItem('remember_id');
                document.getElementById('admin-pass').value = localStorage.getItem('remember_pass');
                document.getElementById('remember-me').checked = true;
            }
            if(sessionStorage.getItem('isAdmin') === 'true') {
                showAdminMode();
            }
        };

        function toggleAuthModal() {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("ต้องการออกจากระบบแอดมิน?")) {
                    sessionStorage.removeItem('isAdmin');
                    location.reload();
                }
            } else {
                document.getElementById('authModal').style.display = 'flex';
                switchForm('login');
            }
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        // สลับหน้า Login / Keyword
        function switchForm(mode) {
            if(mode === 'keyword') {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('keyword-form').style.display = 'block';
            } else {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('keyword-form').style.display = 'none';
            }
        }

        // ตรวจสอบ Keyword เพื่อแสดง ID/Pass
        function checkKeyword() {
            const val = document.getElementById('input-keyword').value;
            if(val === CONFIG.keyword) {
                alert(`คีย์เวิร์ดถูกต้อง!\nID: ${CONFIG.id}\nPassword: ${CONFIG.pass}`);
                document.getElementById('admin-id').value = CONFIG.id;
                document.getElementById('admin-pass').value = CONFIG.pass;
                switchForm('login'); // กลับไปหน้า login พร้อมกรอกรหัสให้เสร็จ
            } else {
                alert("คีย์เวิร์ดไม่ถูกต้อง!");
            }
        }

        // ประมวลผลการ Login
        function processLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('admin-pass').value;
            const isRem = document.getElementById('remember-me').checked;

            if(id === CONFIG.id && pass === CONFIG.pass) {
                if(isRem) {
                    localStorage.setItem('remember_id', id);
                    localStorage.setItem('remember_pass', pass);
                } else {
                    localStorage.removeItem('remember_id');
                    localStorage.removeItem('remember_pass');
                }
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('successPopup').style.display = 'flex';
            } else {
                alert("ID หรือ Password ไม่ถูกต้อง!");
            }
        }

        function enterAdmin() {
            sessionStorage.setItem('isAdmin', 'true');
            document.getElementById('successPopup').style.display = 'none';
            showAdminMode();
        }

        function showAdminMode() {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('auth-btn').innerText = "Logout Admin";
            document.getElementById('auth-btn').style.background = "var(--danger)";
        }
    </script>
</body>
</html>
