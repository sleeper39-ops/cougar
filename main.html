<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Admin System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px; --top-height: 60px;
            --download-gradient: linear-gradient(135deg, #02aab0 0%, #00cdac 100%);
            --download-shadow: rgba(0, 205, 172, 0.3);
        }

        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; letter-spacing: 2px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* Main Area */
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: var(--top-height); background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .nav-title { font-size: 1.25rem; font-weight: bold; color: #333; margin: 0; }

        .btn-auth { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: var(--danger); color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Card System */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .download-card img { width: 100%; height: 180px; object-fit: cover; cursor: zoom-in; }
        .download-info { padding: 20px; text-align: center; }
        
        .btn-download { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--download-gradient); color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; box-sizing: border-box; transition: 0.3s; border: none; cursor: pointer; }

        /* Admin Panel */
        #admin-panel { display: none; background: #fff; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .admin-actions { display: flex; justify-content: center; gap: 15px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 class="nav-title">Dashboard</h2>
            <button id="auth-btn" class="btn-auth btn-login" onclick="toggleAuthModal()">
                <i class="fas fa-user-lock"></i> <span>Login Admin</span>
            </button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-clock" style="color:var(--success); font-size: 2rem;"></i>
                        <h3 id="clock">00:00</h3><p style="color:#666;">เวลาปัจจุบัน</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-folder-open" style="color:var(--primary); font-size: 2rem;"></i>
                        <h3 id="file-count">0 รายการ</h3><p style="color:#666;">ไฟล์ในระบบ</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-shield-alt" id="status-icon" style="color:#ccc; font-size: 2rem;"></i>
                        <h3 id="status-text">Guest</h3><p style="color:#666;">โหมดการใช้งาน</p>
                    </div>
                </div>

                <div id="admin-panel">
                    <h3 id="panel-title"><i class="fas fa-plus-circle"></i> จัดการไฟล์ข้อมูล</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div class="input-group"><label>ชื่อรายการ</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูปภาพ</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink"></div>
                    </div>
                    <input type="hidden" id="editIndex" value="-1">
                    <button id="btn-submit-item" style="background:var(--success); color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="saveItem()">บันทึกข้อมูล</button>
                    <button id="btn-cancel-edit" style="display:none; background:#888; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer;" onclick="cancelEdit()">ยกเลิก</button>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content">
                <div style="background:white; height:100%; border-radius:15px; display:flex; align-items:center; justify-content:center;">
                    <p>ระบบกล้องสดกำลังเชื่อมต่อ...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:320px; position:relative;">
            <span onclick="toggleAuthModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:20px;">&times;</span>
            <h3 style="margin:0 0 20px 0;">Admin Login</h3>
            
            <input type="text" id="auth_u_key" placeholder="ID" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
            <input type="password" id="auth_p_key" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
            
            <label style="font-size: 12px; color: #666; display:flex; align-items:center; gap:5px; margin-bottom:15px; cursor:pointer;">
                <input type="checkbox" id="rememberMe"> จดจำรหัสผ่าน
            </label>

            <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">เข้าสู่ระบบ</button>

            <div style="margin-top:20px; border-top:1px dashed #ccc; padding-top:15px;">
                <p style="font-size:11px; color:#888; text-align:center;">ลืมรหัสผ่าน? ใส่คีย์เวิร์ดกู้คืน</p>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="recoveryKey" placeholder="คีย์เวิร์ด..." style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
                    <button onclick="checkKeyword()" style="background:#34495e; color:white; border:none; padding:0 10px; border-radius:5px; cursor:pointer;">กู้คืน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg" style="max-width:90%; max-height:90%;"></div>

    <script>
        // --- ส่วนความปลอดภัย: การตรวจสอบ ---
        // รหัสที่ต้องการ: id=admin, pass=admin2, keyword=password
        const CONFIG = {
            u: "admin",
            p: "admin2",
            k: "password"
        };

        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("ออกจากระบบ Admin?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else {
                const modal = document.getElementById('loginModal');
                modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
                
                // โหลดรหัสที่จำไว้
                if(localStorage.getItem('remembered_id')) {
                    document.getElementById('auth_u_key').value = localStorage.getItem('remembered_id');
                    document.getElementById('auth_p_key').value = localStorage.getItem('remembered_pass');
                    document.getElementById('rememberMe').checked = true;
                }
            }
        }

        function handleLogin() {
            const id = document.getElementById('auth_u_key').value;
            const pass = document.getElementById('auth_p_key').value;
            const isRem = document.getElementById('rememberMe').checked;

            if (id === CONFIG.u && pass === CONFIG.p) {
                if(isRem) {
                    localStorage.setItem('remembered_id', id);
                    localStorage.setItem('remembered_pass', pass);
                } else {
                    localStorage.removeItem('remembered_id');
                    localStorage.removeItem('remembered_pass');
                }
                sessionStorage.setItem('isAdmin', 'true'); 
                location.reload();
            } else {
                alert("ID หรือรหัสผ่านไม่ถูกต้อง");
            }
        }

        function checkKeyword() {
            const key = document.getElementById('recoveryKey').value;
            if (key === CONFIG.k) {
                alert("✅ คีย์เวิร์ดถูกต้อง!\n\nID: admin\nPassword: admin2");
            } else {
                alert("❌ คีย์เวิร์ดไม่ถูกต้อง!");
            }
        }

        // --- ระบบจัดการข้อมูล ---
        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            document.getElementById('file-count').innerText = `${items.length} รายการ`;
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

            items.forEach((item, index) => {
                let adminUI = isAdmin ? `<div class="admin-actions"><span style="color:var(--warning); cursor:pointer;" onclick="editItem(${index})"><i class="fas fa-edit"></i> แก้ไข</span><span style="color:var(--danger); cursor:pointer;" onclick="deleteItem(${index})"><i class="fas fa-trash"></i> ลบ</span></div>` : '';
                list.innerHTML += `
                    <div class="download-card">
                        <img src="${item.img || 'https://via.placeholder.com/300x180'}" onclick="openLightbox(this.src)">
                        <div class="download-info">
                            <h3 style="margin-bottom:15px;">${item.name}</h3>
                            <a href="${item.link}" target="_blank" class="btn-download"><i class="fas fa-download"></i> Download</a>
                            ${adminUI}
                        </div>
                    </div>`;
            });
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const editIdx = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                if (editIdx > -1) items[editIdx] = { name, img, link };
                else items.push({ name, img, link });
                
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                cancelEdit(); renderItems();
            } else { alert("กรุณากรอกชื่อและลิงก์ดาวน์โหลด"); }
        }

        function editItem(index) {
            const item = items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('panel-title').innerText = "กำลังแก้ไขข้อมูล...";
            document.getElementById('btn-cancel-edit').style.display = "inline-block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelEdit() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = "";
            document.getElementById('itemImg').value = "";
            document.getElementById('itemLink').value = "";
            document.getElementById('panel-title').innerText = "จัดการไฟล์ข้อมูล";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function deleteItem(index) { if(confirm("ลบไฟล์นี้?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; }
        function closeLightbox() { document.getElementById('imgLightbox').style.display = 'none'; }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('status-text').innerText = "Admin Mode";
                document.getElementById('status-icon').style.color = "var(--success)";
                const btn = document.getElementById('auth-btn');
                btn.className = "btn-auth btn-logout";
                btn.innerHTML = '<i class="fas fa-sign-out-alt"></i> <span>Logout Admin</span>';
            }
            renderItems();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}); }, 1000);
        };
    </script>
</body>
</html>
