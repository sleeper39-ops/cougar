<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Obs Docks UI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --bg-dark: #1a1a1a;
            --bg-body: #f0f2f5;
            --sidebar-width: 260px;
            --top-height: 60px;
        }

        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }

        /* Sidebar Responsive */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg-dark); 
            color: white; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            transition: 0.3s;
            z-index: 1000;
        }

        /* Top Nav & Mobile Menu Trigger */
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow-x: hidden; }
        .top-nav { 
            height: var(--top-height); 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }

        .menu-btn { display: none; font-size: 24px; cursor: pointer; color: var(--bg-dark); }

        /* Buttons */
        .btn-auth { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: var(--danger); color: white; }

        /* Main Content Grid */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* Download Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; }
        .download-card img { width: 100%; height: 160px; object-fit: cover; }

        /* Admin Form Mobile */
        .admin-form { display: flex; flex-wrap: wrap; gap: 10px; }
        .admin-form input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1 1 200px; }

        /* Mobile Adjustments (Responsive) */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; 
                left: -260px; 
                height: 100%; 
            }
            .sidebar.active { left: 0; }
            .menu-btn { display: block; }
            
            .stat-grid { grid-template-columns: 1fr; } /* สถิติเรียงลงมาเป็น 1 แถว */
            .top-nav { padding: 0 15px; }
            
            .modal-content { width: 85%; }
            
            .admin-form { flex-direction: column; }
            .admin-form input { width: 100%; }
        }

        /* Overlay เมื่อเปิดเมนูในมือถือ */
        .sidebar-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 999; 
        }
        .sidebar-overlay.active { display: block; }

        /* Iframe Container Responsive */
        .frame-container { width: 100%; height: calc(100vh - 180px); border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        iframe { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div style="font-weight: bold; color: var(--bg-dark);">Obs Docks</div>
            <button id="auth-btn" class="btn-auth btn-login" onclick="toggleAuthModal()">
                <i class="fas fa-user-lock"></i> <span>Login Admin</span>
            </button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="stat-grid">
                    <div class="stat-card">
                        <i class="fas fa-clock" style="color:var(--success); font-size: 1.5rem;"></i>
                        <h3 id="clock" style="margin:5px 0;">00:00</h3><p style="margin:0; font-size:12px; color:#666;">เวลาปัจจุบัน</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-folder-open" style="color:var(--primary); font-size: 1.5rem;"></i>
                        <h3 id="file-count" style="margin:5px 0;">0 รายการ</h3><p style="margin:0; font-size:12px; color:#666;">คลังไฟล์</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-shield-alt" id="status-icon" style="color:#ccc; font-size: 1.5rem;"></i>
                        <h3 id="status-text" style="margin:5px 0;">Guest</h3><p style="margin:0; font-size:12px; color:#666;">สถานะ</p>
                    </div>
                </div>

                <div id="admin-panel" style="display:none; background: white; padding: 20px; border-radius: 12px; border: 2px dashed var(--primary); margin-bottom: 20px;">
                    <h4 id="panel-title" style="margin-top:0;"><i class="fas fa-plus-circle"></i> Admin Panel</h4>
                    <div class="admin-form">
                        <input type="text" id="itemName" placeholder="ชื่อซอฟต์แวร์">
                        <input type="text" id="itemImg" placeholder="Direct Link รูปภาพ">
                        <input type="text" id="itemLink" placeholder="ลิงก์ดาวน์โหลด">
                        <input type="hidden" id="editIndex" value="-1">
                        <button id="btn-submit-item" class="btn-add" style="background:var(--success); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;" onclick="saveItem()">บันทึก</button>
                        <button id="btn-cancel-edit" style="display:none; background:#888; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;" onclick="cancelEdit()">ยกเลิก</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><div class="frame-container"><iframe src="cctv.html"></iframe></div></div>
            <div id="map-page" class="page-content"><div class="frame-container"><iframe src="map.html"></iframe></div></div>
            <div id="calendar-page" class="page-content"><div class="frame-container"><iframe src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok"></iframe></div></div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span onclick="toggleAuthModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:20px;">&times;</span>
            <h3 style="margin-top:0;">Admin Access</h3>
            <input type="text" id="adminID" placeholder="ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-submit" onclick="handleLogin()">ยืนยัน</button>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("Logout Admin?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else {
                const modal = document.getElementById('loginModal');
                modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            }
        }

        function handleLogin() {
            if (document.getElementById('adminID').value === "admin" && document.getElementById('adminPass').value === "admin2") {
                sessionStorage.setItem('isAdmin', 'true'); location.reload();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        function formatDriveLink(url) {
            if (!url) return 'https://via.placeholder.com/300x200?text=No+Image';
            url = url.trim();
            if (url.includes('drive.google.com')) {
                let id = "";
                if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0];
                else if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
                return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
            }
            return url;
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            document.getElementById('file-count').innerText = `${items.length} รายการ`;
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

            items.forEach((item, index) => {
                let adminUI = isAdmin ? `
                    <div style="display:flex; justify-content:center; gap:20px; margin-top:15px; padding-top:10px; border-top:1px solid #eee;">
                        <span style="color:var(--warning); cursor:pointer; font-size:14px;" onclick="editItem(${index})"><i class="fas fa-edit"></i> แก้ไข</span>
                        <span style="color:var(--danger); cursor:pointer; font-size:14px;" onclick="deleteItem(${index})"><i class="fas fa-trash"></i> ลบ</span>
                    </div>` : '';

                list.innerHTML += `
                    <div class="download-card">
                        <img src="${formatDriveLink(item.img)}" onerror="this.src='https://via.placeholder.com/300x200?text=Error+Loading'">
                        <div class="download-info" style="padding:15px; text-align:center;">
                            <h4 style="margin:0 0 10px 0;">${item.name}</h4>
                            <a href="${item.link}" target="_blank" class="btn-download" style="display:block; background:var(--bg-dark); color:white; text-decoration:none; padding:10px; border-radius:8px; font-weight:bold;">Download</a>
                            ${adminUI}
                        </div>
                    </div>`;
            });
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const editIdx = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                if (editIdx > -1) items[editIdx] = { name, img, link };
                else items.push({ name, img, link });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                cancelEdit(); renderItems();
            } else { alert("กรุณากรอกข้อมูลให้ครบ"); }
        }

        function editItem(index) {
            const item = items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-submit-item').innerText = "Update";
            document.getElementById('btn-cancel-edit').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('editIndex').value = '-1';
            document.getElementById('itemName').value = ''; document.getElementById('itemImg').value = ''; document.getElementById('itemLink').value = '';
            document.getElementById('btn-submit-item').innerText = "บันทึก";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function deleteItem(index) {
            if(confirm("ยืนยันการลบ?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar(); // ปิดเมนูอัตโนมัติเมื่อเลือกหน้าในมือถือ
        }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('status-text').innerText = "Admin";
                document.getElementById('status-icon').style.color = "var(--success)";
                const btn = document.getElementById('auth-btn');
                btn.className = "btn-auth btn-logout";
                btn.innerHTML = '<i class="fas fa-sign-out-alt"></i> <span>Logout</span>';
            }
            renderItems();
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            }, 1000);
        };
    </script>
</body>
</html>
