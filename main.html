<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }
        .stat-label { font-size: 13px; color: #888; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-container { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; }
        .btn-download { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }
        .admin-controls { display: flex; justify-content: center; gap: 15px; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; }
        
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="window.performLogin()" class="btn-login">เข้าสู่ระบบ</button>
            <p onclick="window.handleForgotPassword()" style="font-size:12px; color:var(--primary); cursor:pointer; margin-top:15px;">ลืมรหัสผ่าน?</p>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#999; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="window.showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="window.showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="window.showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="window.showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="window.toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box"><i class="fas fa-clock" style="color:#2ecc71"></i><div class="stat-value" id="dash-time">00:00</div><div class="stat-label">เวลาปัจจุบัน</div></div>
                    <div class="stat-box"><i class="fas fa-folder-open" style="color:#3498db"></i><div class="stat-value" id="dash-count">0 รายการ</div><div class="stat-label">ไฟล์ในระบบ</div></div>
                    <div class="stat-box"><i class="fas fa-shield-alt" id="status-icon"></i><div class="stat-value" id="dash-status">Guest Mode</div><div class="stat-label">โหมดการใช้งาน</div></div>
                </div>

                <div id="admin-panel">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h3>Admin Control</h3>
                        <div>
                            <span style="font-size:12px; font-weight:bold;">Global Lock </span>
                            <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูปภาพ</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink"></div>
                        <div class="btn-group">
                            <button onclick="window.saveItem()" id="btn-save" style="background:var(--success); color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">บันทึก</button>
                            <button onclick="window.resetForm()" style="background:var(--secondary); color:white; padding:10px 10px; border:none; border-radius:8px; cursor:pointer;">X</button>
                        </div>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" style="max-width:90%; max-height:90%;"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
