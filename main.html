<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Ultimate System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Page System */
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .login-card h3 { margin: 0 0 20px 0; text-align: center; color: var(--bg-dark); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .login-options { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin: 10px 0 20px 0; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #2980b9; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-box i { font-size: 2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #333; }
        .stat-label { font-size: 13px; color: #888; margin-top: 5px; }
        .icon-time { color: #2ecc71; } .icon-file { color: #3498db; } .icon-mode { color: #2ecc71; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }

        /* Download Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-container { height: 180px; background: #222; overflow: hidden; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .card-body { padding: 20px; text-align: center; }

        iframe { width: 100%; height: calc(100vh - 150px); border: none; border-radius: 15px; background: white; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-lock"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <div class="login-options">
                <label style="cursor:pointer;"><input type="checkbox" id="rememberMe"> Remember Me</label>
                <span onclick="forgotPass()" style="color:var(--primary); cursor:pointer; font-weight:bold;">Forgot Password?</span>
            </div>
            <button onclick="handleLogin()" class="btn-login">Login</button>
            <button onclick="closeLogin()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#999;">Cancel</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title" style="font-size: 1.2rem; color: #444;">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock icon-time"></i>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-file-download icon-file"></i>
                        <div class="stat-value" id="dash-count">0</div>
                        <div class="stat-label">ไฟล์ทั้งหมด</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-shield-alt icon-mode"></i>
                        <div class="stat-value" id="dash-status">Guest</div>
                        <div class="stat-label">สถานะปัจจุบัน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <h4 style="margin:0 0 15px 0;"><i class="fas fa-edit"></i> Manage Files</h4>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="text" id="itemName" class="login-input" placeholder="ชื่อไฟล์" style="margin:0">
                        <input type="text" id="itemImg" class="login-input" placeholder="ลิงก์รูปภาพ" style="margin:0">
                        <input type="text" id="itemLink" class="login-input" placeholder="ลิงก์ดาวน์โหลด" style="margin:0">
                        <div style="display:flex; gap:10px;">
                            <button onclick="saveItem()" id="btn-save" class="btn-login" style="width:100px; background:var(--success)">Save</button>
                            <button onclick="resetForm()" class="btn-login" style="width:80px; background:var(--secondary)">Clear</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html"></iframe></div>
            
            <div id="map-page" class="page-content"><iframe src="map.html"></iframe></div>
            
            <div id="calendar-page" class="page-content"><iframe src="calendar.html"></iframe></div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const ADMIN_DATA = { user: "admin", pass: "admin2", keyword: "password" };
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        // NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
            
            const titles = { 'dash-page': 'Dashboard', 'live-page': 'ระบบกล้องสด', 'map-page': 'แผนที่ระบบ', 'calendar-page': 'ปฏิทินงาน' };
            document.getElementById('nav-title').innerText = titles[pageId];
        }

        // AUTH SYSTEM
        function toggleAuth() {
            if (isLoggedIn()) {
                if(confirm("Logout?")) {
                    localStorage.removeItem('isAdmin');
                    sessionStorage.removeItem('isAdmin');
                    location.reload();
                }
            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }
        }

        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const remember = document.getElementById('rememberMe').checked;

            if (u === ADMIN_DATA.user && p === ADMIN_DATA.pass) {
                const storage = remember ? localStorage : sessionStorage;
                storage.setItem('isAdmin', 'true');
                location.reload();
            } else {
                alert("Invalid Username or Password!");
            }
        }

        function isLoggedIn() {
            return localStorage.getItem('isAdmin') === 'true' || sessionStorage.getItem('isAdmin') === 'true';
        }

        function forgotPass() {
            const key = prompt("Enter Recovery Keyword:");
            if (key === ADMIN_DATA.keyword) {
                alert(`Admin Credentials:\nUser: ${ADMIN_DATA.user}\nPass: ${ADMIN_DATA.pass}`);
            } else if (key !== null) {
                alert("Wrong Keyword!");
            }
        }

        // CORE FUNCTIONS
        function updateDashboard() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('dash-count').innerText = items.length;
            
            if(isLoggedIn()) {
                document.getElementById('dash-status').innerText = "Admin Mode";
                document.getElementById('admin-panel').style.display = "block";
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = isLoggedIn();

            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container"><img src="${item.img || 'https://via.placeholder.com/300x180?text=Cougar2'}"></div>
                        <div class="card-body">
                            <h4 style="margin:0 0 15px 0;">${item.name}</h4>
                            <button onclick="window.open('${item.link}')" class="btn-login" style="background:var(--success)">Download</button>
                            ${isAdmin ? `
                                <div style="margin-top:10px; display:flex; justify-content:center; gap:15px; font-size:12px;">
                                    <span onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;"><i class="fas fa-edit"></i> Edit</span>
                                    <span onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i> Delete</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
            updateDashboard();
        }

        function saveItem() {
            const n = document.getElementById('itemName').value, i = document.getElementById('itemImg').value, l = document.getElementById('itemLink').value, idx = parseInt(document.getElementById('editIndex').value);
            if(n && l) {
                if(idx > -1) items[idx] = { name:n, img:i, link:l };
                else items.push({ name:n, img:i, link:l });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                resetForm(); renderItems();
            }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteItem(i) { if(confirm("Delete this file?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = ""; document.getElementById('itemImg').value = ""; document.getElementById('itemLink').value = "";
            document.getElementById('btn-save').innerText = "Save";
        }

        window.onload = () => {
            renderItems();
            setInterval(updateDashboard, 1000);
        };
    </script>
</body>
</html>
