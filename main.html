<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg-dark: #1a1a1a;
            --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }

        body { 
            display: flex; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-body); 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg-dark); 
            color: white; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar h2 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 40px; 
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .sidebar a { 
            color: #bbb; 
            text-decoration: none; 
            padding: 14px 20px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .sidebar a i { width: 20px; }

        .sidebar a:hover, .sidebar a.active { 
            background: var(--primary); 
            color: white; 
        }

        .logout-btn { 
            margin-top: auto; 
            background: var(--danger); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .logout-btn:hover { opacity: 0.9; }

        /* Main Content Area */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
        }

        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Video Grid Layout */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
        }

        .cam-card { 
            background: #000; 
            border-radius: 15px; 
            aspect-ratio: 16/9; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .video-player { width: 100%; height: 100%; object-fit: cover; }

        .cam-label { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(231, 76, 60, 0.85); 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 13px; 
            z-index: 5;
            backdrop-filter: blur(4px);
        }

        /* Calendar & Forms */
        .card {
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .form-group {
            display: flex; 
            gap: 15px; 
            margin-top: 15px; 
            flex-wrap: wrap;
        }

        input { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            outline-color: var(--primary);
        }

        button#btnSubmit { 
            padding: 10px 25px; 
            background: var(--success); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: 600;
        }

        button#btnSubmit:disabled { background: #ccc; cursor: not-allowed; }

        .calendar-container { 
            height: 700px; 
            border-radius: 15px; 
            overflow: hidden;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('live-page')" id="nav-live" class="active">
            <i class="fas fa-video"></i> ระบบกล้องสด
        </a>
        <a onclick="showPage('calendar-page')" id="nav-cal">
            <i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม
        </a>
        <a href="map.html">
            <i class="fas fa-map-marked-alt"></i> แผนที่
        </a>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
        </button>
    </div>

    <div class="main-content">
        
        <div id="live-page" class="page-content active">
            <h1 style="margin-bottom: 10px;">ระบบสตรีมสด</h1>
            <p style="color: #666; margin-bottom: 30px;">แสดงผลกล้องวงจรปิดแบบ Real-time 4 ตัว</p>
            
            <div class="video-grid">
                <div class="cam-card">
                    <div class="cam-label"><i class="fas fa-circle"></i> LIVE - กล้อง 1</div>
                    <video id="v1" class="video-player" autoplay muted playsinline></video>
                </div>
                <div class="cam-card">
                    <div class="cam-label"><i class="fas fa-circle"></i> LIVE - กล้อง 2</div>
                    <video id="v2" class="video-player" autoplay muted playsinline></video>
                </div>
                <div class="cam-card">
                    <div class="cam-label"><i class="fas fa-circle"></i> LIVE - กล้อง 3</div>
                    <video id="v3" class="video-player" autoplay muted playsinline></video>
                </div>
                <div class="cam-card">
                    <div class="cam-label"><i class="fas fa-circle"></i> LIVE - กล้อง 4</div>
                    <video id="v4" class="video-player" autoplay muted playsinline></video>
                </div>
            </div>
        </div>

        <div id="calendar-page" class="page-content">
            <h1 style="margin-bottom: 25px;">จัดการการจองและกิจกรรม</h1>
            
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> เพิ่มรายการจองใหม่</h3>
                <div class="form-group">
                    <input type="text" id="eventTitle" placeholder="หัวข้อการจอง..." style="flex: 2;">
                    <input type="datetime-local" id="eventStart">
                    <input type="datetime-local" id="eventEnd">
                    <button onclick="addEvent()" id="btnSubmit">บันทึกข้อมูล</button>
                </div>
                <p id="statusMsg" style="margin-top:15px; font-size: 14px;"></p>
            </div>

            <div class="calendar-container">
                <iframe id="calFrame" 
                        src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok" 
                        style="border:0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

    </div>

    <script>
        // ฟังก์ชันสลับหน้าจอ
        function showPage(pageId) {
            // ซ่อนหน้าทั้งหมด
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            // แสดงหน้าเป้าหมาย
            document.getElementById(pageId).classList.add('active');
            
            // อัปเดตเมนู Sidebar
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            if(pageId === 'live-page') document.getElementById('nav-live').classList.add('active');
            if(pageId === 'calendar-page') document.getElementById('nav-cal').classList.add('active');
        }

        // ฟังก์ชันจัดการกิจกรรม Google Calendar
        async function addEvent() {
            const url = "ใส่_URL_ที่ได้จาก_DEPLOY_ตรงนี้"; 
            const title = document.getElementById('eventTitle').value;
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const msg = document.getElementById('statusMsg');
            const btn = document.getElementById('btnSubmit');

            if(!title || !start || !end) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            msg.innerText = "⏳ กำลังบันทึกข้อมูล...";
            msg.style.color = "#3498db";
            btn.disabled = true;

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, start, end })
                });

                msg.innerText = "✅ บันทึกสำเร็จ! กำลังอัปเดตปฏิทิน...";
                msg.style.color = "#27ae60";
                
                setTimeout(() => {
                    document.getElementById('calFrame').src += ""; // Refresh Iframe
                    document.getElementById('eventTitle').value = "";
                    msg.innerText = "";
                    btn.disabled = false;
                }, 2500);

            } catch (e) {
                msg.innerText = "❌ เกิดข้อผิดพลาด: " + e.message;
                msg.style.color = "#e74c3c";
                btn.disabled = false;
            }
        }

        // ฟังก์ชันโหลดวิดีโอ HLS
        function initPlayer(id, src) {
            const video = document.getElementById(id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
            }
        }

        // เริ่มโหลดกล้อง (ตัวอย่างใช้ URL เดิมของคุณ)
        window.onload = () => {
            initPlayer('v1', 'https://streaming.udoncity.go.th:1935/live/cctv_121.stream/chunklist.m3u8');
            // คุณสามารถเพิ่ม initPlayer สำหรับ v2, v3, v4 ได้ที่นี่
        };

        function logout() {
            if(confirm("ยืนยันการออกจากระบบ?")) {
                window.location.href = "login.html"; // หรือหน้าที่ต้องการให้ไป
            }
        }
    </script>
</body>
</html>
