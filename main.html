<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full System with Secure Popup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body
        <script type="module" src="script.js"></script>
        { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Modal UI */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; text-align: center; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 14px; }
        .login-input:focus { border-color: var(--primary); }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .forgot-link { font-size: 12px; color: var(--primary); cursor: pointer; display: block; margin-top: 15px; font-weight: bold; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-box i { font-size: 2.2rem; margin-bottom: 15px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #000; margin-bottom: 8px; }
        .stat-label { font-size: 13px; color: #888; }
        .icon-time { color: #2ecc71; }
        .icon-folder { color: #3498db; }
        .icon-shield { color: #2ecc71; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .admin-settings-bar { display: flex; align-items: center; gap: 20px; }
        .setting-item { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 6px 15px; border-radius: 10px; border: 1px solid #eee; }
        .mini-pass-input { display: flex; gap: 5px; align-items: center; border-left: 2px solid #ddd; padding-left: 15px; }
        .mini-pass-input input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; width: 140px; }

        /* Admin Form Grid */
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        .btn-action { padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; height: 41px; color: white; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-img-container { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 20px; text-align: center; flex-grow: 1; }
        .download-info h4 { margin: 0 0 15px 0; font-size: 16px; font-weight: 600; color: #2c3e50; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }
        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 12px; background: #fdfdfd; border-top: 1px solid #f0f0f0; }
        .admin-btn-text { border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3 style="margin-top:0; color:var(--bg-dark);"><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username" onkeyup="if(event.key==='Enter') performLogin()">
            <input type="password" id="loginPass" class="login-input" placeholder="Password" onkeyup="if(event.key==='Enter') performLogin()">
            <button onclick="performLogin()" class="btn-login">เข้าสู่ระบบ</button>
            <span class="forgot-link" onclick="handleForgotPassword()">ลืมรหัสผ่าน?</span>
            <button onclick="closeLoginModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer; font-size:12px;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fas fa-clock icon-time"></i>
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div class="stat-label">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-folder-open icon-folder"></i>
                        <div class="stat-value" id="dash-count">0 รายการ</div>
                        <div class="stat-label">ไฟล์ในระบบ</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-shield-alt icon-shield" id="status-icon"></i>
                        <div class="stat-value" id="dash-status">Guest Mode</div>
                        <div class="stat-label">โหมดการใช้งาน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0;"><i class="fas fa-tools"></i> Admin Control Panel</h3>
                        <div class="admin-settings-bar">
                            <div class="setting-item">
                                <span style="font-size:12px; font-weight:bold; color:#d35400;">Lock all downloads</span>
                                <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                            </div>
                            <div class="mini-pass-input">
                                <input type="text" id="newDownloadPass" placeholder="รหัสผ่านดาวน์โหลดใหม่">
                                <button onclick="changeDownloadPass()" style="background:var(--primary); color:white; border:none; padding:7px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:bold;">เปลี่ยนรหัส</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group">
                            <label>ชื่อไฟล์</label>
                            <input type="text" id="itemName" placeholder="ระบุชื่อไฟล์...">
                        </div>
                        <div class="input-group">
                            <label>ลิงก์รูปภาพ</label>
                            <input type="text" id="itemImg" placeholder="URL รูปภาพ...">
                        </div>
                        <div class="input-group">
                            <label>ลิงก์ดาวน์โหลด</label>
                            <input type="text" id="itemLink" placeholder="URL ดาวน์โหลด...">
                        </div>
                        <div class="btn-group">
                            <button onclick="saveItem()" id="btn-save" class="btn-action" style="background:var(--success);">บันทึก</button>
                            <button onclick="resetForm()" id="btn-cancel" class="btn-action" style="background:var(--secondary);"><i class="fas fa-times"></i> ยกเลิก</button>
                        </div>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

    <script>
        const ADMIN_CONF = { user: "admin", pass: "admin2", keyword: "password" };
        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" };
        
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;

        // --- AUTH LOGIC (Updated) ---
        function toggleAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("ต้องการออกจากระบบ Admin ใช่หรือไม่?")) {
                    sessionStorage.removeItem('isAdmin');
                    location.reload();
                }
            } else {
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('loginUser').focus();
            }
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function performLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if (u === ADMIN_CONF.user && p === ADMIN_CONF.pass) {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!");
            }
        }

        function handleForgotPassword() {
            const key = prompt("ใส่ Keyword เพื่อดูรหัสผ่าน:");
            if (key === ADMIN_CONF.keyword) {
                alert(`[Admin Info]\nUser: ${ADMIN_CONF.user}\nPass: ${ADMIN_CONF.pass}`);
            } else if (key !== null) {
                alert("Keyword ไม่ถูกต้อง!");
            }
        }

        // --- Core System ---
        function updateDashboard() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('dash-time').innerText = timeStr;
            document.getElementById('dash-count').innerText = items.length + " รายการ";
            
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('dash-status').innerText = "Admin Mode";
                document.getElementById('status-icon').style.color = "#2ecc71";
            } else {
                document.getElementById('dash-status').innerText = "Guest Mode";
                document.getElementById('status-icon').style.color = "#95a5a6";
            }
        }

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function openImage(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function toggleGlobalLock() {
            isGlobalLocked = document.getElementById('globalLock').checked;
            localStorage.setItem('global_lock', isGlobalLocked);
            renderItems();
        }

        function toggleItemLock(index) {
            items[index].locked = !items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(items));
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            if(isAdmin) document.getElementById('globalLock').checked = isGlobalLocked;

            items.forEach((item, index) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const adminUI = isAdmin ? `
                    <div class="admin-controls">
                        <div style="display:flex; align-items:center; gap:5px;">
                            <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})"><span class="slider"></span></label>
                            <span style="font-size:11px; font-weight:bold; color:#666;">Lock</span>
                        </div>
                        <button onclick="editItem(${index})" class="admin-btn-text" style="color:var(--primary);"><i class="fas fa-edit"></i> Edit</button>
                        <button onclick="deleteItem(${index})" class="admin-btn-text" style="color:var(--danger);"><i class="fas fa-trash"></i> Delete</button>
                    </div>` : '';

                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img || ''}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x180?text=Cougar2'}">
                        </div>
                        <div class="download-info">
                            <h4>${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> 
                                ${effectivelyLocked ? 'Password Required' : 'Download Now'}
                            </button>
                        </div>
                        ${adminUI}
                    </div>`;
            });
            updateDashboard();
        }

        function saveItem() {
            const index = parseInt(document.getElementById('editIndex').value);
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;

            if (name && link) {
                const newItem = { name, img, link, locked: (index > -1 ? items[index].locked : false) };
                if (index > -1) { items[index] = newItem; } 
                else { items.push(newItem); }
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                resetForm();
                renderItems();
            } else { alert("กรุณากรอกชื่อและลิงก์โหลด"); }
        }

        function editItem(index) {
            const item = items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-save').innerText = "Update";
            document.getElementById('btn-save').style.background = "var(--primary)";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = '';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('btn-save').innerText = "บันทึก";
            document.getElementById('btn-save').style.background = "var(--success)";
        }

        async function changeDownloadPass() {
            const p = document.getElementById('newDownloadPass').value;
            if (p) {
                localStorage.setItem('custom_download_hash', await hashText(p));
                alert("เปลี่ยนรหัสผ่านสำเร็จ!");
                document.getElementById('newDownloadPass').value = '';
            }
        }

        async function secureDownload(link, itemLocked) {
            if (isGlobalLocked || itemLocked) {
                const pass = prompt("กรุณาใส่รหัสผ่าน:");
                if (!pass) return;
                const hashedInput = await hashText(pass);
                const currentHash = localStorage.getItem('custom_download_hash') || HASH_CONFIG.dl;
                if (hashedInput === currentHash) { window.open(link, '_blank'); } 
                else { alert("รหัสไม่ถูกต้อง"); }
            } else { window.open(link, '_blank'); }
        }

        function deleteItem(index) { if(confirm("ต้องการลบ?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
            renderItems();
            updateDashboard();
            setInterval(updateDashboard, 1000);
        };
    </script>
</body>
</html>
