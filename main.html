<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Obs Docks UI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --bg-dark: #1a1a1a;
            --bg-body: #f0f2f5;
            --sidebar-width: 260px;
            --top-height: 60px;
            --download-gradient: linear-gradient(135deg, #02aab0 0%, #00cdac 100%);
            --download-hover: linear-gradient(135deg, #00cdac 0%, #02aab0 100%);
            --download-shadow: rgba(0, 205, 172, 0.3);
        }

        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; letter-spacing: 2px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        /* Main Area */
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* ปรับปรุง Top Nav ให้รองรับข้อความด้านซ้าย */
        .top-nav { 
            height: var(--top-height); 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; /* แยกซ้าย-ขวา */
            padding: 0 30px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            z-index: 5;
        }
        .nav-title { font-size: 1.25rem; font-weight: bold; color: #333; margin: 0; }

        .btn-auth { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: var(--danger); color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        #live-page, #map-page, #calendar-page { height: calc(100vh - var(--top-height) - 60px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .frame-container { width: 100%; height: 100%; background: white; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Cards & Download Button */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .download-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .download-card img { width: 100%; height: 180px; object-fit: cover; cursor: zoom-in; }
        .download-info { padding: 25px; text-align: center; }
        
        .btn-download { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--download-gradient); color: white; text-decoration: none; padding: 14px 20px; border-radius: 12px; font-weight: 600; width: 100%; box-sizing: border-box; transition: all 0.3s ease; box-shadow: 0 4px 15px var(--download-shadow); border: none; cursor: pointer; }
        .btn-download:hover { background: var(--download-hover); box-shadow: 0 6px 20px rgba(0, 205, 172, 0.5); transform: scale(1.02); color: white; }
        
        #admin-panel { display: none; background: #fff; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-form-container { display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .input-group label { font-size: 13px; font-weight: bold; color: #444; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .admin-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .admin-actions { display: flex; justify-content: center; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .admin-actions span { cursor: pointer; font-size: 13px; font-weight: bold; }

        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        @media (min-width: 769px) { .admin-form-container { flex-direction: row; align-items: flex-end; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 class="nav-title">Obs Docks UI</h2>
            <button id="auth-btn" class="btn-auth btn-login" onclick="toggleAuthModal()">
                <i class="fas fa-user-lock"></i> <span>Login Admin</span>
            </button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-clock" style="color:var(--success); font-size: 2rem;"></i>
                        <h3 id="clock">00:00</h3><p style="color:#666;">เวลาปัจจุบัน</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-folder-open" style="color:var(--primary); font-size: 2rem;"></i>
                        <h3 id="file-count">0 รายการ</h3><p style="color:#666;">ไฟล์ในระบบ</p>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-shield-alt" id="status-icon" style="color:#ccc; font-size: 2rem;"></i>
                        <h3 id="status-text">Guest</h3><p style="color:#666;">โหมดการใช้งาน</p>
                    </div>
                </div>

                <div id="admin-panel">
                    <h3 id="panel-title"><i class="fas fa-plus-circle"></i> จัดการไฟล์ข้อมูล</h3>
                    <div class="admin-form-container">
                        <div class="input-group">
                            <label><i class="fas fa-tag"></i> ชื่อรายการ</label>
                            <input type="text" id="itemName" placeholder="ระบุชื่อ">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-image"></i> ลิงก์รูปภาพ</label>
                            <input type="text" id="itemImg" placeholder="https://...">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-link"></i> ลิงก์ดาวน์โหลด</label>
                            <input type="text" id="itemLink" placeholder="https://...">
                        </div>
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="admin-buttons">
                            <button id="btn-submit-item" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="saveItem()">บันทึก</button>
                            <button id="btn-cancel-edit" style="display:none; background:#888; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer;" onclick="cancelEdit()">ยกเลิก</button>
                        </div>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><div class="frame-container"><iframe src="cctv.html"></iframe></div></div>
            <div id="map-page" class="page-content"><div class="frame-container"><iframe src="map.html"></iframe></div></div>
            <div id="calendar-page" class="page-content"><div class="frame-container"><iframe src="calendar.html"></iframe></div></div>
        </div>
    </div>

    <div id="loginModal" class="modal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div class="modal-content" style="background:white; padding:30px; border-radius:15px; width:320px; position:relative;">
            <span onclick="toggleAuthModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:20px;">&times;</span>
            <h3>Admin Login</h3>
            <input type="text" id="adminID" placeholder="ID" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <input type="password" id="adminPass" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <button style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="handleLogin()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

    <script>
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; }
        function closeLightbox() { document.getElementById('imgLightbox').style.display = 'none'; }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("ออกจากระบบ Admin?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else {
                const modal = document.getElementById('loginModal');
                modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            }
        }

        function handleLogin() {
            if (document.getElementById('adminID').value === "admin" && document.getElementById('adminPass').value === "admin2") {
                sessionStorage.setItem('isAdmin', 'true'); location.reload();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        function formatDriveLink(url) {
            if (!url) return 'https://via.placeholder.com/300x200?text=No+Image';
            if (url.includes('drive.google.com')) {
                let id = "";
                if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
                else if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
                return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
            }
            return url;
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            document.getElementById('file-count').innerText = `${items.length} รายการ`;
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

            items.forEach((item, index) => {
                let adminUI = isAdmin ? `<div class="admin-actions"><span style="color:var(--warning)" onclick="editItem(${index})"><i class="fas fa-edit"></i> แก้ไข</span><span style="color:var(--danger)" onclick="deleteItem(${index})"><i class="fas fa-trash"></i> ลบ</span></div>` : '';
                const imgSrc = formatDriveLink(item.img);
                list.innerHTML += `<div class="download-card"><img src="${imgSrc}" onclick="openLightbox('${imgSrc}')"><div class="download-info"><h3 style="margin:0 0 20px 0; font-size: 1.1rem;">${item.name}</h3><a href="${item.link}" target="_blank" class="btn-download"><i class="fas fa-cloud-download-alt"></i> Download</a>${adminUI}</div></div>`;
            });
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const editIdx = parseInt(document.getElementById('editIndex').value);
            if (name && link) {
                if (editIdx > -1) { items[editIdx] = { name, img, link }; } 
                else { items.push({ name, img, link }); }
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                cancelEdit(); renderItems();
            } else { alert("กรุณากรอกข้อมูลให้ครบ"); }
        }

        function editItem(index) {
            const item = items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('panel-title').innerHTML = '<i class="fas fa-edit"></i> กำลังแก้ไขข้อมูล';
            document.getElementById('btn-submit-item').innerText = "อัปเดต";
            document.getElementById('btn-cancel-edit').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('itemName').value = ''; document.getElementById('itemImg').value = ''; document.getElementById('itemLink').value = '';
            document.getElementById('editIndex').value = '-1'; document.getElementById('panel-title').innerHTML = '<i class="fas fa-plus-circle"></i> เพิ่มไฟล์ใหม่';
            document.getElementById('btn-submit-item').innerText = "บันทึก"; document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function deleteItem(index) { if(confirm("ยืนยันการลบ?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('status-text').innerText = "Admin Mode";
                document.getElementById('status-icon').style.color = "var(--success)";
                const btn = document.getElementById('auth-btn');
                btn.className = "btn-auth btn-logout";
                btn.innerHTML = '<i class="fas fa-sign-out-alt"></i> <span>Logout Admin</span>';
            }
            renderItems();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}); }, 1000);
        };
    </script>
</body>
</html>
