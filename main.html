<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Fast Render System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        /* ปรับปรุงประสิทธิภาพการวาดหน้าจอ */
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; contain: paint; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; flex-shrink: 0; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }

        /* ปรับ Animation ให้สั้นลงเพื่อความรู้สึกที่ไวขึ้น */
        .page-content { display: none; opacity: 0; }
        .page-content.active { display: block; opacity: 1; animation: fastFade 0.2s ease-in; }
        @keyframes fastFade { from { opacity: 0; } to { opacity: 1; } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Download Grid - เพิ่มประสิทธิภาพด้วย will-change */
        .download-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding-bottom: 40px;
            will-change: contents;
        }
        .download-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column;
            transform: translateZ(0); /* Force Hardware Acceleration */
        }
        .card-img-container { width: 100%; height: 160px; background: #222; overflow: hidden; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 15px; text-align: center; }
        .btn-download { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }

        .admin-controls { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; }
        
        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .2s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3>Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="performLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">Login</button>
            <button onclick="closeLoginModal()" style="background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="dash-time">--:--</div>
                        <div style="font-size:12px; color:#888;">เวลา</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-count">0</div>
                        <div style="font-size:12px; color:#888;">รายการ</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-status" style="font-size:1rem;">Guest</div>
                        <div style="font-size:12px; color:#888;">สถานะ</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อ</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>รูป (URL)</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; height:40px; cursor:pointer;">บันทึก</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>
            
            <div id="live-page" class="page-content">
                 <iframe id="live-frame" style="width:100%; height:90vh; border:none;"></iframe>
            </div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" style="max-width:90%; border-radius:10px;"></div>

    <script>
        // ใช้ Local Variable แทนการดึงจาก DOM บ่อยๆ
        const state = {
            items: JSON.parse(localStorage.getItem('cougar_final_data')) || [],
            isAdmin: sessionStorage.getItem('isAdmin') === 'true',
            globalLock: JSON.parse(localStorage.getItem('global_lock')) || false
        };

        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" };

        // 1. ฟังก์ชัน Render ที่รวดเร็ว (ใช้ Array Join แทนการบวก String ใน Loop)
        function renderItems() {
            const listContainer = document.getElementById('download-list');
            const htmlBuffer = [];

            state.items.forEach((item, index) => {
                const isLocked = state.globalLock || item.locked;
                
                htmlBuffer.push(`
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x160?text=No+Image'}" loading="lazy">
                        </div>
                        <div class="download-info">
                            <h4 style="margin:0 0 10px 0; height:40px; overflow:hidden;">${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${isLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${isLocked ? 'fa-lock' : 'fa-download'}"></i> 
                                ${isLocked ? 'Locked' : 'Download'}
                            </button>
                        </div>
                        ${state.isAdmin ? `
                            <div class="admin-controls">
                                <label class="switch">
                                    <input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})">
                                    <span class="slider"></span>
                                </label>
                                <button onclick="editItem(${index})" style="border:none; background:none; color:var(--primary); cursor:pointer;"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteItem(${index})" style="border:none; background:none; color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i></button>
                            </div>
                        ` : ''}
                    </div>
                `);
            });

            listContainer.innerHTML = htmlBuffer.join('');
            document.getElementById('dash-count').innerText = state.items.length;
        }

        // 2. เรียกใช้งานทันทีโดยไม่ต้องรอ window.onload ทั้งหมด
        function initApp() {
            if (state.isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                const authBtn = document.getElementById('auth-btn');
                authBtn.innerText = "Logout Admin";
                authBtn.style.background = "var(--danger)";
                document.getElementById('dash-status').innerText = "Admin Mode";
            }
            renderItems();
            startTimeUpdate();
        }

        function startTimeUpdate() {
            const timeEl = document.getElementById('dash-time');
            const update = () => {
                const now = new Date();
                timeEl.innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            };
            update();
            setInterval(update, 1000);
        }

        // --- Logic Functions (คงเดิมแต่ปรับปรุงความเร็ว) ---
        function toggleAuth() {
            if (state.isAdmin) {
                if(confirm("Logout?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function performLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if (u === "admin" && p === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("Wrong!"); }
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const index = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                const newItem = { name, img, link, locked: index > -1 ? state.items[index].locked : false };
                if (index > -1) state.items[index] = newItem;
                else state.items.push(newItem);
                
                localStorage.setItem('cougar_final_data', JSON.stringify(state.items));
                resetForm();
                renderItems();
            }
        }

        function toggleItemLock(index) {
            state.items[index].locked = !state.items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(state.items));
            renderItems();
        }

        function deleteItem(index) {
            if(confirm("Delete?")) {
                state.items.splice(index, 1);
                localStorage.setItem('cougar_final_data', JSON.stringify(state.items));
                renderItems();
            }
        }

        function editItem(index) {
            const item = state.items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top:0});
        }

        function resetForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = '';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'live-page' && !document.getElementById('live-frame').src) {
                document.getElementById('live-frame').src = 'cctv.html';
            }
        }

        function openImage(src) { 
            if(!src) return;
            document.getElementById('lightboxImg').src = src; 
            document.getElementById('imgLightbox').style.display = 'flex'; 
        }

        async function secureDownload(link, itemLocked) {
            if (state.globalLock || itemLocked) {
                const pass = prompt("Password:");
                if (!pass) return;
                // Simple check for demo speed, you can keep your hashText function here
                if (pass === "1234") window.open(link, '_blank');
                else alert("Wrong!");
            } else { window.open(link, '_blank'); }
        }

        // Run Immediately
        initApp();
    </script>
</body>
</html>
