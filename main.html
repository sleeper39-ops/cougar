<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Obs Docks UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #121212; --bg-body: #f8f9fa;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Prompt', 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 0; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 30px; font-size: 1.5rem; letter-spacing: 1px; }
        .sidebar a { color: #888; text-decoration: none; padding: 12px 25px; margin: 4px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active { background: #1e3a5f; color: white; }
        .sidebar a.active { background: var(--primary); }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Stats Dashboard (3 Cards) */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #eee; }
        .stat-card i { font-size: 24px; color: var(--success); margin-bottom: 10px; display: block; }
        .stat-card.blue i { color: var(--primary); }
        .stat-card.green i { color: var(--success); }
        .stat-card h3 { margin: 5px 0; font-size: 20px; color: #333; }
        .stat-card p { margin: 0; font-size: 12px; color: #888; font-weight: bold; }

        /* Admin Panel - ตามรูปเป๊ะ */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 12px; border: 2px dashed #b8daff; margin-bottom: 30px; position: relative; }
        .admin-header-label { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr auto auto; gap: 12px; align-items: center; }
        .form-row input { padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; width: 100%; box-sizing: border-box; }
        .form-row input:focus { border-color: var(--primary); }
        
        .btn-save { background: var(--warning); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .btn-cancel { background: var(--secondary); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* File Card Grid */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .file-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; width: 100%; max-width: 320px; }
        .file-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid #eee; }
        .file-content { padding: 20px; text-align: center; }
        .file-content h4 { margin: 0 0 15px 0; font-size: 15px; color: #333; line-height: 1.5; height: 3em; overflow: hidden; }
        .btn-main-dl { background: #222; color: white; text-decoration: none; padding: 10px; display: block; border-radius: 6px; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        
        .admin-edit-btns { display: flex; justify-content: center; gap: 15px; font-size: 12px; color: var(--warning); font-weight: bold; cursor: pointer; }

        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <button id="auth-btn" style="background:var(--danger); color:white; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px;" onclick="toggleAuthModal()">
                <i class="fas fa-sign-out-alt"></i> Logout Admin
            </button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <h2 style="margin-top:0; font-size: 22px;">Obs Docks UI</h2>

                <div class="stats-container">
                    <div class="stat-card green">
                        <i class="far fa-clock"></i>
                        <h3 id="clock">13:22</h3>
                        <p>เวลาปัจจุบัน</p>
                    </div>
                    <div class="stat-card blue">
                        <i class="fas fa-folder"></i>
                        <h3 id="file-count">0 รายการ</h3>
                        <p>ไฟล์ในระบบ</p>
                    </div>
                    <div class="stat-card green">
                        <i class="fas fa-shield-alt"></i>
                        <h3>Admin Mode</h3>
                        <p>โหมดการใช้งาน</p>
                    </div>
                </div>
                
                <div id="admin-panel">
                    <div class="admin-header-label"><i class="fas fa-edit"></i> คำสั่งแก้ไขข้อมูล</div>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="text" id="itemName" placeholder="ชื่อไฟล์/คำอธิบาย">
                        <input type="text" id="itemImg" placeholder="ลิงก์รูปภาพ">
                        <input type="text" id="itemLink" placeholder="ลิงก์ดาวน์โหลด">
                        <button onclick="saveItem()" id="btn-save" class="btn-save">บันทึกการแก้ไข</button>
                        <button onclick="resetForm()" class="btn-cancel">ยกเลิก</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><h3>ระบบกล้องสด</h3></div>
            <div id="map-page" class="page-content"><h3>แผนที่ระบบ</h3></div>
            <div id="calendar-page" class="page-content"><h3>ปฏิทินกิจกรรม</h3></div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            document.getElementById('file-count').innerText = `${items.length} รายการ`;
            
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isAdmin ? 'Logout Admin' : 'Admin Login';

            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="file-card">
                        <img src="${item.img || 'https://via.placeholder.com/300x160?text=Cougar2'}">
                        <div class="file-content">
                            <h4>${item.name}</h4>
                            <a href="${item.link}" target="_blank" class="btn-main-dl">Link : Download</a>
                            ${isAdmin ? `
                                <div class="admin-edit-btns">
                                    <span onclick="editItem(${index})"><i class="fas fa-edit"></i> แก้ไข</span>
                                    <span style="color:var(--danger);" onclick="deleteItem(${index})"><i class="fas fa-trash"></i> ลบ</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        function saveItem() {
            const index = parseInt(document.getElementById('editIndex').value);
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;

            if (name && link) {
                const newItem = { name, img, link };
                if (index > -1) { items[index] = newItem; } else { items.push(newItem); }
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                resetForm();
                renderItems();
            }
        }

        function editItem(index) {
            const item = items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-save').innerText = "บันทึกการแก้ไข";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemImg').value = '';
            document.getElementById('itemLink').value = '';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('btn-save').innerText = "บันทึกข้อมูล";
        }

        function deleteItem(index) {
            if(confirm("ลบไฟล์นี้?")) {
                items.splice(index, 1);
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                renderItems();
            }
        }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                sessionStorage.removeItem('isAdmin');
            } else {
                const pass = prompt("รหัสผ่าน:");
                if(pass === "admin2") sessionStorage.setItem('isAdmin', 'true');
            }
            location.reload();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        window.onload = renderItems;
    </script>
</body>
</html>
