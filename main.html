<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Ultra Fast System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        /* Performance Optimization */
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; contain: paint; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; flex-shrink: 0; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; contain: content; }

        /* Fast Animation */
        .page-content { display: none; }
        .page-content.active { display: block; animation: fastFade 0.2s ease-out; }
        @keyframes fastFade { from { opacity: 0; } to { opacity: 1; } }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }

        /* Admin Control */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Card Optimization */
        .download-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding-bottom: 40px;
            will-change: transform; 
        }
        .download-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
            transform: translateZ(0); /* Hardware Acceleration */
        }
        .card-img-container { width: 100%; height: 160px; background: #222; overflow: hidden; cursor: pointer; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 15px; text-align: center; }
        .btn-download { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .2s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3>Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <button onclick="performLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Login</button>
            <button onclick="closeLoginModal()" style="background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> กล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title" style="margin:0; font-size:1.2rem;">Dashboard</h2>
            <button id="auth-btn" onclick="toggleAuth()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="dash-time">--:--</div>
                        <div style="font-size:12px; color:#888;">เวลา</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-count">0</div>
                        <div style="font-size:12px; color:#888;">รายการไฟล์</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-status">Guest</div>
                        <div style="font-size:12px; color:#888;">สถานะ</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อ</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <div class="input-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <span style="font-size:12px;">Lock All:</span>
                            <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                        </div>
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe id="live-frame" style="width:100%; height:85vh; border:none;"></iframe></div>
            <div id="map-page" class="page-content"><iframe id="map-frame" style="width:100%; height:85vh; border:none;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" style="max-width:90%; border-radius:10px;"></div>

    <script>
        // Use a state object for faster access
        const State = {
            items: JSON.parse(localStorage.getItem('cougar_final_data')) || [],
            isAdmin: sessionStorage.getItem('isAdmin') === 'true',
            isGlobalLocked: JSON.parse(localStorage.getItem('global_lock')) || false,
            dlHash: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
        };

        // --- Render Engine (Optimized) ---
        function renderItems() {
            const list = document.getElementById('download-list');
            const isAdmin = State.isAdmin;
            const globalLock = State.isGlobalLocked;
            
            // Generate HTML in one go (Batching)
            const html = State.items.map((item, index) => {
                const locked = globalLock || item.locked;
                return `
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x160?text=No+Image'}" loading="lazy">
                        </div>
                        <div class="download-info">
                            <h4 style="margin:0 0 10px 0; height:40px; overflow:hidden;">${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${locked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${locked ? 'fa-lock' : 'fa-download'}"></i> ${locked ? 'Locked' : 'Download'}
                            </button>
                        </div>
                        ${isAdmin ? `
                            <div style="display:flex; justify-content:center; gap:15px; padding:10px; background:#f9f9f9; border-top:1px solid #eee;">
                                <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})"><span class="slider"></span></label>
                                <i class="fas fa-edit" onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;"></i>
                                <i class="fas fa-trash" onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;"></i>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            list.innerHTML = html;
            document.getElementById('dash-count').innerText = State.items.length;
        }

        // --- Core Functions ---
        function toggleAuth() {
            if (State.isAdmin) {
                if(confirm("Logout Admin?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else { 
                document.getElementById('loginModal').style.display = 'flex'; 
                document.getElementById('loginUser').focus();
            }
        }

        function performLogin() {
            if (document.getElementById('loginUser').value === "admin" && document.getElementById('loginPass').value === "admin2") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("Wrong!"); }
        }

        async function hashText(text) {
            const data = new TextEncoder().encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function secureDownload(link, itemLocked) {
            if (State.isGlobalLocked || itemLocked) {
                const pass = prompt("Password:");
                if (!pass) return;
                const hashed = await hashText(pass);
                const currentHash = localStorage.getItem('custom_download_hash') || State.dlHash;
                if (hashed === currentHash) window.open(link, '_blank');
                else alert("Incorrect!");
            } else { window.open(link, '_blank'); }
        }

        // --- Admin Actions ---
        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const index = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                const item = { name, img, link, locked: index > -1 ? State.items[index].locked : false };
                if (index > -1) State.items[index] = item;
                else State.items.push(item);
                
                localStorage.setItem('cougar_final_data', JSON.stringify(State.items));
                resetForm();
                renderItems();
            }
        }

        function toggleGlobalLock() {
            State.isGlobalLocked = document.getElementById('globalLock').checked;
            localStorage.setItem('global_lock', State.isGlobalLocked);
            renderItems();
        }

        function toggleItemLock(index) {
            State.items[index].locked = !State.items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(State.items));
            renderItems();
        }

        function deleteItem(index) {
            if(confirm("Delete?")) {
                State.items.splice(index, 1);
                localStorage.setItem('cougar_final_data', JSON.stringify(State.items));
                renderItems();
            }
        }

        function editItem(index) {
            const item = State.items[index];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function resetForm() {
            document.querySelectorAll('#admin-panel input:not([type=checkbox])').forEach(i => i.value = '');
            document.getElementById('editIndex').value = '-1';
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
            
            // Lazy load iframes
            const frame = document.getElementById(id.split('-')[0] + '-frame');
            if(frame && !frame.src) frame.src = id.split('-')[0] + '.html';
        }

        function openImage(src) { if(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; } }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

        // --- Init ---
        (function init() {
            if (State.isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
                document.getElementById('dash-status').innerText = "Admin Mode";
                document.getElementById('globalLock').checked = State.isGlobalLocked;
            }
            renderItems();
            
            // Clock update
            const clock = () => {
                const d = new Date();
                document.getElementById('dash-time').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
            };
            clock();
            setInterval(clock, 10000);
        })();
    </script>
</body>
</html>
