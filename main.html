<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }

        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .cam-card { background: #000; border-radius: 15px; aspect-ratio: 16/9; position: relative; overflow: hidden; }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        .cam-label { position: absolute; top: 15px; left: 15px; background: rgba(231, 76, 60, 0.85); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; z-index: 5; }
        
        .logout-btn { margin-top: auto; background: var(--danger); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('live-page')" id="nav-live" class="active"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่</a>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
    </div>

    <div class="main-content">
        <div id="live-page" class="page-content active">
            <h1>ระบบสตรีมสด</h1>
            <div class="video-grid">
                <div class="cam-card"><div class="cam-label">แยกกรมหลวง</div><video id="v1" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกร่วมทวี</div><video id="v2" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกเซ็นทรัล</div><video id="v3" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกสถานีรถไฟ</div><video id="v4" class="video-player" autoplay muted playsinline controls></video></div>
            </div>
        </div>

        <div id="map-page" class="page-content">
            <h1 style="margin-bottom: 15px;">แผนที่ตำแหน่งกล้อง</h1>
            <div style="width: 100%; height: 75vh; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <iframe src="map.html" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>

        <div id="calendar-page" class="page-content">
            <h1>จัดการการจอง</h1>
            </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            if(pageId === 'live-page') document.getElementById('nav-live').classList.add('active');
            if(pageId === 'calendar-page') document.getElementById('nav-cal').classList.add('active');
            if(pageId === 'map-page') document.getElementById('nav-map').classList.add('active');
        }

        function initPlayer(id, src) {
            const video = document.getElementById(id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
            }
        }

        window.onload = () => {
            initPlayer('v1', 'https://streaming.udoncity.go.th:1935/live/cctv_121.stream/chunklist_w2010918290.m3u8');
            initPlayer('v2', 'https://streaming.udoncity.go.th:1935/live/Axis_12_22.stream/chunklist_w236554495.m3u8');
            initPlayer('v3', 'https://streaming.udoncity.go.th:1935/live/Axis_12_38.stream/chunklist_w1610502304.m3u8');
            initPlayer('v4', 'https://streaming.udoncity.go.th:1935/live/Axis_12_33.stream/chunklist_w34733218.m3u8');
        };

        function logout() {
            if(confirm("ยืนยันการออกจากระบบ?")) window.location.href = "login.html";
        }
    </script>
</body>
</html>
