<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar Menu */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; height: 100%; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; position: relative; }
        .admin-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .top-right-settings { display: flex; align-items: center; gap: 12px; background: #f8f9fa; padding: 5px 12px; border-radius: 10px; border: 1px solid #eee; }
        .mini-pass-input { display: flex; gap: 5px; align-items: center; }
        .mini-pass-input input { padding: 5px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; width: 100px; }
        .form-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }

        /* สไตล์สวิตช์สไลด์ */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--warning); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Card System & Image Preview */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        
        .card-img-container { width: 100%; height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; background: #222; transition: 0.3s; }
        .card-img-container:hover img { transform: scale(1.05); }

        .download-info { padding: 20px; text-align: center; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .is-locked { background: var(--warning) !important; color: white; }
        .is-open { background: var(--success); color: white; }

        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 12px; background: #fdfdfd; border-top: 1px solid #f0f0f0; }
        .admin-btn-text { border: none; background: none; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Lightbox ขยายรูป */
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div id="admin-panel">
                    <div class="admin-header">
                        <h3 style="margin:0; font-size: 16px;"><i class="fas fa-edit"></i> Admin Panel</h3>
                        <div class="top-right-settings">
                            <div style="display:flex; align-items:center; gap:6px; border-right: 1px solid #ddd; padding-right: 10px;">
                                <span style="font-size:11px; font-weight:bold; color:#e65100;">ล็อกทั้งหมด</span>
                                <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                            </div>
                            <div class="mini-pass-input">
                                <input type="text" id="newDownloadPass" placeholder="รหัสใหม่">
                                <button onclick="changeDownloadPass()" style="background:var(--primary); color:white; border:none; padding:5px 8px; border-radius:5px; font-size:11px; cursor:pointer;">ตั้งค่า</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <button onclick="saveItem()" id="btn-submit-item" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; height:36px;">เพิ่มไฟล์</button>
                    </div>
                </div>
                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html" style="width:100%; height:100%; border:none; border-radius:15px;"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html" style="width:100%; height:100%; border:none; border-radius:15px;"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html" style="width:100%; height:100%; border:none; border-radius:15px;"></iframe></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightboxImg" src="">
    </div>

    <div id="loginModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:300px; text-align:center;">
            <h3>Admin Login</h3>
            <input type="password" id="adminPass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="handleLogin()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">ตกลง</button>
        </div>
    </div>

    <script>
        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" };
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function openImage(src) {
            const lb = document.getElementById('imgLightbox');
            document.getElementById('lightboxImg').src = src;
            lb.style.display = 'flex';
        }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                sessionStorage.removeItem('isAdmin'); location.reload();
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function handleLogin() {
            if (document.getElementById('adminPass').value === 'admin2') {
                sessionStorage.setItem('isAdmin', 'true'); location.reload();
            } else { alert("รหัสผ่านผิด"); }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function toggleGlobalLock() {
            isGlobalLocked = document.getElementById('globalLock').checked;
            localStorage.setItem('global_lock', isGlobalLocked);
            renderItems();
        }

        function toggleItemLock(index) {
            items[index].locked = !items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(items));
            renderItems();
        }

        async function secureDownload(link, itemLocked) {
            if (isGlobalLocked || itemLocked) {
                const pass = prompt("ใส่รหัสผ่านเพื่อดาวน์โหลด:");
                if (!pass) return;
                const hashedInput = await hashText(pass);
                const currentHash = localStorage.getItem('custom_download_hash') || HASH_CONFIG.dl;
                if (hashedInput === currentHash) { window.open(link, '_blank'); } 
                else { alert("รหัสผิด!"); }
            } else { window.open(link, '_blank'); }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            if(isAdmin) document.getElementById('globalLock').checked = isGlobalLocked;

            items.forEach((item, index) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const adminUI = isAdmin ? `
                    <div class="admin-controls">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})"><span class="slider"></span></label>
                            <span style="font-size:11px; font-weight:bold; color:#666;">ล็อก</span>
                        </div>
                        <button onclick="editItem(${index})" class="admin-btn-text" style="color:var(--primary);"><i class="fas fa-edit"></i> แก้ไข</button>
                        <button onclick="deleteItem(${index})" class="admin-btn-text" style="color:var(--danger);"><i class="fas fa-trash"></i> ลบ</button>
                    </div>` : '';

                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img || 'https://via.placeholder.com/300x180'}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x180'}">
                        </div>
                        <div class="download-info">
                            <h4 style="margin:0 0 10px 0; font-size:14px;">${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> 
                                ${effectivelyLocked ? 'รหัสผ่าน' : 'Download'}
                            </button>
                        </div>
                        ${adminUI}
                    </div>`;
            });
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            if (name && link) {
                items.push({ name, img, link, locked: false });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                location.reload();
            }
        }
        function deleteItem(index) { if(confirm("ลบไฟล์?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }
        async function changeDownloadPass() {
            const p = document.getElementById('newDownloadPass').value;
            if (p) {
                localStorage.setItem('custom_download_hash', await hashText(p));
                alert("เปลี่ยนรหัสแล้ว");
                document.getElementById('newDownloadPass').value = '';
            }
        }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
            renderItems();
        };
    </script>
</body>
</html>
