<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart Lock System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; }

        /* Admin Panel */
        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 25px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admin-row { display: grid; grid-template-columns: 1fr 1fr 1.5fr auto; gap: 10px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Card System */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        .card-img { height: 150px; background: #222; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .btn-dl { width: 100%; padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .lock-status { display: flex; align-items: center; gap: 5px; color: #666; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a><i class="fas fa-video"></i> กล้องสด</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 style="margin:0; font-size:1.1rem;">Secure Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="admin-panel">
                <div class="admin-header">
                    <h3 style="margin:0;"><i class="fas fa-tools"></i> แผงควบคุมแอดมิน</h3>
                    <div style="display:flex; align-items:center; gap:10px; background:#f8d7da; padding:8px 15px; border-radius:10px; border:1px solid #f5c6cb;">
                        <span style="font-size:12px; font-weight:bold; color:#721c24;"><i class="fas fa-globe"></i> Global Lock (ล็อคทั้งหมด)</span>
                        <label class="switch">
                            <input type="checkbox" id="globalLockToggle" onchange="updateGlobalLock()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="admin-row">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                    <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                    <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink"></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                        <button onclick="resetForm()" style="background:var(--secondary); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">ยกเลิก</button>
                    </div>
                </div>
            </div>

            <div id="download-list" class="download-grid"></div>
        </div>
    </div>

    <div id="loginModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:300px;">
            <h3 style="text-align:center;">Admin Login</h3>
            <input type="text" id="auth_u" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
            <input type="password" id="auth_p" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
            <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">เข้าสู่ระบบ</button>
            <p onclick="document.getElementById('loginModal').style.display='none'" style="text-align:center; font-size:12px; color:#888; margin-top:10px; cursor:pointer;">ยกเลิก</p>
        </div>
    </div>

    <script>
        const CONFIG = { u: "admin", p: "admin2", dlPass: "1234" };
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = localStorage.getItem('global_lock') === 'true';

        window.onload = () => {
            document.getElementById('globalLockToggle').checked = isGlobalLocked;
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
            renderItems();
        };

        function handleLogin() {
            if (document.getElementById('auth_u').value === CONFIG.u && document.getElementById('auth_p').value === CONFIG.p) {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("ID หรือ Password ผิด!"); }
        }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                sessionStorage.removeItem('isAdmin'); location.reload();
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function updateGlobalLock() {
            isGlobalLocked = document.getElementById('globalLockToggle').checked;
            localStorage.setItem('global_lock', isGlobalLocked);
            renderItems();
        }

        // ฟังก์ชันสลับการล็อครายไฟล์จากตัว Card
        function toggleItemLock(index) {
            items[index].locked = !items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(items));
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

            items.forEach((item, index) => {
                const mustLock = isGlobalLocked || item.locked;
                
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img"><img src="${item.img || 'https://via.placeholder.com/300x150'}"></div>
                        <div class="card-info">
                            <h4 style="margin:0 0 10px 0;">${item.name}</h4>
                            <button onclick="doDownload('${item.link}', ${mustLock})" 
                                    class="btn-dl" 
                                    style="background:${mustLock ? 'var(--danger)' : 'var(--success)'}">
                                <i class="fas ${mustLock ? 'fa-lock' : 'fa-download'}"></i> 
                                ${mustLock ? 'ใส่รหัสเพื่อโหลด' : 'Download'}
                            </button>
                            
                            ${isAdmin ? `
                                <div class="admin-controls">
                                    <div class="lock-status">
                                        <i class="fas fa-lock"></i>
                                        <label class="switch">
                                            <input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})">
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                    <span onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;"><i class="fas fa-edit"></i> แก้ไข</span>
                                    <span onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i> ลบ</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        function doDownload(link, isLocked) {
            if (isLocked) {
                const pass = prompt("กรุณาใส่รหัสผ่านเพื่อดาวน์โหลด (1234):");
                if (pass === CONFIG.dlPass) window.open(link, '_blank');
                else if (pass !== null) alert("รหัสผ่านไม่ถูกต้อง!");
            } else {
                window.open(link, '_blank');
            }
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const idx = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                if (idx > -1) items[idx] = { ...items[idx], name, img, link };
                else items.push({ name, img, link, locked: false });
                
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                resetForm(); renderItems();
            } else { alert("กรุณากรอกข้อมูลให้ครบ"); }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = "";
            document.getElementById('itemImg').value = "";
            document.getElementById('itemLink').value = "";
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        function deleteItem(i) { if(confirm("ลบไฟล์นี้?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }
    </script>
</body>
</html>
