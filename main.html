<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Widgets */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-card i { font-size: 28px; margin-bottom: 10px; }
        .icon-time { color: var(--success); } .icon-file { color: var(--primary); } .icon-mode { color: var(--success); }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        /* Login UI */
        .auth-overlay { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .auth-card { background: #222; padding: 35px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #444; color: white; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; box-sizing: border-box; }
        .keyword-box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        #id-pass-fields { display: none; animation: fadeIn 0.5s ease; }

        /* Download Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img { height: 160px; background: #222; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 15px; text-align: center; }
        .btn-download { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .is-locked { background: var(--warning); } .is-open { background: var(--success); }

        /* Final Success Popup */
        .success-popup { display: none; position: fixed; z-index: 11000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .success-card { background: #111; padding: 40px; border-radius: 25px; text-align: center; border: 2px solid var(--success); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="stats-container">
                    <div class="stat-card"><i class="far fa-clock icon-time"></i><h3 id="widget-time">00:00</h3><p>เวลาปัจจุบัน</p></div>
                    <div class="stat-card"><i class="fas fa-folder icon-file"></i><h3 id="widget-count">0 รายการ</h3><p>ไฟล์ในระบบ</p></div>
                    <div class="stat-card"><i class="fas fa-shield-alt icon-mode"></i><h3 id="widget-mode">User Mode</h3><p>โหมดการใช้งาน</p></div>
                </div>

                <div id="admin-panel">
                    <h3 style="margin-top:0;"><i class="fas fa-tools"></i> Admin Control</h3>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                            <button onclick="resetForm()" style="background:var(--secondary); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">ยกเลิก</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content">
                <div style="background:white; padding:50px; border-radius:20px; text-align:center;">
                    <i class="fas fa-video" style="font-size:50px; color:var(--primary);"></i>
                    <h3>ระบบกล้องสด (CCTV System)</h3>
                    <p>ส่วนนี้สำหรับเชื่อมต่อกับระบบ Streaming</p>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="auth-overlay">
        <div class="auth-card">
            <i class="fas fa-user-shield" style="font-size: 45px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Admin Login</h2>
            <div id="keyword-container" class="keyword-box">
                <p style="font-size:12px; color:var(--warning);">กรุณาใส่คีย์เวิร์ดเพื่อปลดล็อก</p>
                <input type="password" id="input-keyword" class="auth-input" placeholder="Keyword...">
                <button onclick="unlockFields()" style="width:100%; padding:10px; background:var(--primary); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">ยืนยันคีย์เวิร์ด</button>
            </div>
            <div id="id-pass-fields">
                <input type="text" id="admin-id" class="auth-input" placeholder="Admin ID">
                <input type="password" id="admin-pass" class="auth-input" placeholder="Password">
                <label style="font-size:12px; color:#888; display:flex; align-items:center; justify-content:center; gap:5px; margin-bottom:15px;">
                    <input type="checkbox" id="remember-me"> จดจำรหัสผ่าน
                </label>
                <div style="display:flex; gap:10px;">
                    <button onclick="closeAuthModal()" style="flex:1; padding:12px; background:#444; border:none; color:white; border-radius:8px; cursor:pointer;">ยกเลิก</button>
                    <button onclick="processLogin()" style="flex:1; padding:12px; background:var(--success); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">Login</button>
                </div>
            </div>
        </div>
    </div>

    <div id="successPopup" class="success-popup">
        <div class="success-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
            <h2>Access Granted!</h2>
            <p>ยินดีต้อนรับเข้าสู่ระบบจัดการ</p>
            <button onclick="location.reload()" style="padding:10px 40px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:20px;">ตกลง</button>
        </div>
    </div>

    <script>
        // ข้อมูลจำลองสำหรับ Login (Keyword: password / ID: admin / Pass: password)
        const SECRET = { keyword: "password", id: "admin", pass: "password" };
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        // ระบบเวลา Dashboard
        setInterval(() => {
            const now = new Date();
            document.getElementById('widget-time').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }, 1000);

        // ระบบเปลี่ยนหน้า
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        // --- ระบบ Login 2 ชั้น ---
        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("Logout?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else {
                document.getElementById('authModal').style.display = 'flex';
                document.getElementById('keyword-container').style.display = 'block';
                document.getElementById('id-pass-fields').style.display = 'none';
            }
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        function unlockFields() {
            if (document.getElementById('input-keyword').value === SECRET.keyword) {
                document.getElementById('keyword-container').style.display = 'none';
                document.getElementById('id-pass-fields').style.display = 'block';
                // โหลดรหัสที่จำไว้
                if(localStorage.getItem('remembered_id')) {
                    document.getElementById('admin-id').value = localStorage.getItem('remembered_id');
                    document.getElementById('admin-pass').value = localStorage.getItem('remembered_pass');
                    document.getElementById('remember-me').checked = true;
                }
            } else { alert("คีย์เวิร์ดไม่ถูกต้อง!"); }
        }

        function processLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('admin-pass').value;
            if (id === SECRET.id && pass === SECRET.pass) {
                if (document.getElementById('remember-me').checked) {
                    localStorage.setItem('remembered_id', id);
                    localStorage.setItem('remembered_pass', pass);
                } else {
                    localStorage.removeItem('remembered_id');
                    localStorage.removeItem('remembered_pass');
                }
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('successPopup').style.display = 'flex';
            } else { alert("ID หรือ Password ผิด!"); }
        }

        // --- ระบบจัดการไฟล์ ---
        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('widget-count').innerText = items.length + " รายการ";
            document.getElementById('widget-mode').innerText = isAdmin ? "Admin Mode" : "User Mode";
            if(isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }

            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img"><img src="${item.img || 'https://via.placeholder.com/300x160'}"></div>
                        <div class="download-info">
                            <h4>${item.name}</h4>
                            <button onclick="window.open('${item.link}')" class="btn-download is-open">Download Now</button>
                            ${isAdmin ? `
                                <div style="margin-top:10px; font-size:12px; display:flex; justify-content:center; gap:15px;">
                                    <span onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;">Edit</span>
                                    <span onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;">Delete</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        function saveItem() {
            const idx = parseInt(document.getElementById('editIndex').value);
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            if(name && link) {
                if(idx > -1) items[idx] = {name, img, link};
                else items.push({name, img, link});
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                location.reload();
            }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function deleteItem(i) { if(confirm("ลบ?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = "";
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        window.onload = renderItems;
    </script>
</body>
</html>
