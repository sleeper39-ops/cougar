<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Multi-Page System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; position: relative; }

        /* Page Management */
        .page-content { display: none; height: 100%; width: 100%; animation: fadeIn 0.3s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Stats */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-card .value { font-size: 1.4rem; font-weight: bold; margin: 5px 0; }
        .stat-card .label { font-size: 12px; color: #888; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 12px; border: 2px dashed var(--primary); margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }

        /* Layout for Iframe Pages */
        iframe { width: 100%; height: calc(100vh - 120px); border: none; border-radius: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Card System (Dashboard) */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .card-img { height: 160px; background: #222; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .btn-download { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title" style="font-size: 1.2rem;">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            
            <div id="dash-page" class="page-content active">
                <div class="stats-container">
                    <div class="stat-card"><i class="fas fa-clock" style="color:var(--success)"></i><div class="value" id="live-clock">00:00</div><div class="label">เวลาปัจจุบัน</div></div>
                    <div class="stat-card"><i class="fas fa-file-alt" style="color:var(--primary)"></i><div class="value" id="file-count">0</div><div class="label">ไฟล์ทั้งหมด</div></div>
                    <div class="stat-card"><i class="fas fa-user-shield" id="status-icon"></i><div class="value" id="system-status">Guest</div><div class="label">สถานะ</div></div>
                </div>

                <div id="admin-panel">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <h4 style="margin:0;">จัดการข้อมูล</h4>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:11px; font-weight:bold;">ล็อคดาวน์โหลดทั้งหมด</span>
                            <input type="checkbox" id="globalLock" onchange="toggleGlobalLock()">
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; padding:10px 15px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">บันทึก</button>
                            <button onclick="resetForm()" style="background:var(--secondary); color:white; padding:10px 15px; border:none; border-radius:6px; cursor:pointer;">ยกเลิก</button>
                        </div>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content">
                <iframe src="cctv.html"></iframe>
            </div>

            <div id="map-page" class="page-content">
                <iframe src="map.html"></iframe>
            </div>

            <div id="calendar-page" class="page-content">
                <iframe src="calendar.html"></iframe>
            </div>

        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;

        // --- NAVIGATION SYSTEM (Fix Here) ---
        function showPage(pageId) {
            // 1. ซ่อนทุกหน้า
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });

            // 2. แสดงเฉพาะหน้าที่เลือก
            document.getElementById(pageId).classList.add('active');

            // 3. เปลี่ยนสถานะปุ่มเมนู
            document.querySelectorAll('.sidebar a').forEach(btn => btn.classList.remove('active'));
            const currentNavId = 'nav-' + pageId.split('-')[0];
            document.getElementById(currentNavId).classList.add('active');

            // 4. เปลี่ยน Title บน Top Nav
            const titles = { 'dash-page': 'Dashboard', 'live-page': 'ระบบกล้องสด', 'map-page': 'แผนที่ระบบ', 'calendar-page': 'ปฏิทินงาน' };
            document.getElementById('nav-title').innerText = titles[pageId];
        }

        // --- CLOCK & STATS ---
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        // --- ADMIN & DATA SYSTEM ---
        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') { sessionStorage.removeItem('isAdmin'); location.reload(); }
            else { 
                const p = prompt("Password:");
                if(p === "admin2") { sessionStorage.setItem('isAdmin', 'true'); location.reload(); }
            }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('file-count').innerText = items.length;

            if(isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('system-status').innerText = "Admin";
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }

            items.forEach((item, index) => {
                const locked = isGlobalLocked || item.locked;
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img"><img src="${item.img || 'https://via.placeholder.com/300x160'}"></div>
                        <div class="card-info">
                            <h4 style="margin-bottom:10px;">${item.name}</h4>
                            <button onclick="handleDl('${item.link}', ${locked})" class="btn-download" style="background:${locked ? 'var(--warning)' : 'var(--success)'}">
                                <i class="fas ${locked ? 'fa-lock' : 'fa-download'}"></i> ${locked ? 'Locked' : 'Download'}
                            </button>
                            ${isAdmin ? `<div style="margin-top:10px; font-size:12px; display:flex; justify-content:center; gap:10px;">
                                <span onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;">แก้ไข</span>
                                <span onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;">ลบ</span>
                            </div>` : ''}
                        </div>
                    </div>`;
            });
        }

        function saveItem() {
            const n = document.getElementById('itemName').value, i = document.getElementById('itemImg').value, l = document.getElementById('itemLink').value, idx = parseInt(document.getElementById('editIndex').value);
            if(n && l) {
                if(idx > -1) items[idx] = { ...items[idx], name:n, img:i, link:l };
                else items.push({ name:n, img:i, link:l, locked: false });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                resetForm(); renderItems();
            }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update";
        }

        function resetForm() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('itemName').value = ""; document.getElementById('itemImg').value = ""; document.getElementById('itemLink').value = "";
            document.getElementById('btn-save').innerText = "บันทึก";
        }

        function deleteItem(i) { if(confirm("ลบไฟล์นี้?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        function handleDl(link, isLocked) {
            if(isLocked) {
                if(prompt("ระบุรหัสผ่าน (1234):") === "1234") window.open(link, '_blank');
                else alert("รหัสผิด!");
            } else window.open(link, '_blank');
        }

        window.onload = renderItems;
    </script>
</body>
</html>
