<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full Data & Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Unified Auth Modal */
        .auth-overlay { display: none; position: fixed; z-index: 10000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .auth-card { background: #222; padding: 35px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #444; color: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; box-sizing: border-box; outline: none; }
        .switch-link { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        
        /* Success Popup */
        .success-overlay { display: none; position: fixed; z-index: 11000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .success-card { background: #111; padding: 40px; border-radius: 25px; text-align: center; border: 2px solid var(--success); color: white; }

        /* Admin Management Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; font-size: 12px; font-weight: bold; color: #555; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Card List */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img { height: 160px; background: #222; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; }
        .card-info { padding: 15px; text-align: center; }
        .btn-dl { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--success); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a class="active"><i class="fas fa-home"></i> Dashboard</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="mode-text">User Mode</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="admin-panel">
                <h3 style="margin-top:0;"><i class="fas fa-edit"></i> Manage Content</h3>
                <div class="form-row">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                    <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                    <div class="input-group"><label>ลิงก์ดาวน์โหลด</label><input type="text" id="itemLink"></div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                        <button onclick="resetForm()" style="background:var(--secondary); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">ยกเลิก</button>
                    </div>
                </div>
            </div>

            <div id="download-list" class="download-grid"></div>
        </div>
    </div>

    <div id="authModal" class="auth-overlay">
        <div class="auth-card">
            <i class="fas fa-user-shield" style="font-size: 45px; color: var(--primary); margin-bottom: 15px;"></i>
            
            <div id="login-form">
                <h3>Admin Login</h3>
                <input type="text" id="admin-id" class="auth-input" placeholder="Username">
                <input type="password" id="admin-pass" class="auth-input" placeholder="Password">
                <label style="font-size:12px; color:#888; display:flex; align-items:center; justify-content:center; gap:5px; margin:10px 0;">
                    <input type="checkbox" id="remember-me"> จดจำรหัสผ่าน
                </label>
                <button onclick="processLogin()" style="width:100%; padding:12px; background:var(--success); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">Login</button>
                <span class="switch-link" onclick="switchForm('keyword')">ลืมรหัสผ่านใช่หรือไม่?</span>
            </div>

            <div id="keyword-form" style="display:none;">
                <h3 style="color:var(--warning);">Recovery Mode</h3>
                <p style="font-size:12px; color:#aaa;">กรอกคีย์เวิร์ดเพื่อกู้คืนรหัสผ่าน</p>
                <input type="password" id="input-keyword" class="auth-input" placeholder="Enter Keyword">
                <button onclick="checkKeyword()" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">Verify & Show</button>
                <span class="switch-link" onclick="switchForm('login')">กลับไปหน้า Login</span>
            </div>
            <button onclick="closeAuthModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Close</button>
        </div>
    </div>

    <div id="successPopup" class="success-overlay">
        <div class="success-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
            <h2>Login Successful!</h2>
            <button onclick="enterAdmin()" style="padding:10px 40px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:20px;">เข้าสู่หน้าแอดมิน</button>
        </div>
    </div>

    <script>
        // ข้อมูลรหัสผ่าน
        const CONFIG = { id: "admin", pass: "admin2", keyword: "password" };
        
        // --- ส่วนกู้คืนข้อมูลเก่า ---
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];

        window.onload = () => {
            // โหลดรหัสที่จำไว้
            if(localStorage.getItem('remember_id')) {
                document.getElementById('admin-id').value = localStorage.getItem('remember_id');
                document.getElementById('admin-pass').value = localStorage.getItem('remember_pass');
                document.getElementById('remember-me').checked = true;
            }
            renderItems(); // แสดงข้อมูลเก่าทันทีที่เปิดหน้า
            if(sessionStorage.getItem('isAdmin') === 'true') showAdminMode();
        };

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img"><img src="${item.img || 'https://via.placeholder.com/300x160'}"></div>
                        <div class="card-info">
                            <h4>${item.name}</h4>
                            <button onclick="window.open('${item.link}')" class="btn-dl">Download</button>
                            ${isAdmin ? `
                                <div style="margin-top:10px; font-size:12px; display:flex; justify-content:center; gap:15px;">
                                    <span onclick="editItem(${index})" style="color:var(--primary); cursor:pointer;"><i class="fas fa-edit"></i> Edit</span>
                                    <span onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i> Delete</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        // --- ระบบ Login & Modal ---
        function toggleAuthModal() {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                if(confirm("ออกจากระบบ?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else {
                document.getElementById('authModal').style.display = 'flex';
                switchForm('login');
            }
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        function switchForm(mode) {
            document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('keyword-form').style.display = mode === 'keyword' ? 'block' : 'none';
        }

        function checkKeyword() {
            if(document.getElementById('input-keyword').value === CONFIG.keyword) {
                alert(`คีย์เวิร์ดถูกต้อง!\nID: ${CONFIG.id}\nPass: ${CONFIG.pass}`);
                document.getElementById('admin-id').value = CONFIG.id;
                document.getElementById('admin-pass').value = CONFIG.pass;
                switchForm('login');
            } else { alert("คีย์เวิร์ดไม่ถูกต้อง!"); }
        }

        function processLogin() {
            const id = document.getElementById('admin-id').value;
            const pass = document.getElementById('admin-pass').value;
            if(id === CONFIG.id && pass === CONFIG.pass) {
                if(document.getElementById('remember-me').checked) {
                    localStorage.setItem('remember_id', id); localStorage.setItem('remember_pass', pass);
                } else {
                    localStorage.removeItem('remember_id'); localStorage.removeItem('remember_pass');
                }
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('successPopup').style.display = 'flex';
            } else { alert("ID หรือ Password ผิด!"); }
        }

        function enterAdmin() {
            sessionStorage.setItem('isAdmin', 'true');
            location.reload();
        }

        function showAdminMode() {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('auth-btn').innerText = "Logout Admin";
            document.getElementById('auth-btn').style.background = "var(--danger)";
            document.getElementById('mode-text').innerText = "Admin Management Mode";
        }

        // --- ระบบจัดการข้อมูล (CRUD) ---
        function saveItem() {
            const idx = parseInt(document.getElementById('editIndex').value);
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            if(name && link) {
                if(idx > -1) items[idx] = {name, img, link};
                else items.push({name, img, link});
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                location.reload();
            }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            document.getElementById('btn-save').innerText = "Update Data";
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function deleteItem(i) { if(confirm("ลบข้อมูลนี้?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }
        
        function resetForm() { document.getElementById('editIndex').value = "-1"; document.getElementById('itemName').value = ""; document.getElementById('btn-save').innerText = "บันทึก"; }
    </script>
</body>
</html>
