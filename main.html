<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Smart System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg-dark: #1a1a1a;
            --bg-body: #f0f2f5;
            --sidebar-width: 260px;
        }

        body { 
            display: flex; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-body); 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg-dark); 
            color: white; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar h2 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 40px; 
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .sidebar a { 
            color: #bbb; 
            text-decoration: none; 
            padding: 14px 20px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover, .sidebar a.active { 
            background: var(--primary); 
            color: white; 
        }

        /* Main Content Area */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
        }

        .page-content { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .page-content.active { display: flex; flex-direction: column; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ส่วนของระบบ Download Card (คล้ายรูปที่คุณส่งมา) */
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .download-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }

        .download-card:hover { transform: translateY(-5px); }

        .download-card img { width: 100%; height: 180px; object-fit: cover; background: #eee; }

        .download-info { padding: 20px; text-align: center; }

        .btn-download {
            display: inline-block;
            background: var(--bg-dark);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            width: 80%;
        }

        .btn-download:hover { background: var(--primary); }

        /* Admin Form */
        .admin-panel {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            margin-bottom: 30px;
        }

        .admin-form input {
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 200px;
        }

        /* Video Grid Layout */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .cam-card { 
            background: #000; 
            border-radius: 15px; 
            aspect-ratio: 16/9; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .video-player { width: 100%; height: 100%; object-fit: cover; }

        .cam-label { 
            position: absolute; 
            top: 12px; 
            left: 12px; 
            background: rgba(231, 76, 60, 0.9); 
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            z-index: 5;
        }

        .frame-container {
            flex: 1;
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        iframe { width: 100%; height: 100%; border: 0; }

        .logout-btn { 
            margin-top: auto; 
            background: var(--danger); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active">
            <i class="fas fa-home"></i> หน้าหลัก
        </a>
        <a onclick="showPage('live-page')" id="nav-live">
            <i class="fas fa-video"></i> ระบบกล้องสด
        </a>
        <a onclick="showPage('map-page')" id="nav-map">
            <i class="fas fa-map-marked-alt"></i> แผนที่ระบบ
        </a>
        <a onclick="showPage('calendar-page')" id="nav-cal">
            <i class="fas fa-calendar-alt"></i> ปฏิทินกิจกรรม
        </a>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
        </button>
    </div>

    <div class="main-content">
        
        <div id="dash-page" class="page-content active">
            <h1 style="margin-top:0;">แผงควบคุมและดาวน์โหลด</h1>
            
            <div class="admin-panel">
                <h3 style="margin-top:0;"><i class="fas fa-tools"></i> ส่วนจัดการไฟล์ (Admin Only)</h3>
                <div class="admin-form">
                    <input type="text" id="itemName" placeholder="ชื่อไฟล์/เวอร์ชั่น">
                    <input type="text" id="itemImg" placeholder="URL รูปภาพตัวอย่าง">
                    <input type="text" id="itemLink" placeholder="URL ลิงก์ดาวน์โหลด">
                    <button onclick="addItem()" style="background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                        <i class="fas fa-plus"></i> เพิ่มรายการ
                    </button>
                </div>
            </div>

            <div id="download-list" class="download-grid">
                </div>
        </div>

        <div id="live-page" class="page-content">
            <h1 style="margin-top:0; margin-bottom: 20px;">ระบบสตรีมสด</h1>
            <div class="video-grid">
                <div class="cam-card"><div class="cam-label">แยกกรมหลวง</div><video id="v1" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกร่วมทวี</div><video id="v2" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกเซ็นทรัล</div><video id="v3" class="video-player" autoplay muted playsinline controls></video></div>
                <div class="cam-card"><div class="cam-label">แยกสถานีรถไฟ</div><video id="v4" class="video-player" autoplay muted playsinline controls></video></div>
            </div>
        </div>

        <div id="map-page" class="page-content">
            <div class="frame-container">
                <iframe src="map.html"></iframe>
            </div>
        </div>

        <div id="calendar-page" class="page-content">
            <div class="frame-container">
                <iframe src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok"></iframe>
            </div>
        </div>

    </div>

    <script>
        // --- ระบบจัดการข้อมูล Download ---
        let items = JSON.parse(localStorage.getItem('cougar_files')) || [
            { name: "Scoreboard v2.9", img: "https://via.placeholder.com/300x180", link: "#" }
        ];

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="download-card">
                        <img src="${item.img}" alt="preview">
                        <div class="download-info">
                            <h3>${item.name}</h3>
                            <a href="${item.link}" target="_blank" class="btn-download">Link : Download</a>
                            <p onclick="deleteItem(${index})" style="color:var(--danger); cursor:pointer; font-size:12px; margin-top:10px;">[ ลบรายการ ]</p>
                        </div>
                    </div>
                `;
            });
        }

        function addItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;

            if (name && link) {
                items.push({ name, img: img || 'https://via.placeholder.com/300x180', link });
                localStorage.setItem('cougar_files', JSON.stringify(items));
                renderItems();
                document.getElementById('itemName').value = '';
                document.getElementById('itemImg').value = '';
                document.getElementById('itemLink').value = '';
            } else {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            }
        }

        function deleteItem(index) {
            if (confirm("ยืนยันการลบรายการนี้?")) {
                items.splice(index, 1);
                localStorage.setItem('cougar_files', JSON.stringify(items));
                renderItems();
            }
        }

        // --- ระบบสลับหน้า ---
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            const navId = 'nav-' + pageId.split('-')[0];
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');
        }

        // --- เริ่มต้นระบบ ---
        setInterval(() => {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function initPlayer(id, src) {
            const video = document.getElementById(id);
            if (video && Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
            }
        }

        window.onload = () => {
            renderItems();
            initPlayer('v1', 'https://streaming.udoncity.go.th:1935/live/cctv_121.stream/chunklist_w2010918290.m3u8');
            initPlayer('v2', 'https://streaming.udoncity.go.th:1935/live/Axis_12_22.stream/chunklist_w236554495.m3u8');
            initPlayer('v3', 'https://streaming.udoncity.go.th:1935/live/Axis_12_38.stream/chunklist_w1610502304.m3u8');
            initPlayer('v4', 'https://streaming.udoncity.go.th:1935/live/Axis_12_33.stream/chunklist_w34733218.m3u8');
        };

        function logout() { if(confirm("ยืนยันการออกจากระบบ?")) window.location.href = "login.html"; }
    </script>
</body>
</html>
