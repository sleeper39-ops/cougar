<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - High Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        /* Performance Tweaks */
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }

        /* Fast Animation */
        .page-content { display: none; height: 100%; }
        .page-content.active { display: block; animation: fastFade 0.2s ease-out; }
        @keyframes fastFade { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: bold; color: #666; }
        .input-group input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }

        /* GPU Optimized Cards */
        .download-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding-bottom: 40px;
            will-change: transform; /* Hint to browser for GPU use */
        }
        .download-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
            transform: translateZ(0); /* Hardware acceleration */
        }
        .card-img-container { width: 100%; height: 160px; background: #222; overflow: hidden; cursor: zoom-in; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .download-info { padding: 15px; text-align: center; }
        .btn-download { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .is-locked { background: var(--warning); color: white; }
        .is-open { background: var(--success); color: white; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            <input type="text" id="loginUser" style="width:100%; padding:10px; margin:10px 0;" placeholder="Username">
            <input type="password" id="loginPass" style="width:100%; padding:10px; margin:10px 0;" placeholder="Password">
            <button onclick="performLogin()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer;">เข้าสู่ระบบ</button>
            <button onclick="closeLoginModal()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> กล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title" style="font-size: 1.2rem; margin:0;">Dashboard</h2>
            <button id="auth-btn" onclick="toggleAuth()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="dash-time">00:00</div>
                        <div style="font-size:12px; color:#888;">เวลาปัจจุบัน</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-count">0</div>
                        <div style="font-size:12px; color:#888;">รายการไฟล์</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="dash-status">Guest</div>
                        <div style="font-size:12px; color:#888;">โหมดใช้งาน</div>
                    </div>
                </div>

                <div id="admin-panel">
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                        <div class="input-group" style="flex-direction:row; align-items:center; gap:10px; width:auto;">
                            <span style="font-size:11px;">Lock All:</span>
                            <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                        </div>
                        <button onclick="saveItem()" id="btn-save" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">บันทึก</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"></div>
            <div id="map-page" class="page-content"></div>
            <div id="calendar-page" class="page-content"></div>
        </div>
    </div>

    <div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" style="max-width:90%; max-height:90%; border-radius:10px;"></div>

    <script>
        const CONFIG = {
            admin: { user: "admin", pass: "admin2" },
            defaultHash: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
        };

        let state = {
            items: JSON.parse(localStorage.getItem('cougar_final_data')) || [],
            isGlobalLocked: JSON.parse(localStorage.getItem('global_lock')) || false,
            isAdmin: sessionStorage.getItem('isAdmin') === 'true'
        };

        // --- Fast Render Engine ---
        function renderItems() {
            const list = document.getElementById('download-list');
            const isAdmin = state.isAdmin;
            const globalLock = state.isGlobalLocked;
            
            // Build HTML in memory as a single string (Batch update)
            let htmlBuffer = '';
            
            state.items.forEach((item, index) => {
                const isLocked = globalLock || item.locked;
                htmlBuffer += `
                    <div class="download-card">
                        <div class="card-img-container" onclick="openImage('${item.img}')">
                            <img src="${item.img || 'https://via.placeholder.com/300x160?text=No+Image'}" loading="lazy">
                        </div>
                        <div class="download-info">
                            <h4 style="margin:0 0 10px 0; font-size:14px; height:2.4em; overflow:hidden;">${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${isLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${isLocked ? 'fa-lock' : 'fa-download'}"></i> 
                                ${isLocked ? 'ใส่รหัสผ่าน' : 'ดาวน์โหลด'}
                            </button>
                        </div>
                        ${isAdmin ? `
                            <div style="display:flex; justify-content:center; gap:15px; padding:10px; background:#f9f9f9; border-top:1px solid #eee;">
                                <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})"><span class="slider"></span></label>
                                <i class="fas fa-edit" style="color:var(--primary); cursor:pointer;" onclick="editItem(${index})"></i>
                                <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="deleteItem(${index})"></i>
                            </div>
                        ` : ''}
                    </div>`;
            });

            list.innerHTML = htmlBuffer;
            updateDashboard();
        }

        // --- Speed Optimized Logic ---
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            
            const target = document.getElementById(pageId);
            target.classList.add('active');
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');

            // Lazy load iFrames
            if (pageId !== 'dash-page' && target.innerHTML === '') {
                const srcMap = { 'live-page': 'cctv.html', 'map-page': 'map.html', 'calendar-page': 'calendar.html' };
                target.innerHTML = `<iframe src="${srcMap[pageId]}" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        }

        async function hashText(text) {
            const data = new TextEncoder().encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function secureDownload(link, itemLocked) {
            if (state.isGlobalLocked || itemLocked) {
                const pass = prompt("กรุณาใส่รหัสผ่านดาวน์โหลด:");
                if (!pass) return;
                const inputHash = await hashText(pass);
                const currentHash = localStorage.getItem('custom_download_hash') || CONFIG.defaultHash;
                if (inputHash === currentHash) window.open(link, '_blank');
                else alert("รหัสผ่านไม่ถูกต้อง");
            } else { window.open(link, '_blank'); }
        }

        function updateDashboard() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('dash-count').innerText = state.items.length;
            document.getElementById('dash-status').innerText = state.isAdmin ? "Admin Mode" : "Guest Mode";
        }

        function toggleAuth() {
            if (state.isAdmin) {
                if(confirm("ออกจากโหมด Admin?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function performLogin() {
            if (document.getElementById('loginUser').value === CONFIG.admin.user && document.getElementById('loginPass').value === CONFIG.admin.pass) {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { alert("User หรือ Pass ผิด"); }
        }

        // --- Admin Ops ---
        function saveItem() {
            const index = parseInt(document.getElementById('editIndex').value);
            const newItem = {
                name: document.getElementById('itemName').value,
                img: document.getElementById('itemImg').value,
                link: document.getElementById('itemLink').value,
                locked: index > -1 ? state.items[index].locked : false
            };
            if (!newItem.name || !newItem.link) return alert("กรอกข้อมูลให้ครบ");
            
            if (index > -1) state.items[index] = newItem;
            else state.items.push(newItem);
            
            localStorage.setItem('cougar_final_data', JSON.stringify(state.items));
            resetForm();
            renderItems();
        }

        function deleteItem(index) { if(confirm("ลบไฟล์นี้?")) { state.items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(state.items)); renderItems(); } }
        function editItem(index) {
            const itm = state.items[index];
            document.getElementById('itemName').value = itm.name;
            document.getElementById('itemImg').value = itm.img;
            document.getElementById('itemLink').value = itm.link;
            document.getElementById('editIndex').value = index;
            document.getElementById('btn-save').innerText = "Update";
            window.scrollTo({top:0, behavior:'smooth'});
        }
        function resetForm() {
            document.getElementById('itemName').value = ''; document.getElementById('itemImg').value = ''; 
            document.getElementById('itemLink').value = ''; document.getElementById('editIndex').value = '-1';
            document.getElementById('btn-save').innerText = "บันทึก";
        }
        function toggleGlobalLock() { state.isGlobalLocked = document.getElementById('globalLock').checked; localStorage.setItem('global_lock', state.isGlobalLocked); renderItems(); }
        function toggleItemLock(i) { state.items[i].locked = !state.items[i].locked; localStorage.setItem('cougar_final_data', JSON.stringify(state.items)); renderItems(); }
        function openImage(src) { if(src) { document.getElementById('lightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; } }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

        // Boot
        window.onload = () => {
            if (state.isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
                document.getElementById('globalLock').checked = state.isGlobalLocked;
            }
            renderItems();
            setInterval(updateDashboard, 10000);
        };
    </script>
</body>
</html>
