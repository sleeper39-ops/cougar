<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Control Panel - Mini Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .control-card { background: #2d2d2d; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .score-display { font-size: 4rem; font-weight: bold; color: #ffca28; background: #000; padding: 10px 30px; border-radius: 10px; margin: 10px 0; }
        .timer-display { font-size: 3rem; font-family: monospace; color: #00ff00; }
        .btn-score { width: 60px; height: 60px; font-size: 1.5rem; margin: 5px; border-radius: 50%; }
        .team-name { border: none; background: transparent; color: white; text-align: center; font-size: 1.5rem; border-bottom: 2px solid #444; width: 100%; }
        .team-name:focus { outline: none; border-bottom-color: #ffca28; }
        hr { border-color: #444; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="control-card text-center">
        <h3 class="mb-4">FOOTBALL CONTROL PANEL</h3>
        
        <div class="row mb-4">
            <div class="col">
                <div class="timer-display" id="timer">00:00</div>
                <div class="mt-2">
                    <button class="btn btn-success" onclick="startTimer()">START</button>
                    <button class="btn btn-warning" onclick="pauseTimer()">PAUSE</button>
                    <button class="btn btn-danger" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>

        <hr>

        <div class="row align-items-center">
            <div class="col-md-5">
                <input type="text" id="nameA" class="team-name" value="HOME">
                <div class="score-display" id="scoreA">0</div>
                <div>
                    <button class="btn btn-outline-light btn-score" onclick="changeScore('A', 1)">+</button>
                    <button class="btn btn-outline-light btn-score" onclick="changeScore('A', -1)">-</button>
                </div>
            </div>

            <div class="col-md-2">
                <h2 class="text-muted">VS</h2>
            </div>

            <div class="col-md-5">
                <input type="text" id="nameB" class="team-name" value="AWAY">
                <div class="score-display"
