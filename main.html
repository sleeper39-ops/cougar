<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a.active { background: var(--primary); color: white; }
        
        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* สไตล์สวิตช์สไลด์ (Toggle) */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--warning); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Card & UI */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .download-info { padding: 20px; text-align: center; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .is-locked { background: var(--warning) !important; color: white; }
        .is-open { background: var(--success); color: white; }

        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .admin-controls { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 10px; background: #f9f9f9; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="toggleAuthModal()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                
                <div id="admin-panel">
                    <h3><i class="fas fa-cogs"></i> ระบบจัดการไฟล์</h3>
                    <div class="admin-form-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName"></div>
                        <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"></div>
                        <div class="input-group" style="grid-column: span 2;"><label>ลิงก์โหลด</label><input type="text" id="itemLink"></div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                        <button onclick="saveItem()" id="btn-submit-item" style="background:var(--success); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer;">เพิ่มไฟล์</button>
                        
                        <div style="background:#fff3e0; padding:10px 20px; border-radius:10px; border:1px solid #ffe0b2; display:flex; align-items:center; gap:10px;">
                            <span style="font-weight:bold; color:#e65100;">ล็อกทุกไฟล์ในระบบ:</span>
                            <label class="switch">
                                <input type="checkbox" id="globalLock" onchange="toggleGlobalLock()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; display: flex; gap: 10px; align-items: flex-end;">
                        <div class="input-group" style="margin:0;"><label>รหัสผ่านดาวน์โหลด</label><input type="text" id="newDownloadPass" placeholder="ค่าเดิม 1234"></div>
                        <button onclick="changeDownloadPass()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">เปลี่ยนรหัส</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>
        </div>
    </div>

    <div id="loginModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:300px; text-align:center;">
            <h3>Admin Login</h3>
            <input type="password" id="adminPass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="handleLogin()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">ตกลง</button>
        </div>
    </div>

    <script>
        const HASH_CONFIG = { dl: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" }; // 1234
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function toggleAuthModal() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                sessionStorage.removeItem('isAdmin'); location.reload();
            } else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function handleLogin() {
            if (document.getElementById('adminPass').value === 'admin2') { // รหัสผ่านเข้าหน้า admin
                sessionStorage.setItem('isAdmin', 'true'); location.reload();
            } else { alert("รหัสผ่านผิด"); }
        }

        function toggleGlobalLock() {
            isGlobalLocked = document.getElementById('globalLock').checked;
            localStorage.setItem('global_lock', isGlobalLocked);
            renderItems();
        }

        function toggleItemLock(index) {
            items[index].locked = !items[index].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(items));
            renderItems();
        }

        async function secureDownload(link, itemLocked) {
            // ถ้า Master Lock เปิดอยู่ หรือ ไฟล์นั้นถูกล็อกรายตัว
            if (isGlobalLocked || itemLocked) {
                const pass = prompt("ไฟล์นี้ถูกล็อก กรุณาใส่รหัสผ่าน:");
                if (!pass) return;
                const hashedInput = await hashText(pass);
                const currentHash = localStorage.getItem('custom_download_hash') || HASH_CONFIG.dl;
                if (hashedInput === currentHash) { window.open(link, '_blank'); } 
                else { alert("รหัสผ่านไม่ถูกต้อง"); }
            } else {
                window.open(link, '_blank');
            }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            document.getElementById('globalLock').checked = isGlobalLocked;

            items.forEach((item, index) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                const adminUI = isAdmin ? `
                    <div class="admin-controls">
                        <div style="display:flex; align-items:center; gap:5px;">
                            <span style="font-size:11px;">ล็อกไฟล์:</span>
                            <label class="switch">
                                <input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button onclick="editItem(${index})" style="border:none; background:none; color:var(--primary); cursor:pointer;"><i class="fas fa-edit"></i> แก้ไข</button>
                        <button onclick="deleteItem(${index})" style="border:none; background:none; color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>` : '';

                list.innerHTML += `
                    <div class="download-card">
                        <img src="${item.img || 'https://via.placeholder.com/300x150'}" style="width:100%; height:150px; object-fit:cover;">
                        <div class="download-info">
                            <h4 style="margin:0 0 10px 0;">${item.name}</h4>
                            <button onclick="secureDownload('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> 
                                ${effectivelyLocked ? 'ต้องใช้รหัสผ่าน' : 'ดาวน์โหลดฟรี'}
                            </button>
                            ${adminUI}
                        </div>
                    </div>`;
            });
        }

        // --- ฟังชั่นพื้นฐาน ---
        function saveItem() {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            if (name && link) {
                items.push({ name, img, link, locked: false });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                location.reload();
            }
        }
        function deleteItem(index) { if(confirm("ลบไฟล์นี้?")) { items.splice(index, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }
        async function changeDownloadPass() {
            const newPass = document.getElementById('newDownloadPass').value;
            if (newPass) {
                localStorage.setItem('custom_download_hash', await hashText(newPass));
                alert("เปลี่ยนรหัสผ่านดาวน์โหลดสำเร็จ!");
            }
        }

        window.onload = () => {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
            renderItems();
        };
    </script>
</body>
</html>
