<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 - Full System with Secure Lock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #3498db; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; --secondary: #95a5a6;
            --bg-dark: #1a1a1a; --bg-body: #f0f2f5; --sidebar-width: 260px;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: white; padding: 25px 15px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { color: var(--primary); text-align: center; margin-bottom: 40px; font-size: 1.8rem; }
        .sidebar a { color: #bbb; text-decoration: none; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }

        .wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 5; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* Login Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 9999; align-items:center; justify-content:center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Dashboard Stats */
        .dashboard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .icon-time { color: #2ecc71; } .icon-file { color: #3498db; } .icon-mode { color: #2ecc71; }

        /* Admin Panel */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed var(--primary); margin-bottom: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }

        /* Cards */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-container img { width: 100%; height: 180px; object-fit: contain; background: #222; }
        .btn-download { display: block; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; color: white; margin-top: 10px; }
        .is-locked { background: var(--warning); }
        .is-open { background: var(--success); }
        .admin-card-controls { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; }

        .page-content { display: none; height: 100%; }
        .page-content.active { display: block; }
        iframe { width: 100%; height: calc(100vh - 150px); border: none; border-radius: 15px; background: white; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h3><i class="fas fa-lock"></i> Admin Login</h3>
            <input type="text" id="loginUser" class="login-input" placeholder="Username">
            <input type="password" id="loginPass" class="login-input" placeholder="Password">
            <div style="display:flex; justify-content:space-between; margin: 10px 0; font-size: 13px;">
                <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                <span onclick="forgotPass()" style="color:var(--primary); cursor:pointer;">Forgot Password?</span>
            </div>
            <button onclick="handleLogin()" class="btn-login">Login</button>
            <button onclick="closeLogin()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#999;">Cancel</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Cougar2</h2>
        <a onclick="showPage('dash-page')" id="nav-dash" class="active"><i class="fas fa-home"></i> หน้าหลัก</a>
        <a onclick="showPage('live-page')" id="nav-live"><i class="fas fa-video"></i> ระบบกล้องสด</a>
        <a onclick="showPage('map-page')" id="nav-map"><i class="fas fa-map-marked-alt"></i> แผนที่ระบบ</a>
        <a onclick="showPage('calendar-page')" id="nav-cal"><i class="fas fa-calendar-alt"></i> ปฏิทิน</a>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h2 id="nav-title">Dashboard</h2>
            <button id="auth-btn" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="toggleAuth()">Admin Login</button>
        </div>

        <div class="main-content">
            <div id="dash-page" class="page-content active">
                
                <div class="dashboard-stats">
                    <div class="stat-box"><i class="fas fa-clock icon-time"></i><div class="stat-value" id="dash-time">00:00</div><div class="stat-label">เวลาปัจจุบัน</div></div>
                    <div class="stat-box"><i class="fas fa-file-download icon-file"></i><div class="stat-value" id="dash-count">0</div><div class="stat-label">ไฟล์ทั้งหมด</div></div>
                    <div class="stat-box"><i class="fas fa-shield-alt icon-mode"></i><div class="stat-value" id="dash-status">Guest</div><div class="stat-label">สถานะ</div></div>
                </div>

                <div id="admin-panel">
                    <div class="admin-header">
                        <h4 style="margin:0;"><i class="fas fa-tools"></i> Admin Control</h4>
                        <div style="display:flex; gap:20px; align-items:center;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span style="font-size:12px; font-weight:bold;">Lock all downloads</span>
                                <label class="switch"><input type="checkbox" id="globalLock" onchange="toggleGlobalLock()"><span class="slider"></span></label>
                            </div>
                            <input type="text" id="newDlPass" placeholder="รหัสโหลดใหม่" style="padding:5px; border-radius:5px; border:1px solid #ddd; font-size:12px;">
                            <button onclick="changeDlPass()" style="font-size:11px; padding:5px 10px; cursor:pointer;">Update Pass</button>
                        </div>
                    </div>
                    <div class="form-row">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="text" id="itemName" class="login-input" placeholder="ชื่อไฟล์" style="margin:0">
                        <input type="text" id="itemImg" class="login-input" placeholder="ลิงก์รูปภาพ" style="margin:0">
                        <input type="text" id="itemLink" class="login-input" placeholder="ลิงก์ดาวน์โหลด" style="margin:0">
                        <button onclick="saveItem()" id="btn-save" class="btn-login" style="width:100px; background:var(--success)">Save</button>
                    </div>
                </div>

                <div id="download-list" class="download-grid"></div>
            </div>

            <div id="live-page" class="page-content"><iframe src="cctv.html"></iframe></div>
            <div id="map-page" class="page-content"><iframe src="map.html"></iframe></div>
            <div id="calendar-page" class="page-content"><iframe src="calendar.html"></iframe></div>
        </div>
    </div>

    <script>
        const CONFIG = { 
            admin: { user: "admin", pass: "admin2", keyword: "password" },
            defaultDlHash: "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4" // Default: 1234
        };
        
        let items = JSON.parse(localStorage.getItem('cougar_final_data')) || [];
        let isGlobalLocked = JSON.parse(localStorage.getItem('global_lock')) || false;

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function toggleAuth() {
            if (isLoggedIn()) { logout(); } 
            else { document.getElementById('loginModal').style.display = 'flex'; }
        }

        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function handleLogin() {
            const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value, rem = document.getElementById('rememberMe').checked;
            if (u === CONFIG.admin.user && p === CONFIG.admin.pass) {
                (rem ? localStorage : sessionStorage).setItem('isAdmin', 'true');
                location.reload();
            } else { alert("Invalid Credentials"); }
        }

        function isLoggedIn() { return localStorage.getItem('isAdmin') === 'true' || sessionStorage.getItem('isAdmin') === 'true'; }
        function logout() { localStorage.removeItem('isAdmin'); sessionStorage.removeItem('isAdmin'); location.reload(); }
        function forgotPass() {
            const k = prompt("Recovery Keyword:");
            if (k === CONFIG.admin.keyword) alert(`User: ${CONFIG.admin.user}\nPass: ${CONFIG.admin.pass}`);
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        function toggleGlobalLock() {
            isGlobalLocked = document.getElementById('globalLock').checked;
            localStorage.setItem('global_lock', isGlobalLocked);
            renderItems();
        }

        function toggleItemLock(idx) {
            items[idx].locked = !items[idx].locked;
            localStorage.setItem('cougar_final_data', JSON.stringify(items));
            renderItems();
        }

        async function changeDlPass() {
            const p = document.getElementById('newDlPass').value;
            if (p) {
                localStorage.setItem('dl_hash', await hashText(p));
                alert("Download password updated!");
                document.getElementById('newDlPass').value = '';
            }
        }

        async function secureDl(link, itemLocked) {
            if (isGlobalLocked || itemLocked) {
                const pass = prompt("Enter download password:");
                if (!pass) return;
                const hashed = await hashText(pass);
                const currentHash = localStorage.getItem('dl_hash') || CONFIG.defaultDlHash;
                if (hashed === currentHash) window.open(link, '_blank');
                else alert("Wrong Password!");
            } else { window.open(link, '_blank'); }
        }

        function renderItems() {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            const isAdmin = isLoggedIn();
            
            if(isAdmin) document.getElementById('globalLock').checked = isGlobalLocked;

            items.forEach((item, index) => {
                const effectivelyLocked = isGlobalLocked || item.locked;
                list.innerHTML += `
                    <div class="download-card">
                        <div class="card-img-container"><img src="${item.img || 'https://via.placeholder.com/300x180'}"></div>
                        <div style="padding:15px; text-align:center;">
                            <h4 style="margin:0;">${item.name}</h4>
                            <button onclick="secureDl('${item.link}', ${item.locked})" class="btn-download ${effectivelyLocked ? 'is-locked' : 'is-open'}">
                                <i class="fas ${effectivelyLocked ? 'fa-lock' : 'fa-download'}"></i> ${effectivelyLocked ? 'Protected' : 'Download Now'}
                            </button>
                        </div>
                        ${isAdmin ? `
                            <div class="admin-card-controls">
                                <label class="switch"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="toggleItemLock(${index})"><span class="slider"></span></label>
                                <span style="font-size:11px; font-weight:bold;">Lock</span>
                                <button onclick="editItem(${index})" style="border:none; background:none; color:var(--primary); cursor:pointer; margin-left:10px;">Edit</button>
                                <button onclick="deleteItem(${index})" style="border:none; background:none; color:var(--danger); cursor:pointer;">Delete</button>
                            </div>
                        ` : ''}
                    </div>`;
            });
            updateStats();
        }

        function updateStats() {
            const now = new Date();
            document.getElementById('dash-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('dash-count').innerText = items.length;
            if(isLoggedIn()) {
                document.getElementById('dash-status').innerText = "Admin";
                document.getElementById('admin-panel').style.display = "block";
                document.getElementById('auth-btn').innerText = "Logout Admin";
                document.getElementById('auth-btn').style.background = "var(--danger)";
            }
        }

        function saveItem() {
            const n = document.getElementById('itemName').value, i = document.getElementById('itemImg').value, l = document.getElementById('itemLink').value, idx = parseInt(document.getElementById('editIndex').value);
            if(n && l) {
                if(idx > -1) items[idx] = { ...items[idx], name:n, img:i, link:l };
                else items.push({ name:n, img:i, link:l, locked: false });
                localStorage.setItem('cougar_final_data', JSON.stringify(items));
                document.getElementById('editIndex').value = "-1"; document.getElementById('itemName').value = ""; document.getElementById('itemImg').value = ""; document.getElementById('itemLink').value = "";
                renderItems();
            }
        }

        function editItem(i) {
            const item = items[i];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemImg').value = item.img;
            document.getElementById('itemLink').value = item.link;
            document.getElementById('editIndex').value = i;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteItem(i) { if(confirm("Delete?")) { items.splice(i, 1); localStorage.setItem('cougar_final_data', JSON.stringify(items)); renderItems(); } }

        window.onload = () => { renderItems(); setInterval(updateStats, 1000); };
    </script>
</body>
</html>
