<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการปฏิทิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --warning: #d97706;
            --warning-light: #fffbeb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header-section {
            background: white;
            padding: 14px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            justify-content: center;
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        .input-item { display: flex; flex-direction: column; gap: 5px; }

        .input-item label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input, select {
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            outline: none;
            background: white;
            font-size: 15px;
            font-family: 'Sarabun', sans-serif;
            transition: all 0.2s;
            color: var(--text-main);
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        #title { width: 260px; }

        .time-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 800;
            color: var(--text-sub);
            font-size: 16px;
        }
        .time-group select {
            width: 66px;
            text-align: center;
            cursor: pointer;
            padding: 9px 4px;
        }

        .btn-add {
            background: var(--success);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            height: 42px;
            font-size: 15px;
            font-family: 'Sarabun', sans-serif;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-add:hover { background: #15803d; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(22,163,74,0.25); }
        .btn-add:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 14px;
            padding: 14px;
        }

        /* ===== LEFT PANEL ===== */
        .today-list {
            width: 340px;
            background: white;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            background: white;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-count-badge {
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 4px;
            margin-top: 10px;
        }

        .filter-tab {
            flex: 1;
            padding: 5px 4px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: transparent;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .filter-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
        .filter-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        /* Sort Bar */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .sort-bar label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .sort-bar select {
            flex: 1;
            font-size: 12px;
            padding: 5px 8px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
        }

        /* Event Container */
        .event-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px;
            scroll-behavior: smooth;
        }
        .event-container::-webkit-scrollbar { width: 4px; }
        .event-container::-webkit-scrollbar-track { background: transparent; }
        .event-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Date Group */
        .date-group { margin-bottom: 14px; }
        .date-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .date-group-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .date-group-line { flex: 1; height: 1px; background: var(--border); }
        .date-group-count {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 10px;
        }

        /* Event Card */
        .event-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.2s;
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-card:hover { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transform: translateX(2px); }
        .event-card.today-card { border-left-color: var(--success); background: var(--success-light); }
        .event-card.past-card { border-left-color: var(--text-muted); opacity: 0.72; }
        .event-card.upcoming-card { border-left-color: var(--warning); }

        .event-left { flex: 1; min-width: 0; }

        .event-title-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .event-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        .event-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .badge-today { background: var(--success-light); color: var(--success); border: 1px solid #bbf7d0; }
        .badge-past { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border); }
        .badge-upcoming { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; }

        .event-meta { display: flex; flex-direction: column; gap: 3px; }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-sub);
        }
        .meta-time-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .event-right { flex-shrink: 0; }

        .btn-del {
            background: transparent;
            color: var(--text-muted);
            border: 1.5px solid var(--border);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 7px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            line-height: 1;
        }
        .btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* Empty / Loading */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
        .empty-state p { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
        .empty-state small { font-size: 12px; }

        .loading-state { text-align: center; padding: 40px 20px; }
        .loading-spinner {
            width: 26px; height: 26px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Summary Bar */
        .summary-bar {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
        }
        .summary-item {
            flex: 1;
            text-align: center;
            padding: 6px 4px;
            border-radius: 8px;
            background: var(--bg);
        }
        .summary-num {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
        }
        .summary-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* Refresh btn */
        .btn-refresh {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-sub);
            width: 30px; height: 30px;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-refresh:hover { border-color: var(--primary); color: var(--primary); }
        .btn-refresh.spinning { animation: spin 0.8s linear infinite; }

        /* Calendar */
        .calendar-frame {
            flex: 1;
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; overflow-y: auto; }
            .today-list { width: auto; height: 380px; }
            .calendar-frame { height: 420px; flex: none; }
            #title { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="input-item">
            <label>หัวข้อกิจกรรม</label>
            <input type="text" id="title" placeholder="พิมพ์ชื่อกิจกรรมที่นี่...">
        </div>
        <div class="input-item">
            <label>วันที่</label>
            <input type="date" id="date">
        </div>
        <div class="input-item">
            <label>เวลาเริ่ม</label>
            <div class="time-group">
                <select id="startH"></select>
                <span>:</span>
                <select id="startM"></select>
            </div>
        </div>
        <div class="input-item">
            <label>เวลาสิ้นสุด</label>
            <div class="time-group">
                <select id="endH"></select>
                <span>:</span>
                <select id="endM"></select>
            </div>
        </div>
        <button class="btn-add" id="btnAdd" onclick="manageEvent('add')">＋ บันทึกนัดหมาย</button>
    </div>

    <div class="main-content">
        <div class="today-list">
            <div class="panel-header">
                <div class="panel-title">
                    <h3>📅 รายการกิจกรรม <span class="event-count-badge" id="countBadge">0</span></h3>
                    <button class="btn-refresh" id="btnRefresh" onclick="refreshEvents()" title="รีเฟรช">↻</button>
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">ทั้งหมด</button>
                    <button class="filter-tab" data-filter="today" onclick="setFilter('today')">วันนี้</button>
                    <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming')">กำลังจะมา</button>
                    <button class="filter-tab" data-filter="past" onclick="setFilter('past')">ผ่านมาแล้ว</button>
                </div>
                <div class="sort-bar">
                    <label>เรียงตาม</label>
                    <select id="sortSelect" onchange="renderEvents()">
                        <option value="date-asc">วันที่ ใหม่→เก่า</option>
                        <option value="date-desc">วันที่ เก่า→ใหม่</option>
                        <option value="title">ชื่อ A→Z</option>
                    </select>
                </div>
            </div>

            <div id="eventDisplay" class="event-container">
                <div class="loading-state" id="loadingState">
                    <div class="loading-spinner"></div>
                    <p style="margin:0;font-size:13px;color:var(--text-muted)">กำลังโหลดข้อมูล...</p>
                </div>
            </div>

            <div class="summary-bar">
                <div class="summary-item">
                    <div class="summary-num" id="sumTotal">—</div>
                    <div class="summary-label">ทั้งหมด</div>
                </div>
                <div class="summary-item">
                    <div class="summary-num" id="sumToday">—</div>
                    <div class="summary-label">วันนี้</div>
                </div>
                <div class="summary-item">
                    <div class="summary-num" id="sumUpcoming">—</div>
                    <div class="summary-label">กำลังจะมา</div>
                </div>
                <div class="summary-item">
                    <div class="summary-num" id="sumPast">—</div>
                    <div class="summary-label">ผ่านมาแล้ว</div>
                </div>
            </div>
        </div>

        <div class="calendar-frame">
            <iframe src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0"></iframe>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzJirF7Ldstah4LZepPRCGWmnoPSDnLGv0KvFb3bac-bvh8iLLxMdUH0Tc5EmIAz_c/exec";

        let allEvents = [];
        let currentFilter = 'all';

        function initTimeSelectors() {
            const sh = document.getElementById('startH'), sm = document.getElementById('startM');
            const eh = document.getElementById('endH'), em = document.getElementById('endM');

            let hOpts = "";
            for (let i = 0; i < 24; i++) {
                const v = i.toString().padStart(2, '0');
                hOpts += `<option value="${v}">${v}</option>`;
            }
            sh.innerHTML = eh.innerHTML = hOpts;

            let mOpts = "";
            for (let i = 0; i < 60; i += 5) {
                const v = i.toString().padStart(2, '0');
                mOpts += `<option value="${v}">${v}</option>`;
            }
            sm.innerHTML = em.innerHTML = mOpts;

            const now = new Date();
            sh.value = now.getHours().toString().padStart(2, '0');
            eh.value = Math.min(now.getHours() + 1, 23).toString().padStart(2, '0');
            document.getElementById('date').value = now.toISOString().split('T')[0];
        }

        window.onload = () => {
            initTimeSelectors();
            loadEvents();
        };

        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        /**
         * แปลง date string จาก Google Apps Script ทุก format → "YYYY-MM-DD"
         * รองรับ: "2026-03-01", "3/1/2026", "1/3/2026", "March 1, 2026",
         *          "2026/03/01", ISO timestamp, Date object
         */
        function normalizeDateStr(raw) {
            if (!raw) return '';
            if (raw instanceof Date) {
                // Date object
                const y = raw.getFullYear();
                const m = String(raw.getMonth() + 1).padStart(2, '0');
                const d = String(raw.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            const s = String(raw).trim();

            // Already YYYY-MM-DD
            if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);

            // YYYY/MM/DD
            if (/^\d{4}\/\d{2}\/\d{2}/.test(s)) return s.substring(0, 10).replace(/\//g, '-');

            // M/D/YYYY or MM/DD/YYYY (Google Sheets default US format)
            const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if (mdy) {
                const [, mo, dy, yr] = mdy;
                return `${yr}-${mo.padStart(2,'0')}-${dy.padStart(2,'0')}`;
            }

            // D/M/YYYY (EU format fallback — only if month > 12)
            const dmy = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
            if (dmy) {
                const [, dy, mo, yr] = dmy;
                return `${yr}-${mo.padStart(2,'0')}-${dy.padStart(2,'0')}`;
            }

            // ISO timestamp (2026-03-01T00:00:00Z)
            const iso = s.match(/^(\d{4}-\d{2}-\d{2})T/);
            if (iso) return iso[1];

            // Try native Date parse as last resort
            const parsed = new Date(s);
            if (!isNaN(parsed)) {
                const y = parsed.getFullYear();
                const m = String(parsed.getMonth() + 1).padStart(2, '0');
                const d = String(parsed.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            return s; // return as-is if all else fails
        }

        function classifyEvent(dateStr) {
            const today = getTodayStr();
            if (!dateStr) return 'past';
            if (dateStr === today) return 'today';
            return dateStr > today ? 'upcoming' : 'past';
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr + 'T00:00:00');
                if (isNaN(d)) return dateStr;
                const days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
                const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
                return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
            } catch(e) { return dateStr; }
        }

        function formatTo24hr(timeStr) {
            if (!timeStr) return '--:--';
            return timeStr.replace(/\s?[AaPp][Mm]/g, '').trim();
        }

        function getDaysLabel(dateStr) {
            const today = new Date(getTodayStr());
            const target = new Date(dateStr + 'T00:00:00');
            const diff = Math.round((target - today) / 86400000);
            if (diff === 0) return 'วันนี้';
            if (diff === 1) return 'พรุ่งนี้';
            if (diff === -1) return 'เมื่อวาน';
            if (diff > 0) return `อีก ${diff} วัน`;
            return `${Math.abs(diff)} วันที่แล้ว`;
        }

        async function loadEvents() {
            const display = document.getElementById('eventDisplay');
            display.innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p style="margin:0;font-size:13px;color:var(--text-muted)">กำลังโหลดข้อมูล...</p>
                </div>`;
            try {
                const res = await fetch(`${scriptUrl}?action=list`);
                const data = await res.json();
                allEvents = data.map(ev => {
                    const normalizedDate = normalizeDateStr(ev.date);
                    return { ...ev, date: normalizedDate, _rawDate: ev.date, _class: classifyEvent(normalizedDate) };
                });
                renderEvents();
                updateSummary();
            } catch(err) {
                display.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>ไม่สามารถโหลดข้อมูลได้</p>
                        <small>ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</small>
                    </div>`;
            }
        }

        function renderEvents() {
            const container = document.getElementById('eventDisplay');
            const sortVal = document.getElementById('sortSelect').value;

            let filtered = allEvents.filter(ev => currentFilter === 'all' || ev._class === currentFilter);

            filtered.sort((a, b) => {
                if (sortVal === 'date-asc') return (a.date||'') < (b.date||'') ? -1 : 1;
                if (sortVal === 'date-desc') return (a.date||'') > (b.date||'') ? -1 : 1;
                if (sortVal === 'title') return (a.title||'').localeCompare(b.title||'', 'th');
                return 0;
            });

            document.getElementById('countBadge').textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>ไม่พบกิจกรรม</p>
                        <small>${currentFilter === 'all' ? 'ยังไม่มีกิจกรรมที่บันทึกไว้' : 'ไม่มีกิจกรรมในหมวดนี้'}</small>
                    </div>`;
                return;
            }

            // Group by date
            const groups = {};
            filtered.forEach(ev => {
                const key = ev.date || 'unknown';
                if (!groups[key]) groups[key] = [];
                groups[key].push(ev);
            });

            const sortedKeys = Object.keys(groups).sort((a, b) =>
                sortVal === 'date-desc' ? (a > b ? -1 : 1) : (a < b ? -1 : 1)
            );

            let html = '';
            sortedKeys.forEach(dateKey => {
                const evs = groups[dateKey];
                const cls = classifyEvent(dateKey);
                const emoji = cls === 'today' ? '🔵' : cls === 'upcoming' ? '🟡' : '⚪';
                const label = cls === 'today' ? 'วันนี้' : formatDisplayDate(dateKey);

                html += `
                <div class="date-group">
                    <div class="date-group-header">
                        <span class="date-group-label">${emoji} ${label}</span>
                        <div class="date-group-line"></div>
                        <span class="date-group-count">${evs.length} รายการ</span>
                    </div>`;

                evs.forEach(ev => {
                    const cardCls = cls === 'today' ? 'today-card' : cls === 'past' ? 'past-card' : 'upcoming-card';
                    const badgeCls = cls === 'today' ? 'badge-today' : cls === 'past' ? 'badge-past' : 'badge-upcoming';
                    const daysLabel = getDaysLabel(dateKey);

                    const start = formatTo24hr(ev.startTime);
                    const end = formatTo24hr(ev.endTime);
                    const hasTime = start !== '--:--' || end !== '--:--';
                    const safeTitle = (ev.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                    html += `
                    <div class="event-card ${cardCls}">
                        <div class="event-left">
                            <div class="event-title-row">
                                <span class="event-title" title="${safeTitle}">${ev.title || '(ไม่มีชื่อ)'}</span>
                                <span class="event-badge ${badgeCls}">${daysLabel}</span>
                            </div>
                            <div class="event-meta">
                                ${hasTime ? `<div class="meta-row"><span class="meta-time-chip">🕒 ${start} – ${end} น.</span></div>` : ''}
                                ${ev.displayDate ? `<div class="meta-row"><span style="font-size:11px;color:var(--text-muted)">📅 ${ev.displayDate}</span></div>` : ''}
                            </div>
                        </div>
                        <div class="event-right">
                            <button class="btn-del" onclick="confirmDelete('${safeTitle}', '${ev.date}')" title="ลบกิจกรรม">×</button>
                        </div>
                    </div>`;
                });

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        function updateSummary() {
            document.getElementById('sumTotal').textContent = allEvents.length;
            document.getElementById('sumToday').textContent = allEvents.filter(e => e._class === 'today').length;
            document.getElementById('sumUpcoming').textContent = allEvents.filter(e => e._class === 'upcoming').length;
            document.getElementById('sumPast').textContent = allEvents.filter(e => e._class === 'past').length;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.filter === filter)
            );
            renderEvents();
        }

        async function refreshEvents() {
            const btn = document.getElementById('btnRefresh');
            btn.classList.add('spinning');
            await loadEvents();
            setTimeout(() => btn.classList.remove('spinning'), 600);
        }

        function confirmDelete(title, date) {
            if (confirm(`คุณต้องการลบกิจกรรม "${title}" ใช่หรือไม่?`)) {
                manageEvent('delete', title, date);
            }
        }

        function manageEvent(action, titleDel, dateDel) {
            const title = titleDel || document.getElementById('title').value.trim();
            const date = dateDel || document.getElementById('date').value;
            const startTime = document.getElementById('startH').value + ':' + document.getElementById('startM').value;
            const endTime = document.getElementById('endH').value + ':' + document.getElementById('endM').value;

            if (!title || !date) return alert('กรุณาระบุหัวข้อและวันที่');

            const btnAdd = document.getElementById('btnAdd');
            if (action === 'add') {
                btnAdd.innerHTML = '⏳ กำลังบันทึก...';
                btnAdd.disabled = true;
            }

            const url = `${scriptUrl}?action=${action}&title=${encodeURIComponent(title)}&date=${date}&startTime=${startTime}&endTime=${endTime}`;

            fetch(url, { mode: 'no-cors' }).then(() => {
                setTimeout(() => location.reload(), 900);
            }).catch(() => {
                btnAdd.innerHTML = '＋ บันทึกนัดหมาย';
                btnAdd.disabled = false;
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
            });
        }
    </script>
</body>
</html>
