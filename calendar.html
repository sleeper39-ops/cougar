<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการปฏิทิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* (คง Style เดิมของคุณไว้ทั้งหมด เพราะออกแบบมาดีอยู่แล้วครับ) */
        :root {
            --primary: #2563eb; --primary-light: #eff6ff; --success: #16a34a;
            --success-light: #f0fdf4; --danger: #dc2626; --danger-light: #fef2f2;
            --warning: #d97706; --warning-light: #fffbeb; --bg: #f1f5f9;
            --card: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
            --text-muted: #94a3b8; --border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header-section { background: white; padding: 14px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; justify-content: center; z-index: 10; border-bottom: 1px solid var(--border); }
        .input-item { display: flex; flex-direction: column; gap: 5px; }
        .input-item label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
        input, select { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; font-size: 15px; font-family: 'Sarabun', sans-serif; }
        #title { width: 260px; }
        .time-group { display: flex; align-items: center; gap: 4px; font-weight: 800; }
        .time-group select { width: 66px; text-align: center; padding: 9px 4px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 0 22px; border-radius: 8px; cursor: pointer; font-weight: 700; height: 42px; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-add:hover { background: #15803d; transform: translateY(-1px); }
        .btn-add:disabled { opacity: 0.6; cursor: not-allowed; }
        .main-content { display: flex; flex: 1; overflow: hidden; gap: 14px; padding: 14px; }
        .today-list { width: 340px; background: white; border-radius: 14px; display: flex; flex-direction: column; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        .panel-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
        .panel-title { display: flex; align-items: center; justify-content: space-between; }
        .event-count-badge { background: var(--primary); color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
        .filter-tabs { display: flex; gap: 4px; margin-top: 10px; }
        .filter-tab { flex: 1; padding: 5px 4px; border: 1.5px solid var(--border); border-radius: 6px; background: transparent; font-size: 11px; font-weight: 700; cursor: pointer; }
        .filter-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
        .event-container { flex: 1; overflow-y: auto; padding: 12px; }
        .event-card { background: #f8fafc; border: 1px solid var(--border); border-left: 4px solid var(--primary); padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; }
        .event-title { font-size: 14px; font-weight: 700; }
        .meta-time-chip { background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
        .btn-del { background: transparent; border: 1px solid var(--border); cursor: pointer; border-radius: 6px; width: 26px; height: 26px; }
        .btn-del:hover { background: var(--danger); color: white; }
        .summary-bar { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
        .summary-item { flex: 1; text-align: center; background: var(--bg); border-radius: 8px; padding: 5px; }
        .calendar-frame { flex: 1; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        iframe { width: 100%; height: 100%; border: none; }
        .loading-spinner { width: 26px; height: 26px; border: 3px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="input-item">
            <label>หัวข้อกิจกรรม</label>
            <input type="text" id="title" placeholder="พิมพ์ชื่อกิจกรรมที่นี่...">
        </div>
        <div class="input-item">
            <label>วันที่</label>
            <input type="date" id="date">
        </div>
        <div class="input-item">
            <label>เวลาเริ่ม</label>
            <div class="time-group">
                <select id="startH"></select> : <select id="startM"></select>
            </div>
        </div>
        <div class="input-item">
            <label>เวลาสิ้นสุด</label>
            <div class="time-group">
                <select id="endH"></select> : <select id="endM"></select>
            </div>
        </div>
        <button class="btn-add" id="btnAdd" onclick="manageEvent('add')">＋ บันทึกนัดหมาย</button>
    </div>

    <div class="main-content">
        <div class="today-list">
            <div class="panel-header">
                <div class="panel-title">
                    <h3>📅 รายการกิจกรรม <span class="event-count-badge" id="countBadge">0</span></h3>
                    <button class="btn-refresh" id="btnRefresh" onclick="refreshEvents()">↻</button>
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">ทั้งหมด</button>
                    <button class="filter-tab" data-filter="today" onclick="setFilter('today')">วันนี้</button>
                    <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming')">เร็วๆ นี้</button>
                    <button class="filter-tab" data-filter="past" onclick="setFilter('past')">จบแล้ว</button>
                </div>
            </div>

            <div id="eventDisplay" class="event-container">
                <div class="loading-spinner"></div>
            </div>

            <div class="summary-bar">
                <div class="summary-item"><div id="sumTotal" style="font-weight:800">—</div><div style="font-size:9px">รวม</div></div>
                <div class="summary-item"><div id="sumToday" style="font-weight:800">—</div><div style="font-size:9px">วันนี้</div></div>
                <div class="summary-item"><div id="sumUpcoming" style="font-weight:800">—</div><div style="font-size:9px">หน้า</div></div>
                <div class="summary-item"><div id="sumPast" style="font-weight:800">—</div><div style="font-size:9px">อดีต</div></div>
            </div>
        </div>

        <div class="calendar-frame">
            <iframe src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0"></iframe>
        </div>
    </div>

    <script>
        // เปลี่ยน URL นี้เป็น Web App URL ของคุณ
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzJirF7Ldstah4LZepPRCGWmnoPSDnLGv0KvFb3bac-bvh8iLLxMdUH0Tc5EmIAz_c/exec";

        let allEvents = [];
        let currentFilter = 'all';

        function initTimeSelectors() {
            const sh = document.getElementById('startH'), sm = document.getElementById('startM');
            const eh = document.getElementById('endH'), em = document.getElementById('endM');
            let h = "", m = "";
            for(let i=0; i<24; i++) h += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;
            for(let i=0; i<60; i+=5) m += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;
            sh.innerHTML = eh.innerHTML = h; sm.innerHTML = em.innerHTML = m;
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        }

        async function loadEvents() {
            const display = document.getElementById('eventDisplay');
            try {
                const response = await fetch(`${scriptUrl}?action=list`);
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    allEvents = data.map(ev => {
                        const d = normalizeDateStr(ev.date);
                        return { ...ev, date: d, _class: classifyEvent(d) };
                    });
                    renderEvents();
                    updateSummary();
                } else {
                    display.innerHTML = '<p style="text-align:center; padding:20px;">ไม่พบข้อมูลกิจกรรม</p>';
                }
            } catch (err) {
                console.error("Load error:", err);
                display.innerHTML = '<p style="text-align:center; color:red; padding:20px;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        function normalizeDateStr(raw) {
            if (!raw) return '';
            const d = new Date(raw);
            if (isNaN(d)) return raw;
            return d.toISOString().split('T')[0];
        }

        function classifyEvent(dateStr) {
            const today = new Date().toISOString().split('T')[0];
            if (dateStr === today) return 'today';
            return dateStr > today ? 'upcoming' : 'past';
        }

        function renderEvents() {
            const container = document.getElementById('eventDisplay');
            const filtered = allEvents.filter(ev => currentFilter === 'all' || ev._class === currentFilter);
            document.getElementById('countBadge').textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">ไม่มีกิจกรรม</div>';
                return;
            }

            // เรียงวันที่ (ใหม่ไปเก่า)
            filtered.sort((a,b) => b.date.localeCompare(a.date));

            container.innerHTML = filtered.map(ev => `
                <div class="event-card ${ev._class}-card">
                    <div>
                        <div class="event-title">${ev.title || 'ไม่มีชื่อ'}</div>
                        <div style="margin-top:5px;">
                            <span class="meta-time-chip">🕒 ${ev.startTime || '--:--'} - ${ev.endTime || '--:--'}</span>
                            <div style="font-size:11px; color:#666; margin-top:4px;">📅 ${ev.date}</div>
                        </div>
                    </div>
                    <button class="btn-del" onclick="confirmDelete('${ev.title}', '${ev.date}')">×</button>
                </div>
            `).join('');
        }

        function updateSummary() {
            document.getElementById('sumTotal').innerText = allEvents.length;
            document.getElementById('sumToday').innerText = allEvents.filter(e => e._class === 'today').length;
            document.getElementById('sumUpcoming').innerText = allEvents.filter(e => e._class === 'upcoming').length;
            document.getElementById('sumPast').innerText = allEvents.filter(e => e._class === 'past').length;
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
            renderEvents();
        }

        async function refreshEvents() {
            const btn = document.getElementById('btnRefresh');
            btn.style.transform = "rotate(360deg)";
            await loadEvents();
            btn.style.transform = "rotate(0deg)";
        }

        function confirmDelete(title, date) {
            if (confirm(`ลบกิจกรรม "${title}"?`)) manageEvent('delete', title, date);
        }

        async function manageEvent(action, titleDel, dateDel) {
            const title = titleDel || document.getElementById('title').value.trim();
            const date = dateDel || document.getElementById('date').value;
            const startTime = document.getElementById('startH').value + ':' + document.getElementById('startM').value;
            const endTime = document.getElementById('endH').value + ':' + document.getElementById('endM').value;

            if (!title || !date) return alert('กรุณาระบุหัวข้อและวันที่');

            const btnAdd = document.getElementById('btnAdd');
            if (action === 'add') { btnAdd.disabled = true; btnAdd.innerText = 'บันทึก...'; }

            const url = `${scriptUrl}?action=${action}&title=${encodeURIComponent(title)}&date=${date}&startTime=${startTime}&endTime=${endTime}`;

            try {
                // ใช้โหมดปกติเพื่อให้รับ JSON กลับมาได้
                await fetch(url, { method: 'GET' });
                alert(action === 'add' ? 'บันทึกสำเร็จ' : 'ลบสำเร็จ');
                location.reload();
            } catch (err) {
                console.error("Manage error:", err);
                // กรณี Apps Script มักติด CORS แม้จะทำงานสำเร็จ ให้ลองรีโหลดดู
                setTimeout(() => location.reload(), 1000);
            }
        }

        window.onload = () => { initTimeSelectors(); loadEvents(); };
    </script>
</body>
</html>
