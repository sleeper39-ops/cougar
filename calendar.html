<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการปฏิทิน v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --border: #e2e8f0; --danger: #dc2626; }
        body { font-family: 'Sarabun', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        .header-section { background: white; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; border-bottom: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-item { display: flex; flex-direction: column; gap: 4px; }
        input, select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
        .btn-add { background: #16a34a; color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .main-content { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        .list-panel { width: 350px; background: white; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .filter-tabs { display: flex; padding: 10px; gap: 5px; border-bottom: 1px solid var(--border); }
        .filter-tab { flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: 4px; background: none; font-size: 12px; cursor: pointer; }
        .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .event-container { flex: 1; overflow-y: auto; padding: 10px; }
        .event-card { border-left: 4px solid var(--primary); background: #f8fafc; padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; border-left-width: 4px; }
        .btn-del { color: #ccc; background: none; border: none; font-size: 20px; cursor: pointer; }
        .btn-del:hover { color: var(--danger); }
        .calendar-frame { flex: 1; background: white; border-radius: 12px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="input-item"><input type="text" id="title" placeholder="ชื่อกิจกรรม..."></div>
        <div class="input-item"><input type="date" id="date"></div>
        <div class="input-item"><div style="display:flex;gap:2px"><select id="startH"></select>:<select id="startM"></select></div></div>
        <button class="btn-add" onclick="manageEvent('add')">บันทึก</button>
    </div>

    <div class="main-content">
        <div class="list-panel">
            <div class="filter-tabs" id="tabs">
                <button class="filter-tab" onclick="setFilter('today')">วันนี้</button>
                <button class="filter-tab" onclick="setFilter('upcoming')">เร็วๆ นี้</button>
                <button class="filter-tab" onclick="setFilter('past')">จบแล้ว</button>
            </div>
            <div id="eventDisplay" class="event-container"></div>
        </div>
        <div class="calendar-frame">
            <iframe src="https://calendar.google.com/calendar/embed?src=0862ce80073c1952685942ed711afe8838017aeda13bd78dd57f561929e4b083%40group.calendar.google.com&ctz=Asia%2FBangkok"></iframe>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzJirF7Ldstah4LZepPRCGWmnoPSDnLGv0KvFb3bac-bvh8iLLxMdUH0Tc5EmIAz_c/exec";
        let allEvents = [];
        let currentFilter = 'upcoming'; // หัวข้อหลักคือ "เร็วๆ นี้"

        // ฟังก์ชันเปลี่ยน yyyy-MM-dd -> dd-MM-yyyy
        function formatDisplayDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}-${m}-${y}`;
        }

        async function loadEvents() {
            const container = document.getElementById('eventDisplay');
            container.innerHTML = "กำลังโหลด...";
            try {
                const res = await fetch(`${scriptUrl}?action=list`);
                const data = await res.json();
                allEvents = data.map(ev => ({...ev, _class: classify(ev.date)}));
                render();
            } catch (e) { container.innerHTML = "เกิดข้อผิดพลาด"; }
        }

        function classify(dateStr) {
            const today = new Date().toISOString().split('T')[0];
            if (dateStr === today) return 'today';
            return dateStr > today ? 'upcoming' : 'past';
        }

        function render() {
            const container = document.getElementById('eventDisplay');
            const filtered = allEvents.filter(e => e._class === currentFilter);
            
            // เรียงลำดับ: กิจกรรมที่กำลังจะถึง (ใกล้สุด) ไว้ด้านบน
            filtered.sort((a, b) => new Date(`${a.date}T${a.startTime}`) - new Date(`${b.date}T${b.startTime}`));

            container.innerHTML = filtered.map(ev => `
                <div class="event-card">
                    <div>
                        <div style="font-weight:bold">${ev.title}</div>
                        <div style="font-size:12px;color:#666">📅 ${formatDisplayDate(ev.date)} | 🕒 ${ev.startTime}</div>
                    </div>
                    <button class="btn-del" onclick="deleteEv('${ev.title}','${ev.date}','${ev.startTime}')">×</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.filter-tab').forEach(t => {
                t.classList.toggle('active', t.getAttribute('onclick').includes(currentFilter));
            });
        }

        async function deleteEv(t, d, s) {
            if (!confirm(`ลบ "${t}"?`)) return;
            await fetch(`${scriptUrl}?action=delete&title=${encodeURIComponent(t)}&date=${d}&startTime=${s}`);
            loadEvents();
        }

        async function manageEvent(action) {
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const startTime = document.getElementById('startH').value + ":" + document.getElementById('startM').value;
            if(!title || !date) return alert("กรุณากรอกข้อมูล");
            await fetch(`${scriptUrl}?action=add&title=${encodeURIComponent(title)}&date=${date}&startTime=${startTime}&endTime=${startTime}`); // EndTime สมมติให้เท่ากันก่อน
            location.reload();
        }

        function setFilter(f) { currentFilter = f; render(); }

        window.onload = () => {
            let h="", m="";
            for(let i=0;i<24;i++) h+=`<option>${i.toString().padStart(2,'0')}</option>`;
            for(let i=0;i<60;i+=5) m+=`<option>${i.toString().padStart(2,'0')}</option>`;
            document.getElementById('startH').innerHTML = h; document.getElementById('startM').innerHTML = m;
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            loadEvents();
        };
    </script>
</body>
</html>
