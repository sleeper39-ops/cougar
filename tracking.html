<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Location Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        #map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-overlay { position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
        #ui-overlay > * { pointer-events: auto; }

        #header {
            background: rgba(22, 101, 52, 0.92);
            backdrop-filter: blur(8px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        #header h1 { font-size: 17px; font-weight: 700; }

        #tab-bar {
            display: flex;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .tab-btn {
            flex: 1; padding: 10px 0; text-align: center;
            font-size: 14px; font-weight: 600; color: #6b7280;
            border: none; background: none; cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn.active { color: #16a34a; border-bottom-color: #16a34a; }

        #vehicle-status-list {
            position: fixed; bottom: 24px; left: 0; right: 0; z-index: 10;
            display: flex; flex-wrap: wrap; gap: 6px;
            justify-content: center; padding: 0 12px; pointer-events: none;
        }

        #last-update-text {
            position: fixed; bottom: 6px; left: 0; right: 0;
            text-align: center; font-size: 11px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            z-index: 10; pointer-events: none;
        }

        #driver-panel {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            background: white; border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
            padding: 20px 20px 32px;
            max-height: 80vh; overflow-y: auto; display: none;
        }
        #driver-panel.show { display: block; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; padding: 4px 10px; border-radius: 20px;
            font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .status-online  { background: rgba(209,250,229,0.95); color: #065f46; }
        .status-offline { background: rgba(243,244,246,0.95); color: #6b7280; }

        .truck-label {
            background: rgba(255,255,255,0.95); border-radius: 6px;
            padding: 2px 8px; font-size: 12px; font-weight: 700;
            white-space: nowrap; box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            border-left: 3px solid #333; pointer-events: none;
        }
        .leaflet-tooltip-plain { background: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; }

        .form-label { display: block; font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .form-select {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid #d1d5db; font-size: 15px;
            color: #111827; outline: none; margin-bottom: 16px;
        }
        .btn-start {
            width: 100%; padding: 14px; border-radius: 50px;
            background: #3b82f6; color: white; font-size: 17px;
            font-weight: 700; border: none; cursor: pointer;
            box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }
        .btn-stop {
            width: 100%; padding: 14px; border-radius: 50px;
            background: #ef4444; color: white; font-size: 17px;
            font-weight: 700; border: none; cursor: pointer;
            box-shadow: 0 4px 12px rgba(239,68,68,0.4); display: none;
        }
        #driver-status {
            margin-top: 14px; padding: 12px; border-radius: 10px;
            background: #f3f4f6; font-size: 14px; color: #374151; text-align: center;
        }
        .leaflet-top.leaflet-right { top: 110px; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui-overlay">
    <div id="header">
        <h1>🚛 Location Tracking</h1>
        <span id="last-update-inline" style="font-size:11px;opacity:0.85;color:white;"></span>
    </div>
    <div id="tab-bar">
        <button class="tab-btn active" id="tab-viewer" onclick="switchTab('viewer')">📍 Location</button>
        <button class="tab-btn"        id="tab-driver" onclick="switchTab('driver')">🚗 Tracking</button>
    </div>
</div>

<div id="vehicle-status-list"></div>
<div id="last-update-text"></div>

<div id="driver-panel">
    <div style="width:40px;height:4px;background:#d1d5db;border-radius:4px;margin:0 auto 20px;"></div>
    <label class="form-label" for="truck-id">เลือกยานพาหนะของคุณ:</label>
    <select id="truck-id" class="form-select">
        <option value="รถคันที่ 1">🚛 รถคันที่ 1</option>
        <option value="รถคันที่ 2">🚛 รถคันที่ 2</option>
        <option value="รถคันที่ 3">🚛 รถคันที่ 3</option>
        <option value="รถคันที่ 4">🚛 รถคันที่ 4</option>
        <option value="รถคันที่ 5">🚛 รถคันที่ 5</option>
        <option value="รถคันที่ 6">🚛 รถคันที่ 6</option>
        <option value="รถคันที่ 7">🚛 รถคันที่ 7</option>
        <option value="รถคันที่ 8">🚛 รถคันที่ 8</option>
        <option value="รถคันที่ 9">🚛 รถคันที่ 9</option>
        <option value="รถคันที่ 10">🚛 รถคันที่ 10</option>
    </select>
    <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">ระบบจะส่งตำแหน่งของคุณแบบ Real-time ผ่าน GPS</p>
    <button id="start-btn" class="btn-start" onclick="startTracking()">▶ เริ่มส่งตำแหน่ง</button>
    <button id="stop-btn"  class="btn-stop"  onclick="stopTracking()">⏹ หยุดส่งตำแหน่ง</button>
    <div id="driver-status">สถานะ: รอเริ่มต้น...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // =============================================
    // 🔑 GAS URL — เปลี่ยนให้ตรงกับ Deploy ของคุณ
    // =============================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxoTRvHgyzatOutguyf7oVetSAxI5dRqy8ariDaUzsUNdiYOeqVdQc2vBpoTFECK7Xg/exec";

    let watchId = null;

    // =============================================
    // 📤 ส่งตำแหน่งไปยัง GAS ผ่าน fetch()
    // =============================================
    function sendLocation(truckId, lat, lng) {
        const url = `${GAS_URL}?action=save&truckId=${encodeURIComponent(truckId)}&lat=${lat}&lng=${lng}`;
        fetch(url)
            .then(r => r.json())
            .then(res => {
                if (res && res.status === 'success') {
                    document.getElementById('driver-status').innerHTML =
                        `<span class="text-green-600 font-bold">✅ กำลังส่งตำแหน่ง</span><br>พิกัด: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                }
            })
            .catch(err => {
                document.getElementById('driver-status').innerHTML =
                    `<span style="color:red;">❌ ส่งข้อมูลไม่ได้: ${err.message}</span>`;
            });
    }

    function startTracking() {
        if (!navigator.geolocation) { alert("เบราว์เซอร์ไม่รองรับ GPS"); return; }
        const truckId = document.getElementById('truck-id').value;
        document.getElementById('truck-id').disabled = true;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = '';
        document.getElementById('driver-status').innerHTML = "กำลังหาสัญญาณ GPS...";

        watchId = navigator.geolocation.watchPosition(
            pos => sendLocation(truckId, pos.coords.latitude, pos.coords.longitude),
            err => {
                document.getElementById('driver-status').innerHTML =
                    `<span style="color:red;">❌ ${err.message}</span>`;
            },
            { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
        );
    }

    function stopTracking() {
        if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        document.getElementById('truck-id').disabled = false;
        document.getElementById('start-btn').style.display = '';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('driver-status').innerHTML = "หยุดส่งตำแหน่งแล้ว";
    }

    // =============================================
    // 🗺️ Leaflet Map
    // =============================================
    window.addEventListener('load', function () {

        const TRUCK_COLORS = [
            '#e53e3e','#3182ce','#38a169','#d69e2e','#805ad5',
            '#dd6b20','#00b5d8','#e53e9e','#2d3748','#b7791f'
        ];

        function getTruckColor(truckId) {
            const match = truckId.match(/(\d+)$/);
            const num = match ? parseInt(match[1]) : 1;
            return TRUCK_COLORS[(num - 1) % TRUCK_COLORS.length];
        }

        const ICON_SIZE = 48;

        function createTruckIcon(color, heading) {
            const darken = (hex, amt) => {
                let c = parseInt(hex.slice(1), 16);
                let r = Math.max(0, (c >> 16) - amt);
                let g = Math.max(0, ((c >> 8) & 0xff) - amt);
                let b = Math.max(0, (c & 0xff) - amt);
                return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
            };
            const dark = darken(color, 40);
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"
                style="transform:rotate(${heading}deg);transform-origin:center;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));">
              <defs>
                <linearGradient id="bg${heading}" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${color}"/>
                  <stop offset="100%" stop-color="${dark}"/>
                </linearGradient>
              </defs>
              <ellipse cx="24" cy="44" rx="12" ry="3" fill="rgba(0,0,0,0.18)"/>
              <rect x="9" y="22" width="30" height="18" rx="5" fill="url(#bg${heading})"/>
              <rect x="13" y="10" width="22" height="16" rx="5" fill="url(#bg${heading})"/>
              <rect x="15" y="11" width="18" height="9" rx="3" fill="#a8d8f0" opacity="0.85"/>
              <rect x="15" y="27" width="18" height="7" rx="2" fill="#1a2a3a" opacity="0.5"/>
              <rect x="15" y="8"  width="7"  height="3" rx="1.5" fill="#ffe066" opacity="0.9"/>
              <rect x="26" y="8"  width="7"  height="3" rx="1.5" fill="#ffe066" opacity="0.9"/>
              <rect x="10" y="38" width="6"  height="3" rx="1.5" fill="#ff4444" opacity="0.9"/>
              <rect x="32" y="38" width="6"  height="3" rx="1.5" fill="#ff4444" opacity="0.9"/>
              <rect x="6"  y="23" width="4"  height="6" rx="2" fill="${dark}" opacity="0.8"/>
              <rect x="38" y="23" width="4"  height="6" rx="2" fill="${dark}" opacity="0.8"/>
              <circle cx="14" cy="40" r="5" fill="#1a1a1a"/>
              <circle cx="14" cy="40" r="3" fill="#333"/>
              <circle cx="14" cy="40" r="1.5" fill="#888"/>
              <circle cx="34" cy="40" r="5" fill="#1a1a1a"/>
              <circle cx="34" cy="40" r="3" fill="#333"/>
              <circle cx="34" cy="40" r="1.5" fill="#888"/>
              <polygon points="24,3 20,9 28,9" fill="white" opacity="0.85"/>
            </svg>`;
            return L.divIcon({
                className: '',
                html: svg,
                iconSize: [ICON_SIZE, ICON_SIZE],
                iconAnchor: [ICON_SIZE/2, ICON_SIZE/2],
                popupAnchor: [0, -ICON_SIZE/2]
            });
        }

        function calcHeading(lat1, lng1, lat2, lng2) {
            const toRad = d => d * Math.PI / 180;
            const dLng = toRad(lng2 - lng1);
            const rlat1 = toRad(lat1), rlat2 = toRad(lat2);
            const y = Math.sin(dLng) * Math.cos(rlat2);
            const x = Math.cos(rlat1) * Math.sin(rlat2) - Math.sin(rlat1) * Math.cos(rlat2) * Math.cos(dLng);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        const hybrid    = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { attribution: 'Map data © Google', maxZoom: 21 });
        const satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Map data © Google', maxZoom: 21 });
        const street    = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',   { attribution: '© OpenStreetMap', maxZoom: 19 });

        const map = L.map('map', {
            center: [13.7563, 100.5018],
            zoom: 13,
            layers: [hybrid]
        });

        L.control.layers({ "ดาวเทียม+ถนน": hybrid, "ดาวเทียม": satellite, "แผนที่ถนน": street }).addTo(map);

        let truckMarkers   = {};
        let truckPolylines = {};
        let truckPaths     = {};
        let truckHeadings  = {};
        let firstLoad = true;

        // =============================================
        // 📡 ดึงข้อมูลผ่าน fetch() แทน google.script.run
        // =============================================
        function updateMapLocation() {
            fetch(`${GAS_URL}?action=getAll`)
                .then(r => r.json())
                .then(dataArray => {
                    if (!dataArray || dataArray.length === 0) return;

                    let bounds = [];
                    let statusHTML = '';

                    dataArray.forEach(function(data) {
                        const lat   = parseFloat(data.lat);
                        const lng   = parseFloat(data.lng);
                        const id    = data.truckId;
                        const color = getTruckColor(id);
                        const timeStr = new Date(data.timestamp).toLocaleTimeString('th-TH');
                        const isOnline = (Date.now() - new Date(data.timestamp).getTime()) < 2 * 60 * 1000;

                        statusHTML += `<span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}"
                            style="${isOnline ? 'border-left:3px solid ' + color : ''}">
                            <span style="width:8px;height:8px;border-radius:50%;background:${isOnline ? color : '#9ca3af'};display:inline-block;"></span>
                            ${id}
                        </span>`;

                        if (!isOnline) {
                            if (truckMarkers[id]) { map.removeLayer(truckMarkers[id]); delete truckMarkers[id]; }
                            return;
                        }

                        let heading = truckHeadings[id] || 0;
                        if (truckPaths[id] && truckPaths[id].length >= 1) {
                            const prev = truckPaths[id][truckPaths[id].length - 1];
                            if (Math.abs(prev[0] - lat) > 0.00001 || Math.abs(prev[1] - lng) > 0.00001) {
                                heading = calcHeading(prev[0], prev[1], lat, lng);
                            }
                        }
                        truckHeadings[id] = heading;

                        if (!truckPaths[id]) truckPaths[id] = [];
                        const last = truckPaths[id][truckPaths[id].length - 1];
                        if (!last || last[0] !== lat || last[1] !== lng) {
                            truckPaths[id].push([lat, lng]);
                            if (truckPaths[id].length > 200) truckPaths[id].shift();
                        }

                        if (!truckPolylines[id]) {
                            truckPolylines[id] = L.polyline(truckPaths[id], { color, weight: 3, opacity: 0.65, dashArray: '6 4' }).addTo(map);
                        } else {
                            truckPolylines[id].setLatLngs(truckPaths[id]);
                        }

                        const icon = createTruckIcon(color, heading);
                        if (!truckMarkers[id]) {
                            truckMarkers[id] = L.marker([lat, lng], { icon }).addTo(map);
                            truckMarkers[id].bindTooltip(
                                `<div class="truck-label" style="border-color:${color};color:${color};">${id}</div>`,
                                { permanent: true, direction: 'top', className: 'leaflet-tooltip-plain', offset: [0, -28] }
                            );
                        } else {
                            truckMarkers[id].setLatLng([lat, lng]);
                            truckMarkers[id].setIcon(icon);
                        }

                        truckMarkers[id].bindPopup(
                            `<b style="color:${color}">${id}</b><br>
                             📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}<br>
                             🕐 ${timeStr}<br>🧭 ทิศ: ${Math.round(heading)}°`
                        );

                        bounds.push([lat, lng]);
                    });

                    document.getElementById('vehicle-status-list').innerHTML = statusHTML;
                    if (firstLoad && bounds.length > 0) {
                        map.fitBounds(bounds, { maxZoom: 15, padding: [30, 30] });
                        firstLoad = false;
                    }
                    const t = '🕐 ' + new Date().toLocaleTimeString('th-TH');
                    document.getElementById('last-update-text').innerText = t;
                    document.getElementById('last-update-inline').innerText = t;
                })
                .catch(err => console.error('GAS fetch error:', err));
        }

        updateMapLocation();
        setInterval(updateMapLocation, 10000);

        window.switchTab = function(tab) {
            const panel = document.getElementById('driver-panel');
            document.getElementById('tab-viewer').classList.toggle('active', tab === 'viewer');
            document.getElementById('tab-driver').classList.toggle('active', tab === 'driver');
            if (tab === 'viewer') { panel.classList.remove('show'); map.invalidateSize(); }
            else { panel.classList.add('show'); }
        };
    });
</script>
</body>
</html>
